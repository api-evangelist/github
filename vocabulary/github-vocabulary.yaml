vocabulary: 1.0.0
info:
  provider: GitHub
  description: Vocabulary for the GitHub developer platform covering REST v3, GraphQL
    v4, Apps, Actions, Packages, and Security APIs.
  created: '2026-04-17'
  modified: '2026-04-17'
operational:
  apis:
  - name: GitHub REST API v3
    namespace: gh-rest
    baseUrl: https://api.github.com
    status: active
  - name: GitHub GraphQL API v4
    namespace: gh-graphql
    baseUrl: https://api.github.com/graphql
    status: active
  resources:
  - name: repositories
    description: Git repositories with code, branches, and tags.
  - name: issues
    description: Issue tickets for bugs and features.
  - name: pull-requests
    description: Code review and merge requests.
  - name: actions
    description: CI/CD workflow runs and jobs.
  - name: users
    description: User accounts and profiles.
  - name: organizations
    description: Organization accounts and teams.
  - name: packages
    description: Package registry artifacts.
  - name: code-scanning
    description: Security code scanning alerts.
  - name: dependabot
    description: Dependency vulnerability alerts.
  - name: projects
    description: Project boards and items.
  - name: gists
    description: Code snippet sharing.
  - name: releases
    description: Release versions and assets.
capability:
  personas:
  - id: developer
    name: Software Developer
  - id: devops-engineer
    name: DevOps Engineer
  - id: security-engineer
    name: Security Engineer
  - id: project-manager
    name: Project Manager
  - id: open-source-maintainer
    name: Open Source Maintainer
  domains:
  - name: source-control
    resources:
    - repositories
    - pull-requests
  - name: ci-cd
    resources:
    - actions
  - name: project-management
    resources:
    - issues
    - projects
  - name: security
    resources:
    - code-scanning
    - dependabot
  - name: distribution
    resources:
    - packages
    - releases
