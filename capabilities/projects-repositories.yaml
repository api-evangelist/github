naftiko: 1.0.0-alpha2
info:
  label: GitHub Projects API — Repositories
  description: 'GitHub Projects API — Repositories. 2 operations. Lead operation: GitHub List Repository Projects. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Repositories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: projects-repositories
    baseUri: ''
    description: GitHub Projects API — Repositories business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-projects
      path: /repos/{owner}/{repo}/projects
      operations:
      - name: listrepositoryprojects
        method: GET
        description: GitHub List Repository Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Indicates the state of the projects to return.
      - name: createrepositoryproject
        method: POST
        description: GitHub Create Repository Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: projects-repositories-rest
    port: 8080
    description: REST adapter for GitHub Projects API — Repositories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/projects
      name: repos-owner-repo-projects
      description: REST surface for repos-owner-repo-projects.
      operations:
      - method: GET
        name: listrepositoryprojects
        description: GitHub List Repository Projects
        call: projects-repositories.listrepositoryprojects
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrepositoryproject
        description: GitHub Create Repository Project
        call: projects-repositories.createrepositoryproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: projects-repositories-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Projects API — Repositories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-list-repository-projects
      description: GitHub List Repository Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: projects-repositories.listrepositoryprojects
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: github-create-repository-project
      description: GitHub Create Repository Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: projects-repositories.createrepositoryproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
