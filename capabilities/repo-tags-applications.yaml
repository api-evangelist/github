naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Applications
  description: 'github-repos-api — Applications. 1 operations. Lead operation: GitHub Get Repository Installation for the
    Authenticated App. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-applications
    baseUri: ''
    description: github-repos-api — Applications business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-installation
      path: /repos/{owner}/{repo}/installation
      operations:
      - name: getrepositoryinstallationfortheauthenticatedapp
        method: GET
        description: GitHub Get Repository Installation for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-applications-rest
    port: 8080
    description: REST adapter for github-repos-api — Applications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/installation
      name: repos-owner-repo-installation
      description: REST surface for repos-owner-repo-installation.
      operations:
      - method: GET
        name: getrepositoryinstallationfortheauthenticatedapp
        description: GitHub Get Repository Installation for the Authenticated App
        call: repo-tags-applications.getrepositoryinstallationfortheauthenticatedapp
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Applications. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-repository-installation-authenticated
      description: GitHub Get Repository Installation for the Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-applications.getrepositoryinstallationfortheauthenticatedapp
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
