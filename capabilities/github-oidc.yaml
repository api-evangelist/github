        - type: object
          mapping: $.
      - method: PUT
        name: oidcupdateoidccustomsubtemplatefororg
        description: GitHub Set the Customization Template for an OIDC Subject Claim for an Organization
        call: github-oidc.oidcupdateoidccustomsubtemplatefororg
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
