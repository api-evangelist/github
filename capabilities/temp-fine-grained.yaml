naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Fine-grained
  description: 'GitHub Repos API — Fine-grained. 1 operations. Lead operation: List Repository Fine-grained Permissions For
    An Organization. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Fine-grained
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-fine-grained
    baseUri: ''
    description: GitHub Repos API — Fine-grained business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-repository-fine-grained-permissions
      path: /orgs/{org}/repository-fine-grained-permissions
      operations:
      - name: listrepositoryfinegrainedpermissionsforanorganization
        method: GET
        description: List Repository Fine-grained Permissions For An Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-fine-grained-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Fine-grained. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orgs/{org}/repository-fine-grained-permissions
      name: orgs-org-repository-fine-grained-permissions
      description: REST surface for orgs-org-repository-fine-grained-permissions.
      operations:
      - method: GET
        name: listrepositoryfinegrainedpermissionsforanorganization
        description: List Repository Fine-grained Permissions For An Organization
        call: temp-fine-grained.listrepositoryfinegrainedpermissionsforanorganization
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-fine-grained-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Fine-grained. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-repository-fine-grained-permissions
      description: List Repository Fine-grained Permissions For An Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-fine-grained.listrepositoryfinegrainedpermissionsforanorganization
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
