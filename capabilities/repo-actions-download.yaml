      path: /repos/{owner}/{repo}/actions/artifacts/{artifact_id}/{archive_format}
      operations:
      - name: downloadanartifact
        method: GET
        description: GitHub Download an Artifact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: archive_format
          in: path
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
