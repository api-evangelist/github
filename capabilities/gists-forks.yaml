naftiko: 1.0.0-alpha2
info:
  label: GitHub Gists API — Forks
  description: 'GitHub Gists API — Forks. 2 operations. Lead operation: GitHub List Gist Forks. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Forks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gists-forks
    baseUri: ''
    description: GitHub Gists API — Forks business capability. Self-contained, no shared references.
    resources:
    - name: gists-gist_id-forks
      path: /gists/{gist_id}/forks
      operations:
      - name: listgistforks
        method: GET
        description: GitHub List Gist Forks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: forkgist
        method: POST
        description: GitHub Forkgist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: gists-forks-rest
    port: 8080
    description: REST adapter for GitHub Gists API — Forks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gists/{gist-id}/forks
      name: gists-gist-id-forks
      description: REST surface for gists-gist_id-forks.
      operations:
      - method: GET
        name: listgistforks
        description: GitHub List Gist Forks
        call: gists-forks.listgistforks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: forkgist
        description: GitHub Forkgist
        call: gists-forks.forkgist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gists-forks-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Gists API — Forks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-gist-forks
      description: GitHub List Gist Forks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gists-forks.listgistforks
      outputParameters:
      - type: object
        mapping: $.
    - name: github-forkgist
      description: GitHub Forkgist
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gists-forks.forkgist
      outputParameters:
      - type: object
        mapping: $.
