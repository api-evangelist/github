naftiko: 1.0.0-alpha2
info:
  label: GitHub SCIM API — Provisioning
  description: 'GitHub SCIM API — Provisioning. 2 operations. Lead operation: GitHub Get Scim Provisioning Information for
    an Enterprise Group. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Provisioning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: scim-provisioning
    baseUri: ''
    description: GitHub SCIM API — Provisioning business capability. Self-contained, no shared references.
    resources:
    - name: scim-v2-Groups-scim_group_id
      path: /scim/v2/Groups/{scim_group_id}
      operations:
      - name: getscimprovisioninginformationforanenterprisegroup
        method: GET
        description: GitHub Get Scim Provisioning Information for an Enterprise Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scim-v2-Users-scim_user_id
      path: /scim/v2/Users/{scim_user_id}
      operations:
      - name: getscimprovisioninginformationforanenterpriseuser
        method: GET
        description: GitHub Get Scim Provisioning Information for an Enterprise User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: scim-provisioning-rest
    port: 8080
    description: REST adapter for GitHub SCIM API — Provisioning. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/scim/v2/groups/{scim-group-id}
      name: scim-v2-groups-scim-group-id
      description: REST surface for scim-v2-Groups-scim_group_id.
      operations:
      - method: GET
        name: getscimprovisioninginformationforanenterprisegroup
        description: GitHub Get Scim Provisioning Information for an Enterprise Group
        call: scim-provisioning.getscimprovisioninginformationforanenterprisegroup
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scim/v2/users/{scim-user-id}
      name: scim-v2-users-scim-user-id
      description: REST surface for scim-v2-Users-scim_user_id.
      operations:
      - method: GET
        name: getscimprovisioninginformationforanenterpriseuser
        description: GitHub Get Scim Provisioning Information for an Enterprise User
        call: scim-provisioning.getscimprovisioninginformationforanenterpriseuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scim-provisioning-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub SCIM API — Provisioning. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-scim-provisioning-information
      description: GitHub Get Scim Provisioning Information for an Enterprise Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scim-provisioning.getscimprovisioninginformationforanenterprisegroup
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-scim-provisioning-information-2
      description: GitHub Get Scim Provisioning Information for an Enterprise User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scim-provisioning.getscimprovisioninginformationforanenterpriseuser
      outputParameters:
      - type: object
        mapping: $.
