naftiko: 1.0.0-alpha2
info:
  label: GitHub SCIM API — Delete
  description: 'GitHub SCIM API — Delete. 2 operations. Lead operation: GitHub Delete Scim Group from an Enterprise. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: scim-delete
    baseUri: ''
    description: GitHub SCIM API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: scim-v2-Groups-scim_group_id
      path: /scim/v2/Groups/{scim_group_id}
      operations:
      - name: deletescimgroupfromanenterprise
        method: DELETE
        description: GitHub Delete Scim Group from an Enterprise
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scim-v2-Users-scim_user_id
      path: /scim/v2/Users/{scim_user_id}
      operations:
      - name: deletescimuserfromanenterprise
        method: DELETE
        description: GitHub Delete Scim User from an Enterprise
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: scim-delete-rest
    port: 8080
    description: REST adapter for GitHub SCIM API — Delete. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/scim/v2/groups/{scim-group-id}
      name: scim-v2-groups-scim-group-id
      description: REST surface for scim-v2-Groups-scim_group_id.
      operations:
      - method: DELETE
        name: deletescimgroupfromanenterprise
        description: GitHub Delete Scim Group from an Enterprise
        call: scim-delete.deletescimgroupfromanenterprise
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scim/v2/users/{scim-user-id}
      name: scim-v2-users-scim-user-id
      description: REST surface for scim-v2-Users-scim_user_id.
      operations:
      - method: DELETE
        name: deletescimuserfromanenterprise
        description: GitHub Delete Scim User from an Enterprise
        call: scim-delete.deletescimuserfromanenterprise
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scim-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub SCIM API — Delete. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-delete-scim-group-enterprise
      description: GitHub Delete Scim Group from an Enterprise
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scim-delete.deletescimgroupfromanenterprise
      outputParameters:
      - type: object
        mapping: $.
    - name: github-delete-scim-user-enterprise
      description: GitHub Delete Scim User from an Enterprise
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scim-delete.deletescimuserfromanenterprise
      outputParameters:
      - type: object
        mapping: $.
