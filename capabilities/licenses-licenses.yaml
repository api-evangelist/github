naftiko: 1.0.0-alpha2
info:
  label: GitHub Licenses API — Licenses
  description: 'GitHub Licenses API — Licenses. 1 operations. Lead operation: GitHub Get License. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Licenses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: licenses-licenses
    baseUri: ''
    description: GitHub Licenses API — Licenses business capability. Self-contained, no shared references.
    resources:
    - name: licenses-license
      path: /licenses/{license}
      operations:
      - name: getlicense
        method: GET
        description: GitHub Get License
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: license
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: licenses-licenses-rest
    port: 8080
    description: REST adapter for GitHub Licenses API — Licenses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/licenses/{license}
      name: licenses-license
      description: REST surface for licenses-license.
      operations:
      - method: GET
        name: getlicense
        description: GitHub Get License
        call: licenses-licenses.getlicense
        with:
          license: rest.license
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: licenses-licenses-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Licenses API — Licenses. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-license
      description: GitHub Get License
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: licenses-licenses.getlicense
      with:
        license: tools.license
      outputParameters:
      - type: object
        mapping: $.
