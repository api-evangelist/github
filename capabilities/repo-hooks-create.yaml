    namespace: repo-hooks-create-rest
    port: 8080
    description: REST adapter for github-repo-hooks-api — Create. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/hooks
      name: repos-owner-repo-hooks
      description: REST surface for repos-owner-repo-hooks.
      operations:
      - method: POST
        name: createrepositorywebhook
        description: GitHub Create Repository Webhook
        call: repo-hooks-create.createrepositorywebhook
        with:
