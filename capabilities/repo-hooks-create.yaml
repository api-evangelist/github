    namespace: repo-hooks-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-hooks-api — Create. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-create-repository-webhook
      description: GitHub Create Repository Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-hooks-create.createrepositorywebhook
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
