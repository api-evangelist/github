  - type: http
    namespace: repo-hooks-create
    baseUri: ''
    description: github-repo-hooks-api — Create business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-hooks
      path: /repos/{owner}/{repo}/hooks
      operations:
      - name: createrepositorywebhook
        method: POST
        description: GitHub Create Repository Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
