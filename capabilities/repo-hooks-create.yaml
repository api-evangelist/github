naftiko: 1.0.0-alpha2
info:
  label: github-repo-hooks-api — Create
  description: 'github-repo-hooks-api — Create. 1 operations. Lead operation: GitHub Create Repository Webhook. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
