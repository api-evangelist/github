naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Events
  description: 'GitHub Org API — Events. 1 operations. Lead operation: GitHub List Public Organization Events. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-events
    baseUri: ''
    description: GitHub Org API — Events business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-events
      path: /orgs/{org}/events
      operations:
      - name: listpublicorganizationevents
        method: GET
        description: GitHub List Public Organization Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-events-rest
    port: 8080
    description: REST adapter for GitHub Org API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/events
      name: orgs-org-events
      description: REST surface for orgs-org-events.
      operations:
      - method: GET
        name: listpublicorganizationevents
        description: GitHub List Public Organization Events
        call: organizations-events.listpublicorganizationevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-public-organization-events
      description: GitHub List Public Organization Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organizations-events.listpublicorganizationevents
      outputParameters:
      - type: object
        mapping: $.
