naftiko: 1.0.0-alpha2
info:
  label: GitHub Auth API — Lists
  description: 'GitHub Auth API — Lists. 1 operations. Lead operation: GitHub List Your Authorizations. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth-lists
    baseUri: ''
    description: GitHub Auth API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: authorizations
      path: /authorizations
      operations:
      - name: listyourauthorizations
        method: GET
        description: GitHub List Your Authorizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: client_id
          in: query
          type: string
          description: The client ID of your GitHub app.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: auth-lists-rest
    port: 8080
    description: REST adapter for GitHub Auth API — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/authorizations
      name: authorizations
      description: REST surface for authorizations.
      operations:
      - method: GET
        name: listyourauthorizations
        description: GitHub List Your Authorizations
        call: auth-lists.listyourauthorizations
        with:
          client_id: rest.client_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Auth API — Lists. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-your-authorizations
      description: GitHub List Your Authorizations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: auth-lists.listyourauthorizations
      with:
        client_id: tools.client_id
      outputParameters:
      - type: object
        mapping: $.
