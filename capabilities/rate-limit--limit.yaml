naftiko: 1.0.0-alpha2
info:
  label: GitHub Rate Limit API — Limit
  description: 'GitHub Rate Limit API — Limit. 1 operations. Lead operation: GitHub Get Rate Limit. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Limit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: rate-limit--limit
    baseUri: ''
    description: GitHub Rate Limit API — Limit business capability. Self-contained, no shared references.
    resources:
    - name: rate_limit
      path: /rate_limit
      operations:
      - name: getratelimit
        method: GET
        description: GitHub Get Rate Limit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: rate-limit--limit-rest
    port: 8080
    description: REST adapter for GitHub Rate Limit API — Limit. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/rate-limit
      name: rate-limit
      description: REST surface for rate_limit.
      operations:
      - method: GET
        name: getratelimit
        description: GitHub Get Rate Limit
        call: rate-limit--limit.getratelimit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rate-limit--limit-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Rate Limit API — Limit. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-rate-limit
      description: GitHub Get Rate Limit
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rate-limit--limit.getratelimit
      outputParameters:
      - type: object
        mapping: $.
