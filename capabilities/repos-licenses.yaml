naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Licenses
  description: 'github-repos-api — Licenses. 1 operations. Lead operation: GitHub Get the License for Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Licenses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repos-licenses
    baseUri: http://localhost:8080/rest/github-repos-api/1.1.4
    description: github-repos-api — Licenses business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-license
      path: /repos/{owner}/{repo}/license
      operations:
      - name: getthelicenseforrepository
        method: GET
        description: GitHub Get the License for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repos-licenses-rest
    port: 8080
    description: REST adapter for github-repos-api — Licenses. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/license
      name: repos-owner-repo-license
      description: REST surface for repos-owner-repo-license.
      operations:
      - method: GET
        name: getthelicenseforrepository
        description: GitHub Get the License for Repository
        call: repos-licenses.getthelicenseforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repos-licenses-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Licenses. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-license-repository
      description: GitHub Get the License for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repos-licenses.getthelicenseforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
