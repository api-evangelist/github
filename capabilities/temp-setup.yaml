naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Setup
  description: 'GitHub Repos API — Setup. 2 operations. Lead operation: Get Code Scanning Default Setup Configuration. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Setup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-setup
    baseUri: ''
    description: GitHub Repos API — Setup business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-code-scanning-default-setup
      path: /repos/{owner}/{repo}/code-scanning/default-setup
      operations:
      - name: getcodescanningdefaultsetupconfiguration
        method: GET
        description: Get Code Scanning Default Setup Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: updatecodescanningdefaultsetupconfiguration
        method: PATCH
        description: Update Code Scanning Default Setup Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-setup-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Setup. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/code-scanning/default-setup
      name: repos-owner-repo-code-scanning-default-setup
      description: REST surface for repos-owner-repo-code-scanning-default-setup.
      operations:
      - method: GET
        name: getcodescanningdefaultsetupconfiguration
        description: Get Code Scanning Default Setup Configuration
        call: temp-setup.getcodescanningdefaultsetupconfiguration
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecodescanningdefaultsetupconfiguration
        description: Update Code Scanning Default Setup Configuration
        call: temp-setup.updatecodescanningdefaultsetupconfiguration
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-setup-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Setup. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-code-scanning-default-setup
      description: Get Code Scanning Default Setup Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-setup.getcodescanningdefaultsetupconfiguration
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: update-code-scanning-default-setup
      description: Update Code Scanning Default Setup Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: temp-setup.updatecodescanningdefaultsetupconfiguration
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
