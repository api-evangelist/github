naftiko: 1.0.0-alpha2
info:
  label: GitHub Application API — Configuration
  description: 'GitHub Application API — Configuration. 2 operations. Lead operation: GitHub Getwebhook Configuration for
    an App. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-configuration
    baseUri: ''
    description: GitHub Application API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: app-hook-config
      path: /app/hook/config
      operations:
      - name: getwebhookconfigurationforanapp
        method: GET
        description: GitHub Getwebhook Configuration for an App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatewebhookconfigurationforanapp
        method: PATCH
        description: GitHub Updatewebhook Configuration for an App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-configuration-rest
    port: 8080
    description: REST adapter for GitHub Application API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/hook/config
      name: app-hook-config
      description: REST surface for app-hook-config.
      operations:
      - method: GET
        name: getwebhookconfigurationforanapp
        description: GitHub Getwebhook Configuration for an App
        call: app-configuration.getwebhookconfigurationforanapp
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatewebhookconfigurationforanapp
        description: GitHub Updatewebhook Configuration for an App
        call: app-configuration.updatewebhookconfigurationforanapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Configuration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-getwebhook-configuration-app
      description: GitHub Getwebhook Configuration for an App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-configuration.getwebhookconfigurationforanapp
      outputParameters:
      - type: object
        mapping: $.
    - name: github-updatewebhook-configuration-app
      description: GitHub Updatewebhook Configuration for an App
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: app-configuration.updatewebhookconfigurationforanapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
