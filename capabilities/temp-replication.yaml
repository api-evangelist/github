naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Replication
  description: 'GitHub Repos API — Replication. 1 operations. Lead operation: List Repository Cache Replication Status. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Replication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-replication
    baseUri: ''
    description: GitHub Repos API — Replication business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-replicas-caches
      path: /repos/{owner}/{repo}/replicas/caches
      operations:
      - name: listrepositorycachereplicationstatus
        method: GET
        description: List Repository Cache Replication Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-replication-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Replication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/replicas/caches
      name: repos-owner-repo-replicas-caches
      description: REST surface for repos-owner-repo-replicas-caches.
      operations:
      - method: GET
        name: listrepositorycachereplicationstatus
        description: List Repository Cache Replication Status
        call: temp-replication.listrepositorycachereplicationstatus
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-replication-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Replication. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-repository-cache-replication-status
      description: List Repository Cache Replication Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-replication.listrepositorycachereplicationstatus
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
