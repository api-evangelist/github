naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Invitations
  description: 'github-repos-api — Invitations. 1 operations. Lead operation: GitHub List Repository Invitations. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Invitations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-invitations-invitations
    baseUri: ''
    description: github-repos-api — Invitations business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-invitations
      path: /repos/{owner}/{repo}/invitations
      operations:
      - name: listrepositoryinvitations
        method: GET
        description: GitHub List Repository Invitations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-invitations-invitations-rest
    port: 8080
    description: REST adapter for github-repos-api — Invitations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/invitations
      name: repos-owner-repo-invitations
      description: REST surface for repos-owner-repo-invitations.
      operations:
      - method: GET
        name: listrepositoryinvitations
        description: GitHub List Repository Invitations
        call: repo-invitations-invitations.listrepositoryinvitations
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-invitations-invitations-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Invitations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-repository-invitations
      description: GitHub List Repository Invitations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-invitations-invitations.listrepositoryinvitations
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
