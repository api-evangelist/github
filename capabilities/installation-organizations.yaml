naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Organizations
  description: 'GitHub Installation API — Organizations. 2 operations. Lead operation: GitHub Get an Organization Installation
    for the Authenticated App. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Organizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-organizations
    baseUri: ''
    description: GitHub Installation API — Organizations business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-installation
      path: /orgs/{org}/installation
      operations:
      - name: getanorganizationinstallationfortheauthenticatedapp
        method: GET
        description: GitHub Get an Organization Installation for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orgs-org-installations
      path: /orgs/{org}/installations
      operations:
      - name: listappinstallationsforanorganization
        method: GET
        description: GitHub List App Installations for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-organizations-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Organizations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orgs/{org}/installation
      name: orgs-org-installation
      description: REST surface for orgs-org-installation.
      operations:
      - method: GET
        name: getanorganizationinstallationfortheauthenticatedapp
        description: GitHub Get an Organization Installation for the Authenticated App
        call: installation-organizations.getanorganizationinstallationfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org}/installations
      name: orgs-org-installations
      description: REST surface for orgs-org-installations.
      operations:
      - method: GET
        name: listappinstallationsforanorganization
        description: GitHub List App Installations for an Organization
        call: installation-organizations.listappinstallationsforanorganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-organizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Organizations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-organization-installation-authenticated
      description: GitHub Get an Organization Installation for the Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: installation-organizations.getanorganizationinstallationfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
    - name: github-list-app-installations-organization
      description: GitHub List App Installations for an Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: installation-organizations.listappinstallationsforanorganization
      outputParameters:
      - type: object
        mapping: $.
