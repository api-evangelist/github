naftiko: 1.0.0-alpha2
info:
  label: GitHub Gists API — Update
  description: 'GitHub Gists API — Update. 2 operations. Lead operation: GitHub Updategist. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gists-update
    baseUri: ''
    description: GitHub Gists API — Update business capability. Self-contained, no shared references.
    resources:
    - name: gists-gist_id
      path: /gists/{gist_id}
      operations:
      - name: updategist
        method: PATCH
        description: GitHub Updategist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: gists-gist_id-comments-comment_id
      path: /gists/{gist_id}/comments/{comment_id}
      operations:
      - name: updategistcomment
        method: PATCH
        description: GitHub Updategist Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: gists-update-rest
    port: 8080
    description: REST adapter for GitHub Gists API — Update. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gists/{gist-id}
      name: gists-gist-id
      description: REST surface for gists-gist_id.
      operations:
      - method: PATCH
        name: updategist
        description: GitHub Updategist
        call: gists-update.updategist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gists/{gist-id}/comments/{comment-id}
      name: gists-gist-id-comments-comment-id
      description: REST surface for gists-gist_id-comments-comment_id.
      operations:
      - method: PATCH
        name: updategistcomment
        description: GitHub Updategist Comment
        call: gists-update.updategistcomment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gists-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Gists API — Update. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-updategist
      description: GitHub Updategist
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gists-update.updategist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-updategist-comment
      description: GitHub Updategist Comment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gists-update.updategistcomment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
