naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Contributor
  description: 'GitHub Repos API — Contributor. 1 operations. Lead operation: Get All Contributor Commit Activity. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Contributor
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-contributor
    baseUri: ''
    description: GitHub Repos API — Contributor business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-stats-contributors
      path: /repos/{owner}/{repo}/stats/contributors
      operations:
      - name: getallcontributorcommitactivity
        method: GET
        description: Get All Contributor Commit Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-contributor-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Contributor. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/stats/contributors
      name: repos-owner-repo-stats-contributors
      description: REST surface for repos-owner-repo-stats-contributors.
      operations:
      - method: GET
        name: getallcontributorcommitactivity
        description: Get All Contributor Commit Activity
        call: temp-contributor.getallcontributorcommitactivity
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-contributor-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Contributor. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-contributor-commit-activity
      description: Get All Contributor Commit Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-contributor.getallcontributorcommitactivity
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
