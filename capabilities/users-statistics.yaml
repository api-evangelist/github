naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Statistics
  description: 'GitHub User API — Statistics. 1 operations. Lead operation: GitHub Get Users Statistics. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Statistics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-statistics
    baseUri: ''
    description: GitHub User API — Statistics business capability. Self-contained, no shared references.
    resources:
    - name: enterprise-stats-users
      path: /enterprise/stats/users
      operations:
      - name: getusersstatistics
        method: GET
        description: GitHub Get Users Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-statistics-rest
    port: 8080
    description: REST adapter for GitHub User API — Statistics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/enterprise/stats/users
      name: enterprise-stats-users
      description: REST surface for enterprise-stats-users.
      operations:
      - method: GET
        name: getusersstatistics
        description: GitHub Get Users Statistics
        call: users-statistics.getusersstatistics
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-statistics-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Statistics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-users-statistics
      description: GitHub Get Users Statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-statistics.getusersstatistics
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
