      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-watched-rest
    port: 8080
    description: REST adapter for GitHub User API — Watched. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
