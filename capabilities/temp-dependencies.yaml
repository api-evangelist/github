naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Dependencies
  description: 'GitHub Repos API — Dependencies. 2 operations. Lead operation: Get Diff Of The Dependencies Between Commits.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Dependencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-dependencies
    baseUri: ''
    description: GitHub Repos API — Dependencies business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-dependency-graph-compare-basehead
      path: /repos/{owner}/{repo}/dependency-graph/compare/{basehead}
      operations:
      - name: getdiffofthedependenciesbetweencommits
        method: GET
        description: Get Diff Of The Dependencies Between Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: basehead
          in: path
          type: string
          description: The base and head Git revisions to compare. The Git revisions will be resolved to commit SHAs. Named
            revisions will be resolved to their corresponding HEAD comm
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-dependency-graph-snapshots
      path: /repos/{owner}/{repo}/dependency-graph/snapshots
      operations:
      - name: createsnapshotofdependenciesforrepository
        method: POST
        description: Create Snapshot Of Dependencies For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-dependencies-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Dependencies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/dependency-graph/compare/{basehead}
      name: repos-owner-repo-dependency-graph-compare-basehead
      description: REST surface for repos-owner-repo-dependency-graph-compare-basehead.
      operations:
      - method: GET
        name: getdiffofthedependenciesbetweencommits
        description: Get Diff Of The Dependencies Between Commits
        call: temp-dependencies.getdiffofthedependenciesbetweencommits
        with:
          basehead: rest.basehead
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/dependency-graph/snapshots
      name: repos-owner-repo-dependency-graph-snapshots
      description: REST surface for repos-owner-repo-dependency-graph-snapshots.
      operations:
      - method: POST
        name: createsnapshotofdependenciesforrepository
        description: Create Snapshot Of Dependencies For Repository
        call: temp-dependencies.createsnapshotofdependenciesforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-dependencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Dependencies. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-diff-dependencies-between-commits
      description: Get Diff Of The Dependencies Between Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-dependencies.getdiffofthedependenciesbetweencommits
      with:
        basehead: tools.basehead
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: create-snapshot-dependencies-repository
      description: Create Snapshot Of Dependencies For Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-dependencies.createsnapshotofdependenciesforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
