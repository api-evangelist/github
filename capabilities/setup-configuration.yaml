naftiko: 1.0.0-alpha2
info:
  label: GitHub Setup API — Configuration
  description: 'GitHub Setup API — Configuration. 2 operations. Lead operation: GitHub Get the Configuration Status. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: setup-configuration
    baseUri: ''
    description: GitHub Setup API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: setup-api-configcheck
      path: /setup/api/configcheck
      operations:
      - name: gettheconfigurationstatus
        method: GET
        description: GitHub Get the Configuration Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: setup-api-configure
      path: /setup/api/configure
      operations:
      - name: startconfigurationprocess
        method: POST
        description: GitHub Start Configuration Process
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: setup-configuration-rest
    port: 8080
    description: REST adapter for GitHub Setup API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/setup/api/configcheck
      name: setup-api-configcheck
      description: REST surface for setup-api-configcheck.
      operations:
      - method: GET
        name: gettheconfigurationstatus
        description: GitHub Get the Configuration Status
        call: setup-configuration.gettheconfigurationstatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/setup/api/configure
      name: setup-api-configure
      description: REST surface for setup-api-configure.
      operations:
      - method: POST
        name: startconfigurationprocess
        description: GitHub Start Configuration Process
        call: setup-configuration.startconfigurationprocess
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: setup-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Setup API — Configuration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-configuration-status
      description: GitHub Get the Configuration Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: setup-configuration.gettheconfigurationstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: github-start-configuration-process
      description: GitHub Start Configuration Process
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: setup-configuration.startconfigurationprocess
      outputParameters:
      - type: object
        mapping: $.
