        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unstargist
        method: DELETE
        description: Unstar a gist.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
