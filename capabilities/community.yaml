naftiko: 1.0.0-alpha2
info:
  label: GitHub Community
  description: Unified workflow for community engagement combining gists, user profiles, organizations, and team discussions.
    Used by community managers, developer advocates, and open source maintainers for community management and engagement.
  tags:
  - GitHub
  - Community
  - Gists
  - Users
  - Organizations
  - Discussions
  personas:
  - community managers
  - developer advocates
  - open source maintainers
  created: '2026-04-17'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GITHUB_TOKEN: GITHUB_TOKEN
capability:
  consumes:
  - type: http
    namespace: github-gists
    baseUri: https://api.github.com
    description: GitHub REST API for gists, gist comments, forks, and stars.
    authentication:
      type: bearer
      token: '{{GITHUB_TOKEN}}'
    resources:
    - name: gists
      path: /gists
      description: Gist CRUD and listing.
      operations:
      - name: listPublicGists
        method: GET
        description: List public gists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listStarredGists
        method: GET
        path: /gists/starred
        description: List starred gists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getgist
        method: GET
        path: /gists/{gist_id}
        description: Get a gist.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategist
        method: PATCH
        path: /gists/{gist_id}
        description: Update a gist.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletegist
        method: DELETE
        path: /gists/{gist_id}
        description: Delete a gist.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getgistRevision
        method: GET
        path: /gists/{gist_id}/{sha}
        description: Get a gist revision.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gist-comments
      path: /gists/{gist_id}/comments
      description: Gist comment management.
      operations:
      - name: listGistComments
        method: GET
        description: List gist comments.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategistComment
        method: POST
        description: Create a gist comment.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getgistComment
        method: GET
        path: /gists/{gist_id}/comments/{comment_id}
        description: Get a gist comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategistComment
        method: PATCH
        path: /gists/{gist_id}/comments/{comment_id}
        description: Update a gist comment.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletegistComment
        method: DELETE
        path: /gists/{gist_id}/comments/{comment_id}
        description: Delete a gist comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gist-forks
      path: /gists/{gist_id}/forks
      description: Gist fork management.
      operations:
      - name: listGistForks
        method: GET
        description: List gist forks.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: forkgist
        method: POST
        description: Fork a gist.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gist-stars
      path: /gists/{gist_id}/star
