naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Outside
  description: 'GitHub Repos API — Outside. 2 operations. Lead operation: Get The Level Of Access For Workflows Outside Of
    The Repository. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Outside
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-outside
    baseUri: ''
    description: GitHub Repos API — Outside business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-permissions-access
      path: /repos/{owner}/{repo}/actions/permissions/access
      operations:
      - name: getthelevelofaccessforworkflowsoutsideoftherepository
        method: GET
        description: Get The Level Of Access For Workflows Outside Of The Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: setthelevelofaccessforworkflowsoutsideoftherepository
        method: PUT
        description: Set The Level Of Access For Workflows Outside Of The Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-outside-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Outside. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/permissions/access
      name: repos-owner-repo-actions-permissions-access
      description: REST surface for repos-owner-repo-actions-permissions-access.
      operations:
      - method: GET
        name: getthelevelofaccessforworkflowsoutsideoftherepository
        description: Get The Level Of Access For Workflows Outside Of The Repository
        call: temp-outside.getthelevelofaccessforworkflowsoutsideoftherepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setthelevelofaccessforworkflowsoutsideoftherepository
        description: Set The Level Of Access For Workflows Outside Of The Repository
        call: temp-outside.setthelevelofaccessforworkflowsoutsideoftherepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-outside-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Outside. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-level-access-workflows-outside
      description: Get The Level Of Access For Workflows Outside Of The Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-outside.getthelevelofaccessforworkflowsoutsideoftherepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: set-level-access-workflows-outside
      description: Set The Level Of Access For Workflows Outside Of The Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: temp-outside.setthelevelofaccessforworkflowsoutsideoftherepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
