naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Update
  description: 'github-repos-api — Update. 1 operations. Lead operation: GitHub Update Repository Invitation. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-invitations-update
    baseUri: ''
    description: github-repos-api — Update business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-invitations-invitation_id
      path: /repos/{owner}/{repo}/invitations/{invitation_id}
      operations:
      - name: updaterepositoryinvitation
        method: PATCH
        description: GitHub Update Repository Invitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-invitations-update-rest
    port: 8080
    description: REST adapter for github-repos-api — Update. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/invitations/{invitation-id}
      name: repos-owner-repo-invitations-invitation-id
      description: REST surface for repos-owner-repo-invitations-invitation_id.
      operations:
      - method: PATCH
        name: updaterepositoryinvitation
        description: GitHub Update Repository Invitation
        call: repo-invitations-update.updaterepositoryinvitation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-invitations-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Update. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-update-repository-invitation
      description: GitHub Update Repository Invitation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-invitations-update.updaterepositoryinvitation
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
