naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Sites
  description: 'GitHub User API — Sites. 2 operations. Lead operation: GitHub Promote User to Be Site Administrator. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Sites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-sites
    baseUri: ''
    description: GitHub User API — Sites business capability. Self-contained, no shared references.
    resources:
    - name: users-username-site_admin
      path: /users/{username}/site_admin
      operations:
      - name: promoteusertobesiteadministrator
        method: PUT
        description: GitHub Promote User to Be Site Administrator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: demotesiteadministrator
        method: DELETE
        description: GitHub Demote Site Administrator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-sites-rest
    port: 8080
    description: REST adapter for GitHub User API — Sites. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users/{username}/site-admin
      name: users-username-site-admin
      description: REST surface for users-username-site_admin.
      operations:
      - method: PUT
        name: promoteusertobesiteadministrator
        description: GitHub Promote User to Be Site Administrator
        call: users-sites.promoteusertobesiteadministrator
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: demotesiteadministrator
        description: GitHub Demote Site Administrator
        call: users-sites.demotesiteadministrator
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-sites-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Sites. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-promote-user-be-site
      description: GitHub Promote User to Be Site Administrator
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: users-sites.promoteusertobesiteadministrator
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-demote-site-administrator
      description: GitHub Demote Site Administrator
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: users-sites.demotesiteadministrator
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
