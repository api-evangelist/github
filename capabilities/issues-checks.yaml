naftiko: 1.0.0-alpha2
info:
  label: GitHub Issues API — Checks
  description: 'GitHub Issues API — Checks. 1 operations. Lead operation: GitHub Check if User Can Be Assigned to Issue. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Checks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: issues-checks
    baseUri: ''
    description: GitHub Issues API — Checks business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-issue_number-assignees-assignee
      path: /repos/{owner}/{repo}/issues/{issue_number}/assignees/{assignee}
      operations:
      - name: checkifusercanbeassignedtoissue
        method: GET
        description: GitHub Check if User Can Be Assigned to Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assignee
          in: path
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: issues-checks-rest
    port: 8080
    description: REST adapter for GitHub Issues API — Checks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/{issue-number}/assignees/{assignee}
      name: repos-owner-repo-issues-issue-number-assignees-assignee
      description: REST surface for repos-owner-repo-issues-issue_number-assignees-assignee.
      operations:
      - method: GET
        name: checkifusercanbeassignedtoissue
        description: GitHub Check if User Can Be Assigned to Issue
        call: issues-checks.checkifusercanbeassignedtoissue
        with:
          assignee: rest.assignee
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issues-checks-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Issues API — Checks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-check-if-user-can
      description: GitHub Check if User Can Be Assigned to Issue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issues-checks.checkifusercanbeassignedtoissue
      with:
        assignee: tools.assignee
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
