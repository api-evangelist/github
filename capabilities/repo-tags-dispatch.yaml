naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Dispatch
  description: 'github-repos-api — Dispatch. 1 operations. Lead operation: GitHub Create Repository Dispatch Event. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Dispatch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-dispatch
    baseUri: ''
    description: github-repos-api — Dispatch business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-dispatches
      path: /repos/{owner}/{repo}/dispatches
      operations:
      - name: createrepositorydispatchevent
        method: POST
        description: GitHub Create Repository Dispatch Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-dispatch-rest
    port: 8080
    description: REST adapter for github-repos-api — Dispatch. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/dispatches
      name: repos-owner-repo-dispatches
      description: REST surface for repos-owner-repo-dispatches.
      operations:
      - method: POST
        name: createrepositorydispatchevent
        description: GitHub Create Repository Dispatch Event
        call: repo-tags-dispatch.createrepositorydispatchevent
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-dispatch-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Dispatch. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-create-repository-dispatch-event
      description: GitHub Create Repository Dispatch Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-tags-dispatch.createrepositorydispatchevent
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
