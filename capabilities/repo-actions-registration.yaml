naftiko: 1.0.0-alpha2
info:
  label: github-repo-actions-api — Registration
  description: 'github-repo-actions-api — Registration. 1 operations. Lead operation: GitHub Create Registration Token for
    Repository. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Registration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-actions-registration
    baseUri: ''
    description: github-repo-actions-api — Registration business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-runners-registration-token
      path: /repos/{owner}/{repo}/actions/runners/registration-token
      operations:
      - name: createregistrationtokenforrepository
        method: POST
        description: GitHub Create Registration Token for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-actions-registration-rest
    port: 8080
    description: REST adapter for github-repo-actions-api — Registration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/runners/registration-token
      name: repos-owner-repo-actions-runners-registration-token
      description: REST surface for repos-owner-repo-actions-runners-registration-token.
      operations:
      - method: POST
        name: createregistrationtokenforrepository
        description: GitHub Create Registration Token for Repository
        call: repo-actions-registration.createregistrationtokenforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-actions-registration-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-actions-api — Registration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-create-registration-token-repository
      description: GitHub Create Registration Token for Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-actions-registration.createregistrationtokenforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
