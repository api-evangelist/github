naftiko: 1.0.0-alpha2
info:
  label: GitHub CI/CD
  description: Unified workflow for continuous integration and deployment combining GitHub Actions workflows, runs, jobs,
    artifacts, and repository management. Used by DevOps engineers for pipeline management, build monitoring, and deployment
    automation.
  tags:
  - GitHub
  - CI/CD
  - Actions
  - Workflows
  - DevOps
  - Deployments
  personas:
  - devops engineers
  - release managers
  - platform engineers
  created: '2026-04-17'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GITHUB_TOKEN: GITHUB_TOKEN
