  exposes:
  - type: rest
    port: 8081
    namespace: github-ci-cd-api
    description: Unified REST API for CI/CD workflows combining Actions and repository management.
    resources:
    - path: /v1/repositories/{owner}/{repo}/workflows
      name: workflows
      description: Workflow listing and dispatch
      operations:
      - method: GET
        name: listRepositoryWorkflows
        description: List workflows
        call: github-actions.listRepositoryWorkflows
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/workflows/{workflow_id}
      name: workflow
      description: Individual workflow operations
      operations:
      - method: GET
        name: getWorkflow
        description: Get a workflow
        call: github-actions.getWorkflow
        with:
          workflow_id: rest.workflow_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/workflows/{workflow_id}/dispatches
      name: workflow-dispatch
      description: Trigger workflow runs
      operations:
      - method: POST
        name: createWorkflowDispatchEvent
        description: Dispatch a workflow
        call: github-actions.createWorkflowDispatchEvent
        with:
          workflow_id: rest.workflow_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/runs
      name: runs
      description: Workflow run management
      operations:
      - method: GET
        name: listWorkflowRunsForRepository
        description: List workflow runs
        call: github-actions.listWorkflowRunsForRepository
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/runs/{run_id}
      name: run
      description: Individual run operations
      operations:
      - method: GET
        name: getWorkflowRun
        description: Get a workflow run
        call: github-actions.getWorkflowRun
        with:
          run_id: rest.run_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/runs/{run_id}/cancel
      name: run-cancel
      description: Cancel a workflow run
      operations:
      - method: POST
        name: cancelWorkflowRun
        description: Cancel a workflow run
        call: github-actions.cancelWorkflowRun
        with:
          run_id: rest.run_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/runs/{run_id}/jobs
      name: jobs
      description: Workflow run jobs
      operations:
      - method: GET
        name: listJobsForWorkflowRun
        description: List jobs
        call: github-actions.listJobsForWorkflowRun
        with:
          run_id: rest.run_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/artifacts
      name: artifacts
      description: Artifact management
      operations:
      - method: GET
        name: listArtifactsForRepository
        description: List artifacts
        call: github-actions.listArtifactsForRepository
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/secrets
      name: secrets
      description: Secret management
      operations:
      - method: GET
        name: listRepositorySecrets
        description: List secrets
        call: github-actions.listRepositorySecrets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/deployments
      name: deployments
