naftiko: 1.0.0-alpha2
info:
  label: GitHub Gists API — Comments
  description: 'GitHub Gists API — Comments. 1 operations. Lead operation: GitHub List Gist Comments. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Comments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gists-comments
    baseUri: ''
    description: GitHub Gists API — Comments business capability. Self-contained, no shared references.
    resources:
    - name: gists-gist_id-comments
      path: /gists/{gist_id}/comments
      operations:
      - name: listgistcomments
        method: GET
        description: GitHub List Gist Comments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: gists-comments-rest
    port: 8080
    description: REST adapter for GitHub Gists API — Comments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gists/{gist-id}/comments
      name: gists-gist-id-comments
      description: REST surface for gists-gist_id-comments.
      operations:
      - method: GET
        name: listgistcomments
        description: GitHub List Gist Comments
        call: gists-comments.listgistcomments
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gists-comments-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Gists API — Comments. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-gist-comments
      description: GitHub List Gist Comments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gists-comments.listgistcomments
      outputParameters:
      - type: object
        mapping: $.
