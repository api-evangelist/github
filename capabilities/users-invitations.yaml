naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Invitations
  description: 'GitHub User API — Invitations. 1 operations. Lead operation: GitHub List Repository Invitations for the Authenticated
    User. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Invitations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-invitations
    baseUri: ''
    description: GitHub User API — Invitations business capability. Self-contained, no shared references.
    resources:
    - name: user-repository_invitations
      path: /user/repository_invitations
      operations:
      - name: listrepositoryinvitationsfortheauthenticateduser
        method: GET
        description: GitHub List Repository Invitations for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-invitations-rest
    port: 8080
    description: REST adapter for GitHub User API — Invitations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/repository-invitations
      name: user-repository-invitations
      description: REST surface for user-repository_invitations.
      operations:
      - method: GET
        name: listrepositoryinvitationsfortheauthenticateduser
        description: GitHub List Repository Invitations for the Authenticated User
        call: users-invitations.listrepositoryinvitationsfortheauthenticateduser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-invitations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Invitations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-repository-invitations-authenticated
      description: GitHub List Repository Invitations for the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-invitations.listrepositoryinvitationsfortheauthenticateduser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
