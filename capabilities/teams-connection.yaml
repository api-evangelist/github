naftiko: 1.0.0-alpha2
info:
  label: GitHub Teams API — Connection
  description: 'GitHub Teams API — Connection. 3 operations. Lead operation: GitHub List Connection Between an External Group
    and Team. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Connection
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: teams-connection
    baseUri: ''
    description: GitHub Teams API — Connection business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-teams-team_slug-external-groups
      path: /orgs/{org}/teams/{team_slug}/external-groups
      operations:
      - name: listconnectionbetweenanexternalgroupandteam
        method: GET
        description: GitHub List Connection Between an External Group and Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetheconnectionbetweenanexternalgroupandteam
        method: PATCH
        description: GitHub Update the Connection Between an External Group and Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removetheconnectionbetweenanexternalgroupandteam
        method: DELETE
        description: GitHub Remove the Connection Between an External Group and Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: teams-connection-rest
    port: 8080
    description: REST adapter for GitHub Teams API — Connection. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/teams/{team-slug}/external-groups
      name: orgs-org-teams-team-slug-external-groups
      description: REST surface for orgs-org-teams-team_slug-external-groups.
      operations:
      - method: GET
        name: listconnectionbetweenanexternalgroupandteam
        description: GitHub List Connection Between an External Group and Team
        call: teams-connection.listconnectionbetweenanexternalgroupandteam
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetheconnectionbetweenanexternalgroupandteam
        description: GitHub Update the Connection Between an External Group and Team
        call: teams-connection.updatetheconnectionbetweenanexternalgroupandteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removetheconnectionbetweenanexternalgroupandteam
        description: GitHub Remove the Connection Between an External Group and Team
        call: teams-connection.removetheconnectionbetweenanexternalgroupandteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teams-connection-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Teams API — Connection. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-connection-between-external
      description: GitHub List Connection Between an External Group and Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teams-connection.listconnectionbetweenanexternalgroupandteam
      outputParameters:
      - type: object
        mapping: $.
    - name: github-update-connection-between-external
      description: GitHub Update the Connection Between an External Group and Team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: teams-connection.updatetheconnectionbetweenanexternalgroupandteam
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-connection-between-external
      description: GitHub Remove the Connection Between an External Group and Team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: teams-connection.removetheconnectionbetweenanexternalgroupandteam
      outputParameters:
      - type: object
        mapping: $.
