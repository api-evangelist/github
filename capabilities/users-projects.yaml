naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Projects
  description: 'GitHub User API — Projects. 2 operations. Lead operation: GitHub Create User Project. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-projects
    baseUri: ''
    description: GitHub User API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: user-projects
      path: /user/projects
      operations:
      - name: createuserproject
        method: POST
        description: GitHub Create User Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-username-projects
      path: /users/{username}/projects
      operations:
      - name: listuserprojects
        method: GET
        description: GitHub List User Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Indicates the state of the projects to return.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-projects-rest
    port: 8080
    description: REST adapter for GitHub User API — Projects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/projects
      name: user-projects
      description: REST surface for user-projects.
      operations:
      - method: POST
        name: createuserproject
        description: GitHub Create User Project
        call: users-projects.createuserproject
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{username}/projects
      name: users-username-projects
      description: REST surface for users-username-projects.
      operations:
      - method: GET
        name: listuserprojects
        description: GitHub List User Projects
        call: users-projects.listuserprojects
        with:
          state: rest.state
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Projects. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-create-user-project
      description: GitHub Create User Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users-projects.createuserproject
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-list-user-projects
      description: GitHub List User Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-projects.listuserprojects
      with:
        state: tools.state
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
