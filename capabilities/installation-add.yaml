naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Add
  description: 'GitHub Installation API — Add. 1 operations. Lead operation: GitHub Add Repository to an App Installation.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-add
    baseUri: ''
    description: GitHub Installation API — Add business capability. Self-contained, no shared references.
    resources:
    - name: user-installations-installation_id-repositories-repository_id
      path: /user/installations/{installation_id}/repositories/{repository_id}
      operations:
      - name: addrepositorytoanappinstallation
        method: PUT
        description: GitHub Add Repository to an App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-add-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/installations/{installation-id}/repositories/{repository-id}
      name: user-installations-installation-id-repositories-repository-id
      description: REST surface for user-installations-installation_id-repositories-repository_id.
      operations:
      - method: PUT
        name: addrepositorytoanappinstallation
        description: GitHub Add Repository to an App Installation
        call: installation-add.addrepositorytoanappinstallation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Add. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-add-repository-app-installation
      description: GitHub Add Repository to an App Installation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: installation-add.addrepositorytoanappinstallation
      outputParameters:
      - type: object
        mapping: $.
