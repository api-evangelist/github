naftiko: 1.0.0-alpha2
info:
  label: GitHub Gists API — Unstar
  description: 'GitHub Gists API — Unstar. 1 operations. Lead operation: GitHub Unstargist. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Unstar
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gists-unstar
    baseUri: ''
    description: GitHub Gists API — Unstar business capability. Self-contained, no shared references.
    resources:
    - name: gists-gist_id-star
      path: /gists/{gist_id}/star
      operations:
      - name: unstargist
        method: DELETE
        description: GitHub Unstargist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: gists-unstar-rest
    port: 8080
    description: REST adapter for GitHub Gists API — Unstar. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gists/{gist-id}/star
      name: gists-gist-id-star
      description: REST surface for gists-gist_id-star.
      operations:
      - method: DELETE
        name: unstargist
        description: GitHub Unstargist
        call: gists-unstar.unstargist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gists-unstar-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Gists API — Unstar. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-unstargist
      description: GitHub Unstargist
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gists-unstar.unstargist
      outputParameters:
      - type: object
        mapping: $.
