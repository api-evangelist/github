naftiko: 1.0.0-alpha2
info:
  label: GitHub v3 REST API — Markdown
  description: 'GitHub v3 REST API — Markdown. 2 operations. Lead operation: GitHub Render a Markdown Document. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Markdown
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: github-markdown
    baseUri: ''
    description: GitHub v3 REST API — Markdown business capability. Self-contained, no shared references.
    resources:
    - name: markdown
      path: /markdown
      operations:
      - name: markdownrender
        method: POST
        description: GitHub Render a Markdown Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: markdown-raw
      path: /markdown/raw
      operations:
      - name: markdownrenderraw
        method: POST
        description: GitHub Render a Markdown Document in Raw Mode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: github-markdown-rest
    port: 8080
    description: REST adapter for GitHub v3 REST API — Markdown. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/markdown
      name: markdown
      description: REST surface for markdown.
      operations:
      - method: POST
        name: markdownrender
        description: GitHub Render a Markdown Document
        call: github-markdown.markdownrender
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/markdown/raw
      name: markdown-raw
      description: REST surface for markdown-raw.
      operations:
      - method: POST
        name: markdownrenderraw
        description: GitHub Render a Markdown Document in Raw Mode
        call: github-markdown.markdownrenderraw
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: github-markdown-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub v3 REST API — Markdown. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-render-markdown-document
      description: GitHub Render a Markdown Document
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: github-markdown.markdownrender
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-render-markdown-document-raw
      description: GitHub Render a Markdown Document in Raw Mode
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: github-markdown.markdownrenderraw
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
