naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Information
  description: 'github-repos-api — Information. 1 operations. Lead operation: GitHub Update Information About Github Enterprise
    Server Pages Site. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Information
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-information
    baseUri: ''
    description: github-repos-api — Information business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pages
      path: /repos/{owner}/{repo}/pages
      operations:
      - name: updateinformationaboutgithubenterpriseserverpagessite
        method: PUT
        description: GitHub Update Information About Github Enterprise Server Pages Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-information-rest
    port: 8080
    description: REST adapter for github-repos-api — Information. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pages
      name: repos-owner-repo-pages
      description: REST surface for repos-owner-repo-pages.
      operations:
      - method: PUT
        name: updateinformationaboutgithubenterpriseserverpagessite
        description: GitHub Update Information About Github Enterprise Server Pages Site
        call: repo-tags-information.updateinformationaboutgithubenterpriseserverpagessite
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-information-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Information. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-update-information-about-github
      description: GitHub Update Information About Github Enterprise Server Pages Site
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-information.updateinformationaboutgithubenterpriseserverpagessite
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
