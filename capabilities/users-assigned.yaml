naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Assigned
  description: 'GitHub User API — Assigned. 1 operations. Lead operation: GitHub List User Account Issues Assigned to the
    Authenticated User. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Assigned
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-assigned
    baseUri: ''
    description: GitHub User API — Assigned business capability. Self-contained, no shared references.
    resources:
    - name: user-issues
      path: /user/issues
      operations:
      - name: listuseraccountissuesassignedtotheauthenticateduser
        method: GET
        description: GitHub List User Account Issues Assigned to the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Indicates which sorts of issues to return. `assigned` means issues assigned to you. `created` means
            issues created by you. `mentioned` means issues mentioning y
        - name: state
          in: query
          type: string
          description: Indicates the state of the issues to return.
        - name: sort
          in: query
          type: string
          description: What to sort results by.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-assigned-rest
    port: 8080
    description: REST adapter for GitHub User API — Assigned. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/issues
      name: user-issues
      description: REST surface for user-issues.
      operations:
      - method: GET
        name: listuseraccountissuesassignedtotheauthenticateduser
        description: GitHub List User Account Issues Assigned to the Authenticated User
        call: users-assigned.listuseraccountissuesassignedtotheauthenticateduser
        with:
          filter: rest.filter
          state: rest.state
          sort: rest.sort
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-assigned-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Assigned. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-user-account-issues
      description: GitHub List User Account Issues Assigned to the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-assigned.listuseraccountissuesassignedtotheauthenticateduser
      with:
        filter: tools.filter
        state: tools.state
        sort: tools.sort
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
