naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Create
  description: 'github-repos-api — Create. 1 operations. Lead operation: GitHub Create Commit Signature Protection. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-branches-create
    baseUri: ''
    description: github-repos-api — Create business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-protection-required_signatures
      path: /repos/{owner}/{repo}/branches/{branch}/protection/required_signatures
      operations:
      - name: createcommitsignatureprotection
        method: POST
        description: GitHub Create Commit Signature Protection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
