    namespace: repo-branches-create-rest
    port: 8080
    description: REST adapter for github-repos-api — Create. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/protection/required-signatures
      name: repos-owner-repo-branches-branch-protection-required-signatures
      description: REST surface for repos-owner-repo-branches-branch-protection-required_signatures.
      operations:
      - method: POST
        name: createcommitsignatureprotection
        description: GitHub Create Commit Signature Protection
        call: repo-branches-create.createcommitsignatureprotection
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-branches-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Create. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-create-commit-signature-protection
      description: GitHub Create Commit Signature Protection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-branches-create.createcommitsignatureprotection
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
