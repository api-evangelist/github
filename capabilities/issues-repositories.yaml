naftiko: 1.0.0-alpha2
info:
  label: GitHub Issues API — Repositories
  description: 'GitHub Issues API — Repositories. 2 operations. Lead operation: GitHub List Issue Comments for Repository.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Repositories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: issues-repositories
    baseUri: ''
    description: GitHub Issues API — Repositories business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-comments
      path: /repos/{owner}/{repo}/issues/comments
      operations:
      - name: listissuecommentsforrepository
        method: GET
        description: GitHub List Issue Comments for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: direction
          in: query
          type: string
          description: Either `asc` or `desc`. Ignored without the `sort` parameter.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-issues-events
      path: /repos/{owner}/{repo}/issues/events
      operations:
      - name: listissueeventsforrepository
        method: GET
        description: GitHub List Issue Events for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: issues-repositories-rest
    port: 8080
    description: REST adapter for GitHub Issues API — Repositories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/comments
      name: repos-owner-repo-issues-comments
      description: REST surface for repos-owner-repo-issues-comments.
      operations:
      - method: GET
        name: listissuecommentsforrepository
        description: GitHub List Issue Comments for Repository
        call: issues-repositories.listissuecommentsforrepository
        with:
          direction: rest.direction
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/issues/events
      name: repos-owner-repo-issues-events
      description: REST surface for repos-owner-repo-issues-events.
      operations:
      - method: GET
        name: listissueeventsforrepository
        description: GitHub List Issue Events for Repository
        call: issues-repositories.listissueeventsforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issues-repositories-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Issues API — Repositories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-list-issue-comments-repository
      description: GitHub List Issue Comments for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issues-repositories.listissuecommentsforrepository
      with:
        direction: tools.direction
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-list-issue-events-repository
      description: GitHub List Issue Events for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issues-repositories.listissueeventsforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
