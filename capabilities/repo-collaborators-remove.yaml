naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Remove
  description: 'github-repos-api — Remove. 1 operations. Lead operation: GitHub Remove Repository Collaborator. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-collaborators-remove
    baseUri: ''
    description: github-repos-api — Remove business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-collaborators-username
      path: /repos/{owner}/{repo}/collaborators/{username}
      operations:
      - name: removerepositorycollaborator
        method: DELETE
        description: GitHub Remove Repository Collaborator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-collaborators-remove-rest
    port: 8080
    description: REST adapter for github-repos-api — Remove. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/collaborators/{username}
      name: repos-owner-repo-collaborators-username
      description: REST surface for repos-owner-repo-collaborators-username.
      operations:
      - method: DELETE
        name: removerepositorycollaborator
        description: GitHub Remove Repository Collaborator
        call: repo-collaborators-remove.removerepositorycollaborator
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-collaborators-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Remove. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-remove-repository-collaborator
      description: GitHub Remove Repository Collaborator
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-collaborators-remove.removerepositorycollaborator
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
