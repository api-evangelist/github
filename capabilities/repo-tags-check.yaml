naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Check
  description: 'github-repos-api — Check. 1 operations. Lead operation: GitHub Check if User Can Be Assigned. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Check
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-check
    baseUri: ''
    description: github-repos-api — Check business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-assignees-assignee
      path: /repos/{owner}/{repo}/assignees/{assignee}
      operations:
      - name: checkifusercanbeassigned
        method: GET
        description: GitHub Check if User Can Be Assigned
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assignee
          in: path
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-check-rest
    port: 8080
    description: REST adapter for github-repos-api — Check. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/assignees/{assignee}
      name: repos-owner-repo-assignees-assignee
      description: REST surface for repos-owner-repo-assignees-assignee.
      operations:
      - method: GET
        name: checkifusercanbeassigned
        description: GitHub Check if User Can Be Assigned
        call: repo-tags-check.checkifusercanbeassigned
        with:
          assignee: rest.assignee
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-check-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Check. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-check-if-user-can
      description: GitHub Check if User Can Be Assigned
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-check.checkifusercanbeassigned
      with:
        assignee: tools.assignee
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
