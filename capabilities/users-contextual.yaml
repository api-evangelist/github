naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Contextual
  description: 'GitHub User API — Contextual. 1 operations. Lead operation: GitHub Get Contextual Information for User. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Contextual
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-contextual
    baseUri: ''
    description: GitHub User API — Contextual business capability. Self-contained, no shared references.
    resources:
    - name: users-username-hovercard
      path: /users/{username}/hovercard
      operations:
      - name: getcontextualinformationforuser
        method: GET
        description: GitHub Get Contextual Information for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subject_type
          in: query
          type: string
          description: Identifies which additional information you'd like to receive about the person's hovercard. Can be
            `organization`, `repository`, `issue`, `pull_request`. **Requ
        - name: subject_id
          in: query
          type: string
          description: Uses the ID for the `subject_type` you specified. **Required** when using `subject_type`.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-contextual-rest
    port: 8080
    description: REST adapter for GitHub User API — Contextual. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users/{username}/hovercard
      name: users-username-hovercard
      description: REST surface for users-username-hovercard.
      operations:
      - method: GET
        name: getcontextualinformationforuser
        description: GitHub Get Contextual Information for User
        call: users-contextual.getcontextualinformationforuser
        with:
          subject_type: rest.subject_type
          subject_id: rest.subject_id
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-contextual-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Contextual. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-contextual-information-user
      description: GitHub Get Contextual Information for User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-contextual.getcontextualinformationforuser
      with:
        subject_type: tools.subject_type
        subject_id: tools.subject_id
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
