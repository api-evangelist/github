  - type: http
    namespace: temp-states
    baseUri: ''
    description: GitHub Repos API — States business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-tags-protection
      path: /repos/{owner}/{repo}/tags/protection
      operations:
      - name: listtagprotectionstatesforrepository
        method: GET
        description: List Tag Protection States For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
