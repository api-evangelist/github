naftiko: 1.0.0-alpha2
info:
  label: GitHub Issues API — Comment
  description: 'GitHub Issues API — Comment. 1 operations. Lead operation: GitHub Update an Issue Comment. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Comment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: issues-comment
    baseUri: ''
    description: GitHub Issues API — Comment business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-comments-comment_id
      path: /repos/{owner}/{repo}/issues/comments/{comment_id}
      operations:
      - name: updateanissuecomment
        method: PATCH
        description: GitHub Update an Issue Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: issues-comment-rest
    port: 8080
    description: REST adapter for GitHub Issues API — Comment. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/comments/{comment-id}
      name: repos-owner-repo-issues-comments-comment-id
      description: REST surface for repos-owner-repo-issues-comments-comment_id.
      operations:
      - method: PATCH
        name: updateanissuecomment
        description: GitHub Update an Issue Comment
        call: issues-comment.updateanissuecomment
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issues-comment-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Issues API — Comment. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-update-issue-comment
      description: GitHub Update an Issue Comment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: issues-comment.updateanissuecomment
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
