naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Suspend
  description: 'GitHub Installation API — Suspend. 1 operations. Lead operation: GitHub Suspend an App Installation. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Suspend
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-suspend
    baseUri: ''
    description: GitHub Installation API — Suspend business capability. Self-contained, no shared references.
    resources:
    - name: app-installations-installation_id-suspended
      path: /app/installations/{installation_id}/suspended
      operations:
      - name: suspendanappinstallation
        method: PUT
        description: GitHub Suspend an App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-suspend-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Suspend. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/installations/{installation-id}/suspended
      name: app-installations-installation-id-suspended
      description: REST surface for app-installations-installation_id-suspended.
      operations:
      - method: PUT
        name: suspendanappinstallation
        description: GitHub Suspend an App Installation
        call: installation-suspend.suspendanappinstallation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-suspend-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Suspend. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-suspend-app-installation
      description: GitHub Suspend an App Installation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: installation-suspend.suspendanappinstallation
      outputParameters:
      - type: object
        mapping: $.
