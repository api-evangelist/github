naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Configuration
  description: 'GitHub Org API — Configuration. 2 operations. Lead operation: GitHub Get Webhook Configuration for an Organization.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-configuration
    baseUri: ''
    description: GitHub Org API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-hooks-hook_id-config
      path: /orgs/{org}/hooks/{hook_id}/config
      operations:
      - name: getwebhookconfigurationforanorganization
        method: GET
        description: GitHub Get Webhook Configuration for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatewebhookconfigurationforanorganization
        method: PATCH
        description: GitHub Update Webhook Configuration for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-configuration-rest
    port: 8080
    description: REST adapter for GitHub Org API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orgs/{org}/hooks/{hook-id}/config
      name: orgs-org-hooks-hook-id-config
      description: REST surface for orgs-org-hooks-hook_id-config.
      operations:
      - method: GET
        name: getwebhookconfigurationforanorganization
        description: GitHub Get Webhook Configuration for an Organization
        call: organizations-configuration.getwebhookconfigurationforanorganization
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatewebhookconfigurationforanorganization
        description: GitHub Update Webhook Configuration for an Organization
        call: organizations-configuration.updatewebhookconfigurationforanorganization
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Configuration. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-webhook-configuration-organization
      description: GitHub Get Webhook Configuration for an Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organizations-configuration.getwebhookconfigurationforanorganization
      outputParameters:
      - type: object
        mapping: $.
    - name: github-update-webhook-configuration-organization
      description: GitHub Update Webhook Configuration for an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: organizations-configuration.updatewebhookconfigurationforanorganization
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
