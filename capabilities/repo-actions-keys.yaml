naftiko: 1.0.0-alpha2
info:
  label: github-repo-actions-api — Keys
  description: 'github-repo-actions-api — Keys. 2 operations. Lead operation: GitHub Delete Github Actions Caches for Repository
    (using Cache Key). Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-actions-keys
    baseUri: ''
    description: github-repo-actions-api — Keys business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-caches
      path: /repos/{owner}/{repo}/actions/caches
      operations:
      - name: deletegithubactionscachesforrepositoryusingcachekey
        method: DELETE
        description: GitHub Delete Github Actions Caches for Repository (using Cache Key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-actions-secrets-public-key
      path: /repos/{owner}/{repo}/actions/secrets/public-key
      operations:
      - name: getrepositorypublickey
        method: GET
        description: GitHub Get Repository Public Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-actions-keys-rest
    port: 8080
    description: REST adapter for github-repo-actions-api — Keys. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/caches
      name: repos-owner-repo-actions-caches
      description: REST surface for repos-owner-repo-actions-caches.
      operations:
      - method: DELETE
        name: deletegithubactionscachesforrepositoryusingcachekey
        description: GitHub Delete Github Actions Caches for Repository (using Cache Key)
        call: repo-actions-keys.deletegithubactionscachesforrepositoryusingcachekey
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/actions/secrets/public-key
      name: repos-owner-repo-actions-secrets-public-key
      description: REST surface for repos-owner-repo-actions-secrets-public-key.
      operations:
      - method: GET
        name: getrepositorypublickey
        description: GitHub Get Repository Public Key
        call: repo-actions-keys.getrepositorypublickey
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-actions-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-actions-api — Keys. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-delete-github-actions-caches
      description: GitHub Delete Github Actions Caches for Repository (using Cache Key)
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-actions-keys.deletegithubactionscachesforrepositoryusingcachekey
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-repository-public-key
      description: GitHub Get Repository Public Key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-actions-keys.getrepositorypublickey
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
