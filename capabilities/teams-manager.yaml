naftiko: 1.0.0-alpha2
info:
  label: GitHub Teams API — Manager
  description: 'GitHub Teams API — Manager. 2 operations. Lead operation: GitHub Add Security Manager Team. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Manager
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: teams-manager
    baseUri: ''
    description: GitHub Teams API — Manager business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-security-managers-teams-team_slug
      path: /orgs/{org}/security-managers/teams/{team_slug}
      operations:
      - name: addsecuritymanagerteam
        method: PUT
        description: GitHub Add Security Manager Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removesecuritymanagerteam
        method: DELETE
        description: GitHub Remove Security Manager Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: teams-manager-rest
    port: 8080
    description: REST adapter for GitHub Teams API — Manager. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/security-managers/teams/{team-slug}
      name: orgs-org-security-managers-teams-team-slug
      description: REST surface for orgs-org-security-managers-teams-team_slug.
      operations:
      - method: PUT
        name: addsecuritymanagerteam
        description: GitHub Add Security Manager Team
        call: teams-manager.addsecuritymanagerteam
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removesecuritymanagerteam
        description: GitHub Remove Security Manager Team
        call: teams-manager.removesecuritymanagerteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teams-manager-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Teams API — Manager. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-add-security-manager-team
      description: GitHub Add Security Manager Team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: teams-manager.addsecuritymanagerteam
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-security-manager-team
      description: GitHub Remove Security Manager Team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: teams-manager.removesecuritymanagerteam
      outputParameters:
      - type: object
        mapping: $.
