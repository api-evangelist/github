naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Events
  description: 'github-repos-api — Events. 1 operations. Lead operation: GitHub List Repository Events. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-events
    baseUri: ''
    description: github-repos-api — Events business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-events
      path: /repos/{owner}/{repo}/events
      operations:
      - name: listrepositoryevents
        method: GET
        description: GitHub List Repository Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-events-rest
    port: 8080
    description: REST adapter for github-repos-api — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/events
      name: repos-owner-repo-events
      description: REST surface for repos-owner-repo-events.
      operations:
      - method: GET
        name: listrepositoryevents
        description: GitHub List Repository Events
        call: repo-tags-events.listrepositoryevents
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-repository-events
      description: GitHub List Repository Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-events.listrepositoryevents
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
