naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Update
  description: 'github-repos-api — Update. 2 operations. Lead operation: GitHub Update Dependabot Alert. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-dependabot-update
    baseUri: ''
    description: github-repos-api — Update business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-dependabot-alerts-alert_number
      path: /repos/{owner}/{repo}/dependabot/alerts/{alert_number}
      operations:
      - name: updatedependabotalert
        method: PATCH
        description: GitHub Update Dependabot Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-dependabot-secrets-secret_name
      path: /repos/{owner}/{repo}/dependabot/secrets/{secret_name}
      operations:
      - name: createorupdaterepositorydependabotsecret
        method: PUT
        description: GitHub Create or Update Repository Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-dependabot-update-rest
    port: 8080
    description: REST adapter for github-repos-api — Update. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/dependabot/alerts/{alert-number}
      name: repos-owner-repo-dependabot-alerts-alert-number
      description: REST surface for repos-owner-repo-dependabot-alerts-alert_number.
      operations:
      - method: PATCH
        name: updatedependabotalert
        description: GitHub Update Dependabot Alert
        call: repo-dependabot-update.updatedependabotalert
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/dependabot/secrets/{secret-name}
      name: repos-owner-repo-dependabot-secrets-secret-name
      description: REST surface for repos-owner-repo-dependabot-secrets-secret_name.
      operations:
      - method: PUT
        name: createorupdaterepositorydependabotsecret
        description: GitHub Create or Update Repository Secret
        call: repo-dependabot-update.createorupdaterepositorydependabotsecret
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-dependabot-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Update. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-update-dependabot-alert
      description: GitHub Update Dependabot Alert
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-dependabot-update.updatedependabotalert
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-create-update-repository-secret
      description: GitHub Create or Update Repository Secret
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-dependabot-update.createorupdaterepositorydependabotsecret
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
