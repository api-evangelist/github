naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Sets
  description: 'GitHub User API — Sets. 1 operations. Lead operation: GitHub Set User Access Restrictions. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Sets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-sets
    baseUri: ''
    description: GitHub User API — Sets business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-protection-restrictions-users
      path: /repos/{owner}/{repo}/branches/{branch}/protection/restrictions/users
      operations:
      - name: setuseraccessrestrictions
        method: PUT
        description: GitHub Set User Access Restrictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-sets-rest
    port: 8080
    description: REST adapter for GitHub User API — Sets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/protection/restrictions/users
      name: repos-owner-repo-branches-branch-protection-restrictions-users
      description: REST surface for repos-owner-repo-branches-branch-protection-restrictions-users.
      operations:
      - method: PUT
        name: setuseraccessrestrictions
        description: GitHub Set User Access Restrictions
        call: users-sets.setuseraccessrestrictions
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-sets-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Sets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-set-user-access-restrictions
      description: GitHub Set User Access Restrictions
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: users-sets.setuseraccessrestrictions
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
