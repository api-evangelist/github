naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Merged
  description: 'github-repos-api — Merged. 1 operations. Lead operation: GitHub Check if Pull Request Has Been Merged. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Merged
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-pulls-merged
    baseUri: ''
    description: github-repos-api — Merged business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-pull_number-merge
      path: /repos/{owner}/{repo}/pulls/{pull_number}/merge
      operations:
      - name: checkifpullrequesthasbeenmerged
        method: GET
        description: GitHub Check if Pull Request Has Been Merged
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-pulls-merged-rest
    port: 8080
    description: REST adapter for github-repos-api — Merged. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/{pull-number}/merge
      name: repos-owner-repo-pulls-pull-number-merge
      description: REST surface for repos-owner-repo-pulls-pull_number-merge.
      operations:
      - method: GET
        name: checkifpullrequesthasbeenmerged
        description: GitHub Check if Pull Request Has Been Merged
        call: repo-pulls-merged.checkifpullrequesthasbeenmerged
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-pulls-merged-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Merged. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-check-if-pull-request
      description: GitHub Check if Pull Request Has Been Merged
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-pulls-merged.checkifpullrequesthasbeenmerged
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
