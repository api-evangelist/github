naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Outside
  description: 'GitHub Org API — Outside. 3 operations. Lead operation: GitHub List Outside Collaborators for an Organization.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Outside
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-outside
    baseUri: ''
    description: GitHub Org API — Outside business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-outside_collaborators
      path: /orgs/{org}/outside_collaborators
      operations:
      - name: listoutsidecollaboratorsforanorganization
        method: GET
        description: GitHub List Outside Collaborators for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Filter the list of outside collaborators. `2fa_disabled` means that only outside collaborators without
            [two-factor authentication](https://github.com/blog/1614-
    - name: orgs-org-outside_collaborators-username
      path: /orgs/{org}/outside_collaborators/{username}
      operations:
      - name: convertanorganizationmembertooutsidecollaborator
        method: PUT
        description: GitHub Convert an Organization Member to Outside Collaborator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: removeoutsidecollaboratorfromanorganization
        method: DELETE
        description: GitHub Remove Outside Collaborator from an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-outside-rest
    port: 8080
    description: REST adapter for GitHub Org API — Outside. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/outside-collaborators
      name: orgs-org-outside-collaborators
      description: REST surface for orgs-org-outside_collaborators.
      operations:
      - method: GET
        name: listoutsidecollaboratorsforanorganization
        description: GitHub List Outside Collaborators for an Organization
        call: organizations-outside.listoutsidecollaboratorsforanorganization
        with:
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org}/outside-collaborators/{username}
      name: orgs-org-outside-collaborators-username
      description: REST surface for orgs-org-outside_collaborators-username.
      operations:
      - method: PUT
        name: convertanorganizationmembertooutsidecollaborator
        description: GitHub Convert an Organization Member to Outside Collaborator
        call: organizations-outside.convertanorganizationmembertooutsidecollaborator
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeoutsidecollaboratorfromanorganization
        description: GitHub Remove Outside Collaborator from an Organization
        call: organizations-outside.removeoutsidecollaboratorfromanorganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-outside-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Outside. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-outside-collaborators-organization
      description: GitHub List Outside Collaborators for an Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organizations-outside.listoutsidecollaboratorsforanorganization
      with:
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: github-convert-organization-member-outside
      description: GitHub Convert an Organization Member to Outside Collaborator
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: organizations-outside.convertanorganizationmembertooutsidecollaborator
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-outside-collaborator-organization
      description: GitHub Remove Outside Collaborator from an Organization
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: organizations-outside.removeoutsidecollaboratorfromanorganization
      outputParameters:
      - type: object
        mapping: $.
