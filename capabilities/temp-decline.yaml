naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Decline
  description: 'GitHub Repos API — Decline. 1 operations. Lead operation: Decline Repository Invitation. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Decline
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-decline
    baseUri: ''
    description: GitHub Repos API — Decline business capability. Self-contained, no shared references.
    resources:
    - name: user-repository_invitations-invitation_id
      path: /user/repository_invitations/{invitation_id}
      operations:
      - name: declinerepositoryinvitation
        method: DELETE
        description: Decline Repository Invitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-decline-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Decline. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/repository-invitations/{invitation-id}
      name: user-repository-invitations-invitation-id
      description: REST surface for user-repository_invitations-invitation_id.
      operations:
      - method: DELETE
        name: declinerepositoryinvitation
        description: Decline Repository Invitation
        call: temp-decline.declinerepositoryinvitation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-decline-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Decline. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: decline-repository-invitation
      description: Decline Repository Invitation
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-decline.declinerepositoryinvitation
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
