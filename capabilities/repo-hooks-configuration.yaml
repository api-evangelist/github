naftiko: 1.0.0-alpha2
info:
  label: github-repo-hooks-api — Configuration
  description: 'github-repo-hooks-api — Configuration. 2 operations. Lead operation: GitHub Get Webhook Configuration for
    Repository. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-hooks-configuration
    baseUri: ''
    description: github-repo-hooks-api — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-hooks-hook_id-config
      path: /repos/{owner}/{repo}/hooks/{hook_id}/config
      operations:
      - name: getwebhookconfigurationforrepository
        method: GET
        description: GitHub Get Webhook Configuration for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: updatewebhookconfigurationforrepository
        method: PATCH
        description: GitHub Update Webhook Configuration for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-hooks-configuration-rest
    port: 8080
    description: REST adapter for github-repo-hooks-api — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/hooks/{hook-id}/config
      name: repos-owner-repo-hooks-hook-id-config
      description: REST surface for repos-owner-repo-hooks-hook_id-config.
      operations:
      - method: GET
        name: getwebhookconfigurationforrepository
        description: GitHub Get Webhook Configuration for Repository
        call: repo-hooks-configuration.getwebhookconfigurationforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatewebhookconfigurationforrepository
        description: GitHub Update Webhook Configuration for Repository
        call: repo-hooks-configuration.updatewebhookconfigurationforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-hooks-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-hooks-api — Configuration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-webhook-configuration-repository
      description: GitHub Get Webhook Configuration for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-hooks-configuration.getwebhookconfigurationforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-update-webhook-configuration-repository
      description: GitHub Update Webhook Configuration for Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-hooks-configuration.updatewebhookconfigurationforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
