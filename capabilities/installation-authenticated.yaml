        idempotent: true
      call: installation-authenticated.getrepositoryinstallationfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-user-installation-authenticated
      description: GitHub Get User Installation for the Authenticated App
