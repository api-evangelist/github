naftiko: 1.0.0-alpha2
info:
  label: GitHub Teams API — Branches
  description: 'GitHub Teams API — Branches. 1 operations. Lead operation: GitHub Get Teams with Access to the Protected Branch.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Branches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: teams-branches
    baseUri: ''
    description: GitHub Teams API — Branches business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-protection-restrictions-teams
      path: /repos/{owner}/{repo}/branches/{branch}/protection/restrictions/teams
      operations:
      - name: getteamswithaccesstotheprotectedbranch
        method: GET
        description: GitHub Get Teams with Access to the Protected Branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: teams-branches-rest
    port: 8080
    description: REST adapter for GitHub Teams API — Branches. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/protection/restrictions/teams
      name: repos-owner-repo-branches-branch-protection-restrictions-teams
      description: REST surface for repos-owner-repo-branches-branch-protection-restrictions-teams.
      operations:
      - method: GET
        name: getteamswithaccesstotheprotectedbranch
        description: GitHub Get Teams with Access to the Protected Branch
        call: teams-branches.getteamswithaccesstotheprotectedbranch
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teams-branches-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Teams API — Branches. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-teams-access-protected
      description: GitHub Get Teams with Access to the Protected Branch
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teams-branches.getteamswithaccesstotheprotectedbranch
      outputParameters:
      - type: object
        mapping: $.
