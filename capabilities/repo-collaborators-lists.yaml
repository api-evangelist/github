naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Lists
  description: 'github-repos-api — Lists. 1 operations. Lead operation: GitHub List Repository Collaborators. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-collaborators-lists
    baseUri: ''
    description: github-repos-api — Lists business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-collaborators
      path: /repos/{owner}/{repo}/collaborators
      operations:
      - name: listrepositorycollaborators
        method: GET
        description: GitHub List Repository Collaborators
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: affiliation
          in: query
          type: string
          description: Filter collaborators returned by their affiliation. `outside` means all outside collaborators of an
            organization-owned repository. `direct` means all collaborat
        - name: permission
          in: query
          type: string
          description: Filter collaborators by the permissions they have on the repository. If not specified, all collaborators
            will be returned.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-collaborators-lists-rest
    port: 8080
    description: REST adapter for github-repos-api — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/collaborators
      name: repos-owner-repo-collaborators
      description: REST surface for repos-owner-repo-collaborators.
      operations:
      - method: GET
        name: listrepositorycollaborators
        description: GitHub List Repository Collaborators
        call: repo-collaborators-lists.listrepositorycollaborators
        with:
          affiliation: rest.affiliation
          permission: rest.permission
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-collaborators-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Lists. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-repository-collaborators
      description: GitHub List Repository Collaborators
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-collaborators-lists.listrepositorycollaborators
      with:
        affiliation: tools.affiliation
        permission: tools.permission
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
