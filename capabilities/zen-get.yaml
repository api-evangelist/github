naftiko: 1.0.0-alpha2
info:
  label: GitHub Zen API — Get
  description: 'GitHub Zen API — Get. 1 operations. Lead operation: GitHub Get the Zen of Github. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: zen-get
    baseUri: ''
    description: GitHub Zen API — Get business capability. Self-contained, no shared references.
    resources:
    - name: zen
      path: /zen
      operations:
      - name: getthezenofgithub
        method: GET
        description: GitHub Get the Zen of Github
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: zen-get-rest
    port: 8080
    description: REST adapter for GitHub Zen API — Get. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/zen
      name: zen
      description: REST surface for zen.
      operations:
      - method: GET
        name: getthezenofgithub
        description: GitHub Get the Zen of Github
        call: zen-get.getthezenofgithub
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zen-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Zen API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-zen-github
      description: GitHub Get the Zen of Github
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zen-get.getthezenofgithub
      outputParameters:
      - type: object
        mapping: $.
