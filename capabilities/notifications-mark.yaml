naftiko: 1.0.0-alpha2
info:
  label: GitHub Notifications API — Mark
  description: 'GitHub Notifications API — Mark. 1 operations. Lead operation: GitHub Mark Thread as Read. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Mark
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: notifications-mark
    baseUri: ''
    description: GitHub Notifications API — Mark business capability. Self-contained, no shared references.
    resources:
    - name: notifications-threads-thread_id
      path: /notifications/threads/{thread_id}
      operations:
      - name: markthreadasread
        method: PATCH
        description: GitHub Mark Thread as Read
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: notifications-mark-rest
    port: 8080
    description: REST adapter for GitHub Notifications API — Mark. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/notifications/threads/{thread-id}
      name: notifications-threads-thread-id
      description: REST surface for notifications-threads-thread_id.
      operations:
      - method: PATCH
        name: markthreadasread
        description: GitHub Mark Thread as Read
        call: notifications-mark.markthreadasread
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: notifications-mark-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Notifications API — Mark. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-mark-thread-read
      description: GitHub Mark Thread as Read
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: notifications-mark.markthreadasread
      outputParameters:
      - type: object
        mapping: $.
