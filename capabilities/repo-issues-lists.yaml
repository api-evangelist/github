        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: milestone
          in: query
          type: string
          description: If an `integer` is passed, it should refer to a milestone by its `number` field. If the string `*`
            is passed, issues with any milestone are accepted. If the str
        - name: state
          in: query
          type: string
          description: Indicates the state of the issues to return.
        - name: assignee
          in: query
          type: string
          description: Can be the name of a user. Pass in `none` for issues with no assigned user, and `*` for issues assigned
            to any user.
        - name: creator
          in: query
          type: string
          description: The user that created the issue.
        - name: mentioned
          in: query
          type: string
          description: user that's mentioned in the issue.
        - name: sort
          in: query
          type: string
          description: What to sort results by.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
