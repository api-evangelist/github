naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Users
  description: 'github-repos-api — Users. 2 operations. Lead operation: GitHub Check if User is Repository Collaborator. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-collaborators-users
    baseUri: ''
    description: github-repos-api — Users business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-collaborators-username
      path: /repos/{owner}/{repo}/collaborators/{username}
      operations:
      - name: checkifuserisrepositorycollaborator
        method: GET
        description: GitHub Check if User is Repository Collaborator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-collaborators-username-permission
      path: /repos/{owner}/{repo}/collaborators/{username}/permission
      operations:
      - name: getrepositorypermissionsforuser
        method: GET
        description: GitHub Get Repository Permissions for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-collaborators-users-rest
    port: 8080
    description: REST adapter for github-repos-api — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/collaborators/{username}
      name: repos-owner-repo-collaborators-username
      description: REST surface for repos-owner-repo-collaborators-username.
      operations:
      - method: GET
        name: checkifuserisrepositorycollaborator
        description: GitHub Check if User is Repository Collaborator
        call: repo-collaborators-users.checkifuserisrepositorycollaborator
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/collaborators/{username}/permission
      name: repos-owner-repo-collaborators-username-permission
      description: REST surface for repos-owner-repo-collaborators-username-permission.
      operations:
      - method: GET
        name: getrepositorypermissionsforuser
        description: GitHub Get Repository Permissions for User
        call: repo-collaborators-users.getrepositorypermissionsforuser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-collaborators-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-check-if-user-is
      description: GitHub Check if User is Repository Collaborator
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-collaborators-users.checkifuserisrepositorycollaborator
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-repository-permissions-user
      description: GitHub Get Repository Permissions for User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-collaborators-users.getrepositorypermissionsforuser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
