naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Year
  description: 'GitHub Repos API — Year. 1 operations. Lead operation: Get The Last Year Of Commit Activity. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Year
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-year
    baseUri: ''
    description: GitHub Repos API — Year business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-stats-commit_activity
      path: /repos/{owner}/{repo}/stats/commit_activity
      operations:
      - name: getthelastyearofcommitactivity
        method: GET
        description: Get The Last Year Of Commit Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-year-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Year. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/stats/commit-activity
      name: repos-owner-repo-stats-commit-activity
      description: REST surface for repos-owner-repo-stats-commit_activity.
      operations:
      - method: GET
        name: getthelastyearofcommitactivity
        description: Get The Last Year Of Commit Activity
        call: temp-year.getthelastyearofcommitactivity
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-year-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Year. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-last-year-commit-activity
      description: Get The Last Year Of Commit Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-year.getthelastyearofcommitactivity
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
