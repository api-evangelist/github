naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Disables
  description: 'GitHub Org API — Disables. 2 operations. Lead operation: GitHub Disable Selected Repository for Github Actions
    in an Organization. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Disables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-disables
    baseUri: ''
    description: GitHub Org API — Disables business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-actions-permissions-repositories-repository_id
      path: /orgs/{org}/actions/permissions/repositories/{repository_id}
      operations:
      - name: disableselectedrepositoryforgithubactionsinanorganization
        method: DELETE
        description: GitHub Disable Selected Repository for Github Actions in an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orgs-org-security_product-enablement
      path: /orgs/{org}/{security_product}/{enablement}
      operations:
      - name: enableordisablesecurityfeatureforanorganization
        method: POST
        description: GitHub Enable or Disable Security Feature for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-disables-rest
    port: 8080
    description: REST adapter for GitHub Org API — Disables. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/actions/permissions/repositories/{repository-id}
      name: orgs-org-actions-permissions-repositories-repository-id
      description: REST surface for orgs-org-actions-permissions-repositories-repository_id.
      operations:
      - method: DELETE
        name: disableselectedrepositoryforgithubactionsinanorganization
        description: GitHub Disable Selected Repository for Github Actions in an Organization
        call: organizations-disables.disableselectedrepositoryforgithubactionsinanorganization
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org}/{security-product}/{enablement}
      name: orgs-org-security-product-enablement
      description: REST surface for orgs-org-security_product-enablement.
      operations:
      - method: POST
        name: enableordisablesecurityfeatureforanorganization
        description: GitHub Enable or Disable Security Feature for an Organization
        call: organizations-disables.enableordisablesecurityfeatureforanorganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-disables-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Disables. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-disable-selected-repository-github
      description: GitHub Disable Selected Repository for Github Actions in an Organization
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: organizations-disables.disableselectedrepositoryforgithubactionsinanorganization
      outputParameters:
      - type: object
        mapping: $.
    - name: github-enable-disable-security-feature
      description: GitHub Enable or Disable Security Feature for an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: organizations-disables.enableordisablesecurityfeatureforanorganization
      outputParameters:
      - type: object
        mapping: $.
