naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Contributors
  description: 'github-repos-api — Contributors. 1 operations. Lead operation: GitHub List Repository Contributors. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Contributors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-contributors
    baseUri: ''
    description: github-repos-api — Contributors business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-contributors
      path: /repos/{owner}/{repo}/contributors
      operations:
      - name: listrepositorycontributors
        method: GET
        description: GitHub List Repository Contributors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: anon
          in: query
          type: string
          description: Set to `1` or `true` to include anonymous contributors in results.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-contributors-rest
    port: 8080
    description: REST adapter for github-repos-api — Contributors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/contributors
      name: repos-owner-repo-contributors
      description: REST surface for repos-owner-repo-contributors.
      operations:
      - method: GET
        name: listrepositorycontributors
        description: GitHub List Repository Contributors
        call: repo-tags-contributors.listrepositorycontributors
        with:
          anon: rest.anon
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-contributors-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Contributors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-repository-contributors
      description: GitHub List Repository Contributors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-contributors.listrepositorycontributors
      with:
        anon: tools.anon
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
