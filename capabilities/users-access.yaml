naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Access
  description: 'GitHub User API — Access. 6 operations. Lead operation: GitHub Get Users with Access to the Protected Branch.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Access
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
