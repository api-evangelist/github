      operations:
      - method: GET
        name: getuserswithaccesstotheprotectedbranch
        description: GitHub Get Users with Access to the Protected Branch
        call: users-access.getuserswithaccesstotheprotectedbranch
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: adduseraccessrestrictions
        description: GitHub Add User Access Restrictions
        call: users-access.adduseraccessrestrictions
