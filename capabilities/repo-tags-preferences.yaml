naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Preferences
  description: 'github-repos-api — Preferences. 1 operations. Lead operation: GitHub Update Repository Preferences for Check
    Suites. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Preferences
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-preferences
    baseUri: ''
    description: github-repos-api — Preferences business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-check-suites-preferences
      path: /repos/{owner}/{repo}/check-suites/preferences
      operations:
      - name: updaterepositorypreferencesforchecksuites
        method: PATCH
        description: GitHub Update Repository Preferences for Check Suites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-preferences-rest
    port: 8080
    description: REST adapter for github-repos-api — Preferences. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/check-suites/preferences
      name: repos-owner-repo-check-suites-preferences
      description: REST surface for repos-owner-repo-check-suites-preferences.
      operations:
      - method: PATCH
        name: updaterepositorypreferencesforchecksuites
        description: GitHub Update Repository Preferences for Check Suites
        call: repo-tags-preferences.updaterepositorypreferencesforchecksuites
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-preferences-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Preferences. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-update-repository-preferences-check
      description: GitHub Update Repository Preferences for Check Suites
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-preferences.updaterepositorypreferencesforchecksuites
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
