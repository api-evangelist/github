  - type: http
    namespace: users-during
    baseUri: ''
    description: GitHub User API — During business capability. Self-contained, no shared references.
    resources:
    - name: user-docker-conflicts
      path: /user/docker/conflicts
      operations:
      - name: getlistofconflictingpackagesduringdockermigrationforauthenticateduser
        method: GET
        description: GitHub Get List of Conflicting Packages During Docker Migration for Authenticated-user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
