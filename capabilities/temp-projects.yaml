naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Projects
  description: 'GitHub Repos API — Projects. 1 operations. Lead operation: List Repository Projects. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-projects
    baseUri: ''
    description: GitHub Repos API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-projects
      path: /repos/{owner}/{repo}/projects
      operations:
      - name: listrepositoryprojects
        method: GET
        description: List Repository Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Indicates the state of the projects to return.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-projects-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Projects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/projects
      name: repos-owner-repo-projects
      description: REST surface for repos-owner-repo-projects.
      operations:
      - method: GET
        name: listrepositoryprojects
        description: List Repository Projects
        call: temp-projects.listrepositoryprojects
        with:
          state: rest.state
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Projects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-repository-projects
      description: List Repository Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-projects.listrepositoryprojects
      with:
        state: tools.state
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
