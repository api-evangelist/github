naftiko: 1.0.0-alpha2
info:
  label: GitHub Application API — Installations
  description: 'GitHub Application API — Installations. 7 operations. Lead operation: GitHub List Installation Requests for
    the Authenticated App. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Installations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-installations
    baseUri: ''
    description: GitHub Application API — Installations business capability. Self-contained, no shared references.
    resources:
    - name: app-installation-requests
      path: /app/installation-requests
      operations:
      - name: listinstallationrequestsfortheauthenticatedapp
        method: GET
        description: GitHub List Installation Requests for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-installations
      path: /app/installations
      operations:
      - name: listinstallationsfortheauthenticatedapp
        method: GET
        description: GitHub List Installations for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: outdated
          in: query
          type: string
    - name: app-installations-installation_id
      path: /app/installations/{installation_id}
      operations:
      - name: getaninstallationfortheauthenticatedapp
        method: GET
        description: GitHub Get an Installation for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteaninstallationfortheauthenticatedapp
        method: DELETE
        description: GitHub Delete an Installation for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-installations-installation_id-access_tokens
      path: /app/installations/{installation_id}/access_tokens
      operations:
      - name: createaninstallationaccesstokenforanapp
        method: POST
        description: GitHub Create an Installation Access Token for an App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: app-installations-installation_id-suspended
      path: /app/installations/{installation_id}/suspended
      operations:
      - name: suspendanappinstallation
        method: PUT
        description: GitHub Suspend an App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unsuspendanappinstallation
        method: DELETE
        description: GitHub Unsuspend an App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-installations-rest
    port: 8080
    description: REST adapter for GitHub Application API — Installations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/installation-requests
      name: app-installation-requests
      description: REST surface for app-installation-requests.
      operations:
      - method: GET
        name: listinstallationrequestsfortheauthenticatedapp
        description: GitHub List Installation Requests for the Authenticated App
        call: app-installations.listinstallationrequestsfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations
      name: app-installations
      description: REST surface for app-installations.
      operations:
      - method: GET
        name: listinstallationsfortheauthenticatedapp
        description: GitHub List Installations for the Authenticated App
        call: app-installations.listinstallationsfortheauthenticatedapp
        with:
          outdated: rest.outdated
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations/{installation-id}
      name: app-installations-installation-id
      description: REST surface for app-installations-installation_id.
      operations:
      - method: GET
        name: getaninstallationfortheauthenticatedapp
        description: GitHub Get an Installation for the Authenticated App
        call: app-installations.getaninstallationfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaninstallationfortheauthenticatedapp
        description: GitHub Delete an Installation for the Authenticated App
        call: app-installations.deleteaninstallationfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations/{installation-id}/access-tokens
      name: app-installations-installation-id-access-tokens
      description: REST surface for app-installations-installation_id-access_tokens.
      operations:
      - method: POST
        name: createaninstallationaccesstokenforanapp
        description: GitHub Create an Installation Access Token for an App
        call: app-installations.createaninstallationaccesstokenforanapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations/{installation-id}/suspended
      name: app-installations-installation-id-suspended
      description: REST surface for app-installations-installation_id-suspended.
      operations:
      - method: PUT
        name: suspendanappinstallation
        description: GitHub Suspend an App Installation
        call: app-installations.suspendanappinstallation
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: unsuspendanappinstallation
        description: GitHub Unsuspend an App Installation
        call: app-installations.unsuspendanappinstallation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-installations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Installations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-list-installation-requests-authenticated
      description: GitHub List Installation Requests for the Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-installations.listinstallationrequestsfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
