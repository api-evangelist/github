      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-installations.listinstallationsfortheauthenticatedapp
      with:
        outdated: tools.outdated
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-installation-authenticated-app
      description: GitHub Get an Installation for the Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-installations.getaninstallationfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
    - name: github-delete-installation-authenticated-app
      description: GitHub Delete an Installation for the Authenticated App
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: app-installations.deleteaninstallationfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
    - name: github-create-installation-access-token
      description: GitHub Create an Installation Access Token for an App
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: app-installations.createaninstallationaccesstokenforanapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-suspend-app-installation
      description: GitHub Suspend an App Installation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: app-installations.suspendanappinstallation
      outputParameters:
      - type: object
        mapping: $.
    - name: github-unsuspend-app-installation
      description: GitHub Unsuspend an App Installation
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: app-installations.unsuspendanappinstallation
      outputParameters:
      - type: object
