naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Manager
  description: 'GitHub Org API — Manager. 3 operations. Lead operation: GitHub List Security Manager Teams. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Manager
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-manager
    baseUri: ''
    description: GitHub Org API — Manager business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-security-managers
      path: /orgs/{org}/security-managers
      operations:
      - name: listsecuritymanagerteams
        method: GET
        description: GitHub List Security Manager Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orgs-org-security-managers-teams-team_slug
      path: /orgs/{org}/security-managers/teams/{team_slug}
      operations:
      - name: addsecuritymanagerteam
        method: PUT
        description: GitHub Add Security Manager Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removesecuritymanagerteam
        method: DELETE
        description: GitHub Remove Security Manager Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-manager-rest
    port: 8080
    description: REST adapter for GitHub Org API — Manager. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/security-managers
      name: orgs-org-security-managers
      description: REST surface for orgs-org-security-managers.
      operations:
      - method: GET
        name: listsecuritymanagerteams
        description: GitHub List Security Manager Teams
        call: organizations-manager.listsecuritymanagerteams
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org}/security-managers/teams/{team-slug}
      name: orgs-org-security-managers-teams-team-slug
      description: REST surface for orgs-org-security-managers-teams-team_slug.
      operations:
      - method: PUT
        name: addsecuritymanagerteam
        description: GitHub Add Security Manager Team
        call: organizations-manager.addsecuritymanagerteam
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removesecuritymanagerteam
        description: GitHub Remove Security Manager Team
        call: organizations-manager.removesecuritymanagerteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-manager-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Manager. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-security-manager-teams
      description: GitHub List Security Manager Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organizations-manager.listsecuritymanagerteams
      outputParameters:
      - type: object
        mapping: $.
    - name: github-add-security-manager-team
      description: GitHub Add Security Manager Team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: organizations-manager.addsecuritymanagerteam
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-security-manager-team
      description: GitHub Remove Security Manager Team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: organizations-manager.removesecuritymanagerteam
      outputParameters:
      - type: object
        mapping: $.
