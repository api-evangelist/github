naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Enables
  description: 'github-repos-api — Enables. 2 operations. Lead operation: GitHub Enable Git Lfs for Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Enables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-enables
    baseUri: ''
    description: github-repos-api — Enables business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-lfs
      path: /repos/{owner}/{repo}/lfs
      operations:
      - name: enablegitlfsforrepository
        method: PUT
        description: GitHub Enable Git Lfs for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-vulnerability-alerts
      path: /repos/{owner}/{repo}/vulnerability-alerts
      operations:
      - name: enablevulnerabilityalerts
        method: PUT
        description: GitHub Enable Vulnerability Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-enables-rest
    port: 8080
    description: REST adapter for github-repos-api — Enables. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/lfs
      name: repos-owner-repo-lfs
      description: REST surface for repos-owner-repo-lfs.
      operations:
      - method: PUT
        name: enablegitlfsforrepository
        description: GitHub Enable Git Lfs for Repository
        call: repo-tags-enables.enablegitlfsforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/vulnerability-alerts
      name: repos-owner-repo-vulnerability-alerts
      description: REST surface for repos-owner-repo-vulnerability-alerts.
      operations:
      - method: PUT
        name: enablevulnerabilityalerts
        description: GitHub Enable Vulnerability Alerts
        call: repo-tags-enables.enablevulnerabilityalerts
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-enables-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Enables. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-enable-git-lfs-repository
      description: GitHub Enable Git Lfs for Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-enables.enablegitlfsforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-enable-vulnerability-alerts
      description: GitHub Enable Vulnerability Alerts
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-enables.enablevulnerabilityalerts
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
