naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Delete
  description: 'github-repos-api — Delete. 3 operations. Lead operation: GitHub Delete an Issue Comment. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
