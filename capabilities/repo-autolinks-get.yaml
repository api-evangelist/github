naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Get
  description: 'github-repos-api — Get. 2 operations. Lead operation: GitHub Get All Autolinks of Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-autolinks-get
    baseUri: ''
    description: github-repos-api — Get business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-autolinks
      path: /repos/{owner}/{repo}/autolinks
      operations:
      - name: getallautolinksofrepository
        method: GET
        description: GitHub Get All Autolinks of Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-autolinks-autolink_id
      path: /repos/{owner}/{repo}/autolinks/{autolink_id}
      operations:
      - name: getanautolinkreferenceofrepository
        method: GET
        description: GitHub Get an Autolink Reference of Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-autolinks-get-rest
    port: 8080
    description: REST adapter for github-repos-api — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/autolinks
      name: repos-owner-repo-autolinks
      description: REST surface for repos-owner-repo-autolinks.
      operations:
      - method: GET
        name: getallautolinksofrepository
        description: GitHub Get All Autolinks of Repository
        call: repo-autolinks-get.getallautolinksofrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/autolinks/{autolink-id}
      name: repos-owner-repo-autolinks-autolink-id
      description: REST surface for repos-owner-repo-autolinks-autolink_id.
      operations:
      - method: GET
        name: getanautolinkreferenceofrepository
        description: GitHub Get an Autolink Reference of Repository
        call: repo-autolinks-get.getanautolinkreferenceofrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-autolinks-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-all-autolinks-repository
      description: GitHub Get All Autolinks of Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-autolinks-get.getallautolinksofrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-autolink-reference-repository
      description: GitHub Get an Autolink Reference of Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-autolinks-get.getanautolinkreferenceofrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
