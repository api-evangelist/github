    port: 9090
    transport: http
    description: MCP adapter for GitHub v3 REST API — Billing. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-github-advanced-security
      description: GitHub Get GitHub Advanced Security Active Committers for an Enterprise
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: github-billing.billinggetgithubadvancedsecuritybillingghe
