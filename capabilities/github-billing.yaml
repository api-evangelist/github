    description: GitHub v3 REST API — Billing business capability. Self-contained, no shared references.
    resources:
    - name: enterprises-enterprise-settings-billing-advanced-security
      path: /enterprises/{enterprise}/settings/billing/advanced-security
      operations:
      - name: billinggetgithubadvancedsecuritybillingghe
        method: GET
        description: GitHub Get GitHub Advanced Security Active Committers for an Enterprise
        outputRawFormat: json
