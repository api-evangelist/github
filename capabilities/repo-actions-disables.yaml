naftiko: 1.0.0-alpha2
info:
  label: github-repo-actions-api — Disables
  description: 'github-repo-actions-api — Disables. 1 operations. Lead operation: GitHub Disable Workflow. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Disables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-actions-disables
    baseUri: ''
    description: github-repo-actions-api — Disables business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-workflows-workflow_id-disable
      path: /repos/{owner}/{repo}/actions/workflows/{workflow_id}/disable
      operations:
      - name: disableworkflow
        method: PUT
        description: GitHub Disable Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-actions-disables-rest
    port: 8080
    description: REST adapter for github-repo-actions-api — Disables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/workflows/{workflow-id}/disable
      name: repos-owner-repo-actions-workflows-workflow-id-disable
      description: REST surface for repos-owner-repo-actions-workflows-workflow_id-disable.
      operations:
      - method: PUT
        name: disableworkflow
        description: GitHub Disable Workflow
        call: repo-actions-disables.disableworkflow
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-actions-disables-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-actions-api — Disables. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-disable-workflow
      description: GitHub Disable Workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-actions-disables.disableworkflow
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
