naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Archive
  description: 'GitHub User API — Archive. 1 operations. Lead operation: GitHub Download User Migration Archive. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Archive
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-archive
    baseUri: ''
    description: GitHub User API — Archive business capability. Self-contained, no shared references.
    resources:
    - name: user-migrations-migration_id-archive
      path: /user/migrations/{migration_id}/archive
      operations:
      - name: downloadusermigrationarchive
        method: GET
        description: GitHub Download User Migration Archive
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-archive-rest
    port: 8080
    description: REST adapter for GitHub User API — Archive. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/migrations/{migration-id}/archive
      name: user-migrations-migration-id-archive
      description: REST surface for user-migrations-migration_id-archive.
      operations:
      - method: GET
        name: downloadusermigrationarchive
        description: GitHub Download User Migration Archive
        call: users-archive.downloadusermigrationarchive
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-archive-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Archive. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-download-user-migration-archive
      description: GitHub Download User Migration Archive
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-archive.downloadusermigrationarchive
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
