naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Stargazers
  description: 'GitHub Repos API — Stargazers. 1 operations. Lead operation: List Stargazers. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Stargazers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-stargazers
    baseUri: ''
    description: GitHub Repos API — Stargazers business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-stargazers
      path: /repos/{owner}/{repo}/stargazers
      operations:
      - name: liststargazers
        method: GET
        description: List Stargazers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-stargazers-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Stargazers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/stargazers
      name: repos-owner-repo-stargazers
      description: REST surface for repos-owner-repo-stargazers.
      operations:
      - method: GET
        name: liststargazers
        description: List Stargazers
        call: temp-stargazers.liststargazers
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-stargazers-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Stargazers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-stargazers
      description: List Stargazers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-stargazers.liststargazers
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
