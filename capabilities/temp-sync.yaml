naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Sync
  description: 'GitHub Repos API — Sync. 1 operations. Lead operation: Sync Fork Branch With The Upstream Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Sync
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-sync
    baseUri: ''
    description: GitHub Repos API — Sync business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-merge-upstream
      path: /repos/{owner}/{repo}/merge-upstream
      operations:
      - name: syncforkbranchwiththeupstreamrepository
        method: POST
        description: Sync Fork Branch With The Upstream Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-sync-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Sync. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/merge-upstream
      name: repos-owner-repo-merge-upstream
      description: REST surface for repos-owner-repo-merge-upstream.
      operations:
      - method: POST
        name: syncforkbranchwiththeupstreamrepository
        description: Sync Fork Branch With The Upstream Repository
        call: temp-sync.syncforkbranchwiththeupstreamrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-sync-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Sync. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: sync-fork-branch-upstream-repository
      description: Sync Fork Branch With The Upstream Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-sync.syncforkbranchwiththeupstreamrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
