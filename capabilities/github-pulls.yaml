    - name: repos-owner-repo-pulls
      path: /repos/{owner}/{repo}/pulls
      operations:
      - name: pullslist
        method: GET
        description: GitHub List Pull Requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Either `open`, `closed`, or `all` to filter by state.
        - name: head
          in: query
          type: string
          description: 'Filter pulls by head user or head organization and branch name in the format of `user:ref-name` or
            `organization:ref-name`. For example: `github:new-script-form'
        - name: base
          in: query
          type: string
          description: 'Filter pulls by base branch name. Example: `gh-pages`.'
        - name: sort
          in: query
          type: string
          description: 'What to sort results by. `popularity` will sort by the number of comments. `long-running` will sort
            by date created and will limit the results to pull requests '
        - name: direction
          in: query
          type: string
          description: 'The direction of the sort. Default: `desc` when sort is `created` or sort is not specified, otherwise
            `asc`.'
      - name: pullscreate
        method: POST
        description: GitHub Create a Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-pulls-comments
      path: /repos/{owner}/{repo}/pulls/comments
      operations:
      - name: pullslistreviewcommentsforrepo
        method: GET
        description: GitHub List Review Comments in a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
        - name: direction
          in: query
          type: string
          description: The direction to sort results. Ignored without `sort` parameter.
    - name: repos-owner-repo-pulls-comments-comment_id
      path: /repos/{owner}/{repo}/pulls/comments/{comment_id}
      operations:
      - name: pullsgetreviewcomment
        method: GET
        description: GitHub Get a Review Comment for a Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: pullsupdatereviewcomment
        method: PATCH
        description: GitHub Update a Review Comment for a Pull Request
