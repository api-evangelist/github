naftiko: 1.0.0-alpha2
info:
  label: GitHub v3 REST API — Pulls
  description: 'GitHub v3 REST API — Pulls. 27 operations. Lead operation: GitHub List Pull Requests. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Pulls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
