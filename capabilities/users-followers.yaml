naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Followers
  description: 'GitHub User API — Followers. 2 operations. Lead operation: GitHub List Followers of the Authenticated User.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Followers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-followers
    baseUri: ''
    description: GitHub User API — Followers business capability. Self-contained, no shared references.
    resources:
    - name: user-followers
      path: /user/followers
      operations:
      - name: listfollowersoftheauthenticateduser
        method: GET
        description: GitHub List Followers of the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: users-username-followers
      path: /users/{username}/followers
      operations:
      - name: listfollowersofuser
        method: GET
        description: GitHub List Followers of User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-followers-rest
    port: 8080
    description: REST adapter for GitHub User API — Followers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/followers
      name: user-followers
      description: REST surface for user-followers.
      operations:
      - method: GET
        name: listfollowersoftheauthenticateduser
        description: GitHub List Followers of the Authenticated User
        call: users-followers.listfollowersoftheauthenticateduser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{username}/followers
      name: users-username-followers
      description: REST surface for users-username-followers.
      operations:
      - method: GET
        name: listfollowersofuser
        description: GitHub List Followers of User
        call: users-followers.listfollowersofuser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-followers-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Followers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-followers-authenticated-user
      description: GitHub List Followers of the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-followers.listfollowersoftheauthenticateduser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-list-followers-user
      description: GitHub List Followers of User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-followers.listfollowersofuser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
