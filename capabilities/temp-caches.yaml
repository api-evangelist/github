naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Caches
  description: 'GitHub Repos API — Caches. 2 operations. Lead operation: List Github Actions Caches For Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Caches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-caches
    baseUri: ''
    description: GitHub Repos API — Caches business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-caches
      path: /repos/{owner}/{repo}/actions/caches
      operations:
      - name: listgithubactionscachesforrepository
        method: GET
        description: List Github Actions Caches For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: deletegithubactionscachesforrepositoryusingcachekey
        method: DELETE
        description: Delete Github Actions Caches For Repository (using Cache Key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-caches-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Caches. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/caches
      name: repos-owner-repo-actions-caches
      description: REST surface for repos-owner-repo-actions-caches.
      operations:
      - method: GET
        name: listgithubactionscachesforrepository
        description: List Github Actions Caches For Repository
        call: temp-caches.listgithubactionscachesforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletegithubactionscachesforrepositoryusingcachekey
        description: Delete Github Actions Caches For Repository (using Cache Key)
        call: temp-caches.deletegithubactionscachesforrepositoryusingcachekey
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-caches-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Caches. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-github-actions-caches-repository
      description: List Github Actions Caches For Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-caches.listgithubactionscachesforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-github-actions-caches-repository
      description: Delete Github Actions Caches For Repository (using Cache Key)
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-caches.deletegithubactionscachesforrepositoryusingcachekey
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
