naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Users
  description: 'GitHub Installation API — Users. 3 operations. Lead operation: GitHub List App Installations Accessible to
    the User Access Token. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-users
    baseUri: ''
    description: GitHub Installation API — Users business capability. Self-contained, no shared references.
    resources:
    - name: user-installations
      path: /user/installations
      operations:
      - name: listappinstallationsaccessibletotheuseraccesstoken
        method: GET
        description: GitHub List App Installations Accessible to the User Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-installations-installation_id-repositories
      path: /user/installations/{installation_id}/repositories
      operations:
      - name: listrepositoriesaccessibletotheuseraccesstoken
        method: GET
        description: GitHub List Repositories Accessible to the User Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-username-installation
      path: /users/{username}/installation
      operations:
      - name: getuserinstallationfortheauthenticatedapp
        method: GET
        description: GitHub Get User Installation for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-users-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user/installations
      name: user-installations
      description: REST surface for user-installations.
      operations:
      - method: GET
        name: listappinstallationsaccessibletotheuseraccesstoken
        description: GitHub List App Installations Accessible to the User Access Token
        call: installation-users.listappinstallationsaccessibletotheuseraccesstoken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/installations/{installation-id}/repositories
      name: user-installations-installation-id-repositories
      description: REST surface for user-installations-installation_id-repositories.
      operations:
      - method: GET
        name: listrepositoriesaccessibletotheuseraccesstoken
        description: GitHub List Repositories Accessible to the User Access Token
        call: installation-users.listrepositoriesaccessibletotheuseraccesstoken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{username}/installation
      name: users-username-installation
      description: REST surface for users-username-installation.
      operations:
      - method: GET
        name: getuserinstallationfortheauthenticatedapp
        description: GitHub Get User Installation for the Authenticated App
        call: installation-users.getuserinstallationfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-app-installations-accessible
      description: GitHub List App Installations Accessible to the User Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: installation-users.listappinstallationsaccessibletotheuseraccesstoken
      outputParameters:
      - type: object
        mapping: $.
    - name: github-list-repositories-accessible-user
      description: GitHub List Repositories Accessible to the User Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: installation-users.listrepositoriesaccessibletotheuseraccesstoken
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-user-installation-authenticated
      description: GitHub Get User Installation for the Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: installation-users.getuserinstallationfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
