naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Notes
  description: 'github-repos-api — Notes. 1 operations. Lead operation: GitHub Generate Release Notes Content for Release.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Notes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-notes
    baseUri: ''
    description: github-repos-api — Notes business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-releases-generate-notes
      path: /repos/{owner}/{repo}/releases/generate-notes
      operations:
      - name: generatereleasenotescontentforrelease
        method: POST
        description: GitHub Generate Release Notes Content for Release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-notes-rest
    port: 8080
    description: REST adapter for github-repos-api — Notes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/releases/generate-notes
      name: repos-owner-repo-releases-generate-notes
      description: REST surface for repos-owner-repo-releases-generate-notes.
      operations:
      - method: POST
        name: generatereleasenotescontentforrelease
        description: GitHub Generate Release Notes Content for Release
        call: repo-tags-notes.generatereleasenotescontentforrelease
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-notes-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Notes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-generate-release-notes-content
      description: GitHub Generate Release Notes Content for Release
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-tags-notes.generatereleasenotescontentforrelease
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
