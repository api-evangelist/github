naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Person
  description: 'GitHub User API — Person. 1 operations. Lead operation: GitHub Check if Person is Followed by the Authenticated
    User. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Person
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-person
    baseUri: ''
    description: GitHub User API — Person business capability. Self-contained, no shared references.
    resources:
    - name: user-following-username
      path: /user/following/{username}
      operations:
      - name: checkifpersonisfollowedbytheauthenticateduser
        method: GET
        description: GitHub Check if Person is Followed by the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-person-rest
    port: 8080
    description: REST adapter for GitHub User API — Person. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/following/{username}
      name: user-following-username
      description: REST surface for user-following-username.
      operations:
      - method: GET
        name: checkifpersonisfollowedbytheauthenticateduser
        description: GitHub Check if Person is Followed by the Authenticated User
        call: users-person.checkifpersonisfollowedbytheauthenticateduser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-person-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Person. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-check-if-person-is
      description: GitHub Check if Person is Followed by the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-person.checkifpersonisfollowedbytheauthenticateduser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
