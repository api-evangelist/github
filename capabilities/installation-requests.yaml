naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Requests
  description: 'GitHub Installation API — Requests. 1 operations. Lead operation: GitHub List Installation Requests for the
    Authenticated App. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-requests
    baseUri: ''
    description: GitHub Installation API — Requests business capability. Self-contained, no shared references.
    resources:
    - name: app-installation-requests
      path: /app/installation-requests
      operations:
      - name: listinstallationrequestsfortheauthenticatedapp
        method: GET
        description: GitHub List Installation Requests for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-requests-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Requests. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/installation-requests
      name: app-installation-requests
      description: REST surface for app-installation-requests.
      operations:
      - method: GET
        name: listinstallationrequestsfortheauthenticatedapp
        description: GitHub List Installation Requests for the Authenticated App
        call: installation-requests.listinstallationrequestsfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Requests. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-list-installation-requests-authenticated
      description: GitHub List Installation Requests for the Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: installation-requests.listinstallationrequestsfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
