naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Enforcement
  description: 'GitHub Repos API — Enforcement. 2 operations. Lead operation: Update Pre-receive Hook Enforcement For Repository.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Enforcement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-enforcement
    baseUri: ''
    description: GitHub Repos API — Enforcement business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pre-receive-hooks-pre_receive_hook_id
      path: /repos/{owner}/{repo}/pre-receive-hooks/{pre_receive_hook_id}
      operations:
      - name: updateprereceivehookenforcementforrepository
        method: PATCH
        description: Update Pre-receive Hook Enforcement For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: removeprereceivehookenforcementforrepository
        method: DELETE
        description: Remove Pre-receive Hook Enforcement For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-enforcement-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Enforcement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pre-receive-hooks/{pre-receive-hook-id}
      name: repos-owner-repo-pre-receive-hooks-pre-receive-hook-id
      description: REST surface for repos-owner-repo-pre-receive-hooks-pre_receive_hook_id.
      operations:
      - method: PATCH
        name: updateprereceivehookenforcementforrepository
        description: Update Pre-receive Hook Enforcement For Repository
        call: temp-enforcement.updateprereceivehookenforcementforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeprereceivehookenforcementforrepository
        description: Remove Pre-receive Hook Enforcement For Repository
        call: temp-enforcement.removeprereceivehookenforcementforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-enforcement-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Enforcement. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: update-pre-receive-hook-enforcement
      description: Update Pre-receive Hook Enforcement For Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: temp-enforcement.updateprereceivehookenforcementforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-pre-receive-hook-enforcement
      description: Remove Pre-receive Hook Enforcement For Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-enforcement.removeprereceivehookenforcementforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
