naftiko: 1.0.0-alpha2
info:
  label: GitHub Setup API — Create
  description: 'GitHub Setup API — Create. 1 operations. Lead operation: GitHub Create Github License. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: setup-create
    baseUri: ''
    description: GitHub Setup API — Create business capability. Self-contained, no shared references.
    resources:
    - name: setup-api-start
      path: /setup/api/start
      operations:
      - name: creategithublicense
        method: POST
        description: GitHub Create Github License
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: setup-create-rest
    port: 8080
    description: REST adapter for GitHub Setup API — Create. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/setup/api/start
      name: setup-api-start
      description: REST surface for setup-api-start.
      operations:
      - method: POST
        name: creategithublicense
        description: GitHub Create Github License
        call: setup-create.creategithublicense
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: setup-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Setup API — Create. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-create-github-license
      description: GitHub Create Github License
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: setup-create.creategithublicense
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
