naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Unfollow
  description: 'GitHub User API — Unfollow. 1 operations. Lead operation: GitHub Unfollow User. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Unfollow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-unfollow
    baseUri: ''
    description: GitHub User API — Unfollow business capability. Self-contained, no shared references.
    resources:
    - name: user-following-username
      path: /user/following/{username}
      operations:
      - name: unfollowuser
        method: DELETE
        description: GitHub Unfollow User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-unfollow-rest
    port: 8080
    description: REST adapter for GitHub User API — Unfollow. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/following/{username}
      name: user-following-username
      description: REST surface for user-following-username.
      operations:
      - method: DELETE
        name: unfollowuser
        description: GitHub Unfollow User
        call: users-unfollow.unfollowuser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-unfollow-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Unfollow. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-unfollow-user
      description: GitHub Unfollow User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: users-unfollow.unfollowuser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
