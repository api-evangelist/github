naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Suspend
  description: 'GitHub User API — Suspend. 1 operations. Lead operation: GitHub Suspend User. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Suspend
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-suspend
    baseUri: ''
    description: GitHub User API — Suspend business capability. Self-contained, no shared references.
    resources:
    - name: users-username-suspended
      path: /users/{username}/suspended
      operations:
      - name: suspenduser
        method: PUT
        description: GitHub Suspend User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-suspend-rest
    port: 8080
    description: REST adapter for GitHub User API — Suspend. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users/{username}/suspended
      name: users-username-suspended
      description: REST surface for users-username-suspended.
      operations:
      - method: PUT
        name: suspenduser
        description: GitHub Suspend User
        call: users-suspend.suspenduser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-suspend-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Suspend. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-suspend-user
      description: GitHub Suspend User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: users-suspend.suspenduser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
