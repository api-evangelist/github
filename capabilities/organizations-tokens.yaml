naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Tokens
  description: 'GitHub Org API — Tokens. 2 operations. Lead operation: GitHub Create Registration Token for an Organization.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-tokens
    baseUri: ''
    description: GitHub Org API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-actions-runners-registration-token
      path: /orgs/{org}/actions/runners/registration-token
      operations:
      - name: createregistrationtokenforanorganization
        method: POST
        description: GitHub Create Registration Token for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orgs-org-actions-runners-remove-token
      path: /orgs/{org}/actions/runners/remove-token
      operations:
      - name: createremovetokenforanorganization
        method: POST
        description: GitHub Create Remove Token for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-tokens-rest
    port: 8080
    description: REST adapter for GitHub Org API — Tokens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/actions/runners/registration-token
      name: orgs-org-actions-runners-registration-token
      description: REST surface for orgs-org-actions-runners-registration-token.
      operations:
      - method: POST
        name: createregistrationtokenforanorganization
        description: GitHub Create Registration Token for an Organization
        call: organizations-tokens.createregistrationtokenforanorganization
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org}/actions/runners/remove-token
      name: orgs-org-actions-runners-remove-token
      description: REST surface for orgs-org-actions-runners-remove-token.
      operations:
      - method: POST
        name: createremovetokenforanorganization
        description: GitHub Create Remove Token for an Organization
        call: organizations-tokens.createremovetokenforanorganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Tokens. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-create-registration-token-organization
      description: GitHub Create Registration Token for an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: organizations-tokens.createregistrationtokenforanorganization
      outputParameters:
      - type: object
        mapping: $.
    - name: github-create-remove-token-organization
      description: GitHub Create Remove Token for an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: organizations-tokens.createremovetokenforanorganization
      outputParameters:
      - type: object
        mapping: $.
