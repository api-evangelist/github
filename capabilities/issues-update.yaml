naftiko: 1.0.0-alpha2
info:
  label: GitHub Issues API — Update
  description: 'GitHub Issues API — Update. 2 operations. Lead operation: GitHub Update an Issue Comment. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: issues-update
    baseUri: ''
    description: GitHub Issues API — Update business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-comments-comment_id
      path: /repos/{owner}/{repo}/issues/comments/{comment_id}
      operations:
      - name: updateanissuecomment
        method: PATCH
        description: GitHub Update an Issue Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-issues-issue_number
      path: /repos/{owner}/{repo}/issues/{issue_number}
      operations:
      - name: updateanissue
        method: PATCH
        description: GitHub Update an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: issues-update-rest
    port: 8080
    description: REST adapter for GitHub Issues API — Update. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/comments/{comment-id}
      name: repos-owner-repo-issues-comments-comment-id
      description: REST surface for repos-owner-repo-issues-comments-comment_id.
      operations:
      - method: PATCH
        name: updateanissuecomment
        description: GitHub Update an Issue Comment
        call: issues-update.updateanissuecomment
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/issues/{issue-number}
      name: repos-owner-repo-issues-issue-number
      description: REST surface for repos-owner-repo-issues-issue_number.
      operations:
      - method: PATCH
        name: updateanissue
        description: GitHub Update an Issue
        call: issues-update.updateanissue
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issues-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Issues API — Update. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-update-issue-comment
      description: GitHub Update an Issue Comment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: issues-update.updateanissuecomment
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-update-issue
      description: GitHub Update an Issue
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: issues-update.updateanissue
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
