naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Teams
  description: 'github-repos-api — Teams. 1 operations. Lead operation: GitHub List Repository Teams. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repos-teams
    baseUri: http://localhost:8080/rest/github-repos-api/1.1.4
    description: github-repos-api — Teams business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-teams
      path: /repos/{owner}/{repo}/teams
      operations:
      - name: listrepositoryteams
        method: GET
        description: GitHub List Repository Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repos-teams-rest
    port: 8080
    description: REST adapter for github-repos-api — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/teams
      name: repos-owner-repo-teams
      description: REST surface for repos-owner-repo-teams.
      operations:
      - method: GET
        name: listrepositoryteams
        description: GitHub List Repository Teams
        call: repos-teams.listrepositoryteams
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repos-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-repository-teams
      description: GitHub List Repository Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repos-teams.listrepositoryteams
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
