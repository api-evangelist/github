naftiko: 1.0.0-alpha2
info:
  label: GitHub Application API — Authorization
  description: 'GitHub Application API — Authorization. 1 operations. Lead operation: GitHub Delete an App Authorization.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Authorization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-authorization
    baseUri: ''
    description: GitHub Application API — Authorization business capability. Self-contained, no shared references.
    resources:
    - name: applications-client_id-grant
      path: /applications/{client_id}/grant
      operations:
      - name: deleteanappauthorization
        method: DELETE
        description: GitHub Delete an App Authorization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-authorization-rest
    port: 8080
    description: REST adapter for GitHub Application API — Authorization. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/applications/{client-id}/grant
      name: applications-client-id-grant
      description: REST surface for applications-client_id-grant.
      operations:
      - method: DELETE
        name: deleteanappauthorization
        description: GitHub Delete an App Authorization
        call: app-authorization.deleteanappauthorization
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-authorization-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Authorization. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-delete-app-authorization
      description: GitHub Delete an App Authorization
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: app-authorization.deleteanappauthorization
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
