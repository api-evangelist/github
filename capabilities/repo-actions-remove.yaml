naftiko: 1.0.0-alpha2
info:
  label: github-repo-actions-api — Remove
  description: 'github-repo-actions-api — Remove. 3 operations. Lead operation: GitHub Create Remove Token for Repository.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-actions-remove
    baseUri: ''
    description: github-repo-actions-api — Remove business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-runners-remove-token
      path: /repos/{owner}/{repo}/actions/runners/remove-token
      operations:
      - name: createremovetokenforrepository
        method: POST
        description: GitHub Create Remove Token for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-actions-runners-runner_id-labels
      path: /repos/{owner}/{repo}/actions/runners/{runner_id}/labels
      operations:
      - name: removeallcustomlabelsfromselfhostedrunnerforrepository
        method: DELETE
        description: GitHub Remove All Custom Labels from Self-hosted Runner for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-actions-runners-runner_id-labels-name
      path: /repos/{owner}/{repo}/actions/runners/{runner_id}/labels/{name}
      operations:
      - name: removecustomlabelfromselfhostedrunnerforrepository
        method: DELETE
        description: GitHub Remove Custom Label from Self-hosted Runner for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-actions-remove-rest
    port: 8080
    description: REST adapter for github-repo-actions-api — Remove. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/runners/remove-token
      name: repos-owner-repo-actions-runners-remove-token
      description: REST surface for repos-owner-repo-actions-runners-remove-token.
      operations:
      - method: POST
        name: createremovetokenforrepository
        description: GitHub Create Remove Token for Repository
        call: repo-actions-remove.createremovetokenforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/actions/runners/{runner-id}/labels
      name: repos-owner-repo-actions-runners-runner-id-labels
      description: REST surface for repos-owner-repo-actions-runners-runner_id-labels.
      operations:
      - method: DELETE
        name: removeallcustomlabelsfromselfhostedrunnerforrepository
        description: GitHub Remove All Custom Labels from Self-hosted Runner for Repository
        call: repo-actions-remove.removeallcustomlabelsfromselfhostedrunnerforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/actions/runners/{runner-id}/labels/{name}
      name: repos-owner-repo-actions-runners-runner-id-labels-name
      description: REST surface for repos-owner-repo-actions-runners-runner_id-labels-name.
      operations:
      - method: DELETE
        name: removecustomlabelfromselfhostedrunnerforrepository
        description: GitHub Remove Custom Label from Self-hosted Runner for Repository
        call: repo-actions-remove.removecustomlabelfromselfhostedrunnerforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-actions-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-actions-api — Remove. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-create-remove-token-repository
      description: GitHub Create Remove Token for Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-actions-remove.createremovetokenforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-all-custom-labels
      description: GitHub Remove All Custom Labels from Self-hosted Runner for Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-actions-remove.removeallcustomlabelsfromselfhostedrunnerforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-custom-label-self
      description: GitHub Remove Custom Label from Self-hosted Runner for Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-actions-remove.removecustomlabelfromselfhostedrunnerforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
