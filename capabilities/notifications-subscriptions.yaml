naftiko: 1.0.0-alpha2
info:
  label: GitHub Notifications API — Subscriptions
  description: 'GitHub Notifications API — Subscriptions. 3 operations. Lead operation: GitHub Get Thread Subscription for
    the Authenticated User. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: notifications-subscriptions
    baseUri: ''
    description: GitHub Notifications API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: notifications-threads-thread_id-subscription
      path: /notifications/threads/{thread_id}/subscription
      operations:
      - name: getthreadsubscriptionfortheauthenticateduser
        method: GET
        description: GitHub Get Thread Subscription for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setthreadsubscription
        method: PUT
        description: GitHub Set Thread Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletethreadsubscription
        method: DELETE
        description: GitHub Delete Thread Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: notifications-subscriptions-rest
    port: 8080
    description: REST adapter for GitHub Notifications API — Subscriptions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/notifications/threads/{thread-id}/subscription
      name: notifications-threads-thread-id-subscription
      description: REST surface for notifications-threads-thread_id-subscription.
      operations:
      - method: GET
        name: getthreadsubscriptionfortheauthenticateduser
        description: GitHub Get Thread Subscription for the Authenticated User
        call: notifications-subscriptions.getthreadsubscriptionfortheauthenticateduser
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setthreadsubscription
        description: GitHub Set Thread Subscription
        call: notifications-subscriptions.setthreadsubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletethreadsubscription
        description: GitHub Delete Thread Subscription
        call: notifications-subscriptions.deletethreadsubscription
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: notifications-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Notifications API — Subscriptions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: github-get-thread-subscription-authenticated
      description: GitHub Get Thread Subscription for the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: notifications-subscriptions.getthreadsubscriptionfortheauthenticateduser
      outputParameters:
      - type: object
        mapping: $.
    - name: github-set-thread-subscription
      description: GitHub Set Thread Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: notifications-subscriptions.setthreadsubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-delete-thread-subscription
      description: GitHub Delete Thread Subscription
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: notifications-subscriptions.deletethreadsubscription
      outputParameters:
      - type: object
        mapping: $.
