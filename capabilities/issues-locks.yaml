naftiko: 1.0.0-alpha2
info:
  label: GitHub Issues API — Locks
  description: 'GitHub Issues API — Locks. 1 operations. Lead operation: GitHub Lock an Issue. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Locks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: issues-locks
    baseUri: ''
    description: GitHub Issues API — Locks business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-issue_number-lock
      path: /repos/{owner}/{repo}/issues/{issue_number}/lock
      operations:
      - name: lockanissue
        method: PUT
        description: GitHub Lock an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: issues-locks-rest
    port: 8080
    description: REST adapter for GitHub Issues API — Locks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/{issue-number}/lock
      name: repos-owner-repo-issues-issue-number-lock
      description: REST surface for repos-owner-repo-issues-issue_number-lock.
      operations:
      - method: PUT
        name: lockanissue
        description: GitHub Lock an Issue
        call: issues-locks.lockanissue
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issues-locks-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Issues API — Locks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-lock-issue
      description: GitHub Lock an Issue
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: issues-locks.lockanissue
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
