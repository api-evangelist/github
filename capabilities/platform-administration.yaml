      - name: deleteDiscussion
        method: DELETE
        path: /orgs/{org}/teams/{team_slug}/discussions/{discussion_number}
        description: Delete a discussion.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks
      path: /orgs/{org}/hooks
