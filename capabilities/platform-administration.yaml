    - name: teams
      path: /orgs/{org}/teams
      description: Team CRUD and management.
      operations:
      - name: listTeams
        method: GET
        description: List teams.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createTeam
        method: POST
        description: Create a team.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getTeamByName
        method: GET
        path: /orgs/{org}/teams/{team_slug}
        description: Get a team by name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateTeam
        method: PATCH
        path: /orgs/{org}/teams/{team_slug}
        description: Update a team.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteTeam
        method: DELETE
        path: /orgs/{org}/teams/{team_slug}
        description: Delete a team.
        outputRawFormat: json
        outputParameters:
        - name: result
