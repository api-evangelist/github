          value: $.
      - name: removeRepositoryFromTeam
        method: DELETE
        path: /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}
        description: Remove a repository from a team.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: team-discussions
      path: /orgs/{org}/teams/{team_slug}/discussions
      description: Team discussion management.
      operations:
      - name: listDiscussions
        method: GET
        description: List discussions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
