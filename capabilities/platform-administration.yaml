      - name: createAnOrganizationRepository
        method: POST
        description: Create an organization repository.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: github-packages
    baseUri: https://api.github.com
    description: GitHub REST API for packages and package versions management.
    authentication:
      type: bearer
      token: '{{GITHUB_TOKEN}}'
    resources:
    - name: org-packages
      path: /orgs/{org}/packages
      description: Organization package management.
      operations:
      - name: listPackagesForAnOrganization
        method: GET
        description: List packages for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPackageForAnOrganization
        method: GET
        path: /orgs/{org}/packages/{package_type}/{package_name}
        description: Get a package for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletePackageForAnOrganization
        method: DELETE
        path: /orgs/{org}/packages/{package_type}/{package_name}
        description: Delete a package for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: restorePackageForAnOrganization
        method: POST
        path: /orgs/{org}/packages/{package_type}/{package_name}/restore
        description: Restore a package for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listPackageVersionsForPackageOwnedByAnOrganization
        method: GET
        path: /orgs/{org}/packages/{package_type}/{package_name}/versions
        description: List package versions for an organization package.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPackageVersionForAnOrganization
        method: GET
        path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}
        description: Get a package version for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletePackageVersionForAnOrganization
        method: DELETE
        path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}
        description: Delete a package version for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: restorePackageVersionForAnOrganization
        method: POST
        path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}/restore
        description: Restore a package version for an organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-packages
      path: /user/packages
      description: Authenticated user package management.
      operations:
      - name: listPackagesForTheAuthenticatedUsersNamespace
        method: GET
        description: List packages for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPackageForTheAuthenticatedUser
        method: GET
        path: /user/packages/{package_type}/{package_name}
        description: Get a package for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletePackageForTheAuthenticatedUser
        method: DELETE
        path: /user/packages/{package_type}/{package_name}
        description: Delete a package for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: restorePackageForTheAuthenticatedUser
        method: POST
        path: /user/packages/{package_type}/{package_name}/restore
        description: Restore a package for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listPackageVersionsForPackageOwnedByTheAuthenticatedUser
        method: GET
        path: /user/packages/{package_type}/{package_name}/versions
        description: List package versions for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPackageVersionForTheAuthenticatedUser
        method: GET
        path: /user/packages/{package_type}/{package_name}/versions/{package_version_id}
        description: Get a package version for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletePackageVersionForTheAuthenticatedUser
        method: DELETE
        path: /user/packages/{package_type}/{package_name}/versions/{package_version_id}
        description: Delete a package version for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: restorePackageVersionForTheAuthenticatedUser
        method: POST
        path: /user/packages/{package_type}/{package_name}/versions/{package_version_id}/restore
        description: Restore a package version for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8085
    namespace: github-platform-admin-api
    description: Unified REST API for platform administration combining apps, organizations, teams, and packages.
    resources:
    - path: /v1/app
      name: app
      description: Authenticated app
      operations:
      - method: GET
        name: getTheAuthenticatedApp
        description: Get the authenticated app
        call: github-apps.getTheAuthenticatedApp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations
      name: installations
      description: App installations
      operations:
      - method: GET
        name: listInstallationsForTheAuthenticatedApp
        description: List installations
        call: github-apps.listInstallationsForTheAuthenticatedApp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations/{installation_id}
      name: installation
      description: Individual installation
      operations:
      - method: GET
        name: getAnInstallationForTheAuthenticatedApp
        description: Get an installation
        call: github-apps.getAnInstallationForTheAuthenticatedApp
        with:
          installation_id: rest.installation_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteAnInstallationForTheAuthenticatedApp
        description: Delete an installation
        call: github-apps.deleteAnInstallationForTheAuthenticatedApp
        with:
          installation_id: rest.installation_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/installations/{installation_id}/access-tokens
      name: installation-tokens
      description: Installation access tokens
      operations:
      - method: POST
        name: createAnInstallationAccessTokenForAnApp
        description: Create an access token
        call: github-apps.createAnInstallationAccessTokenForAnApp
        with:
          installation_id: rest.installation_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{org}
      name: organization
      description: Organization management
      operations:
      - method: GET
        name: getAnOrganization
        description: Get an organization
        call: github-orgs.getAnOrganization
        with:
          org: rest.org
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateAnOrganization
        description: Update an organization
        call: github-orgs.updateAnOrganization
        with:
          org: rest.org
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{org}/members
      name: members
      description: Member management
      operations:
      - method: GET
        name: listOrganizationMembers
        description: List members
