naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Bill
  description: 'github-repos-api — Bill. 1 operations. Lead operation: GitHub Export Software Bill of Materials (sbom) for
    Repository.. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Bill
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-bill
    baseUri: ''
    description: github-repos-api — Bill business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-dependency-graph-sbom
      path: /repos/{owner}/{repo}/dependency-graph/sbom
      operations:
      - name: exportsoftwarebillofmaterialssbomforrepository
        method: GET
        description: GitHub Export Software Bill of Materials (sbom) for Repository.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-bill-rest
    port: 8080
    description: REST adapter for github-repos-api — Bill. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/dependency-graph/sbom
      name: repos-owner-repo-dependency-graph-sbom
      description: REST surface for repos-owner-repo-dependency-graph-sbom.
      operations:
      - method: GET
        name: exportsoftwarebillofmaterialssbomforrepository
        description: GitHub Export Software Bill of Materials (sbom) for Repository.
        call: repo-tags-bill.exportsoftwarebillofmaterialssbomforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-bill-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Bill. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-export-software-bill-materials
      description: GitHub Export Software Bill of Materials (sbom) for Repository.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-bill.exportsoftwarebillofmaterialssbomforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
