naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Rename
  description: 'GitHub Repos API — Rename. 1 operations. Lead operation: Rename Branch. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Rename
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-rename
    baseUri: ''
    description: GitHub Repos API — Rename business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-rename
      path: /repos/{owner}/{repo}/branches/{branch}/rename
      operations:
      - name: renamebranch
        method: POST
        description: Rename Branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-rename-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Rename. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/rename
      name: repos-owner-repo-branches-branch-rename
      description: REST surface for repos-owner-repo-branches-branch-rename.
      operations:
      - method: POST
        name: renamebranch
        description: Rename Branch
        call: temp-rename.renamebranch
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-rename-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Rename. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: rename-branch
      description: Rename Branch
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-rename.renamebranch
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
