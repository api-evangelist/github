naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Push
  description: 'GitHub Repos API — Push. 1 operations. Lead operation: Test The Push Repository Webhook. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Push
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-push
    baseUri: ''
    description: GitHub Repos API — Push business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-hooks-hook_id-tests
      path: /repos/{owner}/{repo}/hooks/{hook_id}/tests
      operations:
      - name: testthepushrepositorywebhook
        method: POST
        description: Test The Push Repository Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-push-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Push. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/hooks/{hook-id}/tests
      name: repos-owner-repo-hooks-hook-id-tests
      description: REST surface for repos-owner-repo-hooks-hook_id-tests.
      operations:
      - method: POST
        name: testthepushrepositorywebhook
        description: Test The Push Repository Webhook
        call: temp-push.testthepushrepositorywebhook
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-push-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Push. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: test-push-repository-webhook
      description: Test The Push Repository Webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: temp-push.testthepushrepositorywebhook
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
