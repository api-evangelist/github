naftiko: 1.0.0-alpha2
info:
  label: GitHub Projects API — Organizations
  description: 'GitHub Projects API — Organizations. 2 operations. Lead operation: GitHub List Organization Projects. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Organizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: projects-organizations
    baseUri: ''
    description: GitHub Projects API — Organizations business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-projects
      path: /orgs/{org}/projects
      operations:
      - name: listorganizationprojects
        method: GET
        description: GitHub List Organization Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Indicates the state of the projects to return.
      - name: createanorganizationproject
        method: POST
        description: GitHub Create an Organization Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: projects-organizations-rest
    port: 8080
    description: REST adapter for GitHub Projects API — Organizations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orgs/{org}/projects
      name: orgs-org-projects
      description: REST surface for orgs-org-projects.
      operations:
      - method: GET
        name: listorganizationprojects
        description: GitHub List Organization Projects
        call: projects-organizations.listorganizationprojects
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createanorganizationproject
        description: GitHub Create an Organization Project
        call: projects-organizations.createanorganizationproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: projects-organizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Projects API — Organizations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-list-organization-projects
      description: GitHub List Organization Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: projects-organizations.listorganizationprojects
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: github-create-organization-project
      description: GitHub Create an Organization Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: projects-organizations.createanorganizationproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
