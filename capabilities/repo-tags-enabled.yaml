naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Enabled
  description: 'github-repos-api — Enabled. 1 operations. Lead operation: GitHub Check if Vulnerability Alerts Are Enabled
    for Repository. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Enabled
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-enabled
    baseUri: ''
    description: github-repos-api — Enabled business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-vulnerability-alerts
      path: /repos/{owner}/{repo}/vulnerability-alerts
      operations:
      - name: checkifvulnerabilityalertsareenabledforrepository
        method: GET
        description: GitHub Check if Vulnerability Alerts Are Enabled for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-enabled-rest
    port: 8080
    description: REST adapter for github-repos-api — Enabled. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/vulnerability-alerts
      name: repos-owner-repo-vulnerability-alerts
      description: REST surface for repos-owner-repo-vulnerability-alerts.
      operations:
      - method: GET
        name: checkifvulnerabilityalertsareenabledforrepository
        description: GitHub Check if Vulnerability Alerts Are Enabled for Repository
        call: repo-tags-enabled.checkifvulnerabilityalertsareenabledforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-enabled-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Enabled. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-check-if-vulnerability-alerts
      description: GitHub Check if Vulnerability Alerts Are Enabled for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-enabled.checkifvulnerabilityalertsareenabledforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
