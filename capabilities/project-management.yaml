naftiko: 1.0.0-alpha2
info:
  label: GitHub Project Management
  description: Unified workflow for project management combining issues, projects, milestones, labels, and search. Used by
    project managers and team leads for tracking work, organizing sprints, and managing deliverables.
  tags:
  - GitHub
  - Project Management
  - Issues
  - Projects
  - Milestones
  - Search
  personas:
  - project managers
  - team leads
  - scrum masters
  - product owners
  created: '2026-04-17'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GITHUB_TOKEN: GITHUB_TOKEN
capability:
  consumes:
  - type: http
    namespace: github-issues
    baseUri: https://api.github.com
    description: GitHub REST API for issues, labels, milestones, assignees, comments, and reactions.
    authentication:
      type: bearer
      token: '{{GITHUB_TOKEN}}'
    resources:
    - name: issues
      path: /repos/{owner}/{repo}/issues
      description: Issue CRUD and listing operations.
      operations:
      - name: listRepositoryIssues
        method: GET
        description: List repository issues.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createAnIssue
        method: POST
        description: Create an issue.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getAnIssue
        method: GET
        path: /repos/{owner}/{repo}/issues/{issue_number}
        description: Get an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateAnIssue
        method: PATCH
        path: /repos/{owner}/{repo}/issues/{issue_number}
        description: Update an issue.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: lockAnIssue
        method: PUT
        path: /repos/{owner}/{repo}/issues/{issue_number}/lock
        description: Lock an issue.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unlockAnIssue
        method: DELETE
        path: /repos/{owner}/{repo}/issues/{issue_number}/lock
        description: Unlock an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: issue-comments
      path: /repos/{owner}/{repo}/issues
      description: Issue comment management.
      operations:
      - name: listIssueComments
        method: GET
        path: /repos/{owner}/{repo}/issues/{issue_number}/comments
        description: List issue comments.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createAnIssueComment
        method: POST
        path: /repos/{owner}/{repo}/issues/{issue_number}/comments
        description: Create an issue comment.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getAnIssueComment
        method: GET
        path: /repos/{owner}/{repo}/issues/comments/{comment_id}
        description: Get an issue comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateAnIssueComment
        method: PATCH
        path: /repos/{owner}/{repo}/issues/comments/{comment_id}
        description: Update an issue comment.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteAnIssueComment
        method: DELETE
        path: /repos/{owner}/{repo}/issues/comments/{comment_id}
        description: Delete an issue comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listIssueCommentsForRepository
        method: GET
        path: /repos/{owner}/{repo}/issues/comments
        description: List issue comments for a repository.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assignees
      path: /repos/{owner}/{repo}
      description: Issue assignee management.
      operations:
      - name: listAssignees
        method: GET
        path: /repos/{owner}/{repo}/assignees
        description: List assignees.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: checkIfUserCanBeAssigned
        method: GET
        path: /repos/{owner}/{repo}/assignees/{assignee}
        description: Check if a user can be assigned.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addAssigneesToAnIssue
        method: POST
        path: /repos/{owner}/{repo}/issues/{issue_number}/assignees
        description: Add assignees to an issue.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removeAssigneesFromAnIssue
        method: DELETE
        path: /repos/{owner}/{repo}/issues/{issue_number}/assignees
        description: Remove assignees from an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: labels
      path: /repos/{owner}/{repo}/labels
      description: Label management for repositories and issues.
      operations:
      - name: listLabelsForRepository
        method: GET
        description: List labels for a repository.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createLabel
        method: POST
        description: Create a label.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getLabel
        method: GET
        path: /repos/{owner}/{repo}/labels/{name}
        description: Get a label.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateLabel
        method: PATCH
        path: /repos/{owner}/{repo}/labels/{name}
        description: Update a label.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteLabel
        method: DELETE
        path: /repos/{owner}/{repo}/labels/{name}
        description: Delete a label.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listLabelsForAnIssue
        method: GET
        path: /repos/{owner}/{repo}/issues/{issue_number}/labels
        description: List labels for an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addLabelsToAnIssue
        method: POST
        path: /repos/{owner}/{repo}/issues/{issue_number}/labels
        description: Add labels to an issue.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removeAllLabelsFromAnIssue
        method: DELETE
        path: /repos/{owner}/{repo}/issues/{issue_number}/labels
        description: Remove all labels from an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removeLabelFromAnIssue
        method: DELETE
        path: /repos/{owner}/{repo}/issues/{issue_number}/labels/{name}
        description: Remove a label from an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: milestones
      path: /repos/{owner}/{repo}/milestones
      description: Milestone management.
      operations:
      - name: listMilestones
        method: GET
        description: List milestones.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createMilestone
        method: POST
        description: Create a milestone.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getMilestone
        method: GET
        path: /repos/{owner}/{repo}/milestones/{milestone_number}
        description: Get a milestone.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateMilestone
        method: PATCH
        path: /repos/{owner}/{repo}/milestones/{milestone_number}
        description: Update a milestone.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteMilestone
        method: DELETE
        path: /repos/{owner}/{repo}/milestones/{milestone_number}
        description: Delete a milestone.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reactions
      path: /repos/{owner}/{repo}/issues
      description: Issue and comment reaction management.
      operations:
      - name: listReactionsForAnIssue
        method: GET
        path: /repos/{owner}/{repo}/issues/{issue_number}/reactions
        description: List reactions for an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createReactionForAnIssue
        method: POST
        path: /repos/{owner}/{repo}/issues/{issue_number}/reactions
        description: Create reaction for an issue.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteAnIssueReaction
        method: DELETE
        path: /repos/{owner}/{repo}/issues/{issue_number}/reactions/{reaction_id}
        description: Delete an issue reaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listReactionsForAnIssueComment
        method: GET
        path: /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions
        description: List reactions for an issue comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createReactionForAnIssueComment
        method: POST
        path: /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions
        description: Create reaction for an issue comment.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteAnIssueCommentReaction
        method: DELETE
        path: /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions/{reaction_id}
        description: Delete an issue comment reaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: timeline
      path: /repos/{owner}/{repo}/issues/{issue_number}/timeline
      description: Issue timeline events.
      operations:
      - name: listTimelineEventsForAnIssue
        method: GET
        description: List timeline events for an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: issue-events
      path: /repos/{owner}/{repo}/issues/events
      description: Issue event listing.
      operations:
      - name: listIssueEventsForRepository
        method: GET
        description: List issue events for a repository.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getAnIssueEvent
        method: GET
        path: /repos/{owner}/{repo}/issues/events/{event_id}
        description: Get an issue event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listIssueEvents
        method: GET
        path: /repos/{owner}/{repo}/issues/{issue_number}/events
        description: List events for an issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: github-projects
    baseUri: https://api.github.com
    description: GitHub REST API for projects, columns, cards, and collaborators.
    authentication:
      type: bearer
      token: '{{GITHUB_TOKEN}}'
    resources:
    - name: projects
      path: /projects
      description: Project CRUD operations.
      operations:
      - name: getProject
        method: GET
        path: /projects/{project_id}
        description: Get a project.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateProject
        method: PATCH
        path: /projects/{project_id}
        description: Update a project.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteProject
        method: DELETE
        path: /projects/{project_id}
        description: Delete a project.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listOrganizationProjects
        method: GET
        path: /orgs/{org}/projects
        description: List organization projects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createAnOrganizationProject
        method: POST
        path: /orgs/{org}/projects
        description: Create an organization project.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listRepositoryProjects
        method: GET
        path: /repos/{owner}/{repo}/projects
        description: List repository projects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createRepositoryProject
        method: POST
        path: /repos/{owner}/{repo}/projects
        description: Create a repository project.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createUserProject
        method: POST
        path: /user/projects
        description: Create a user project.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listUserProjects
        method: GET
        path: /users/{username}/projects
        description: List user projects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: columns
      path: /projects/{project_id}/columns
      description: Project column management.
      operations:
      - name: listProjectColumns
        method: GET
        description: List project columns.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createProjectColumn
        method: POST
        description: Create a project column.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getProjectColumn
        method: GET
        path: /projects/columns/{column_id}
        description: Get a project column.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateAnExistingProjectColumn
        method: PATCH
        path: /projects/columns/{column_id}
        description: Update a project column.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteProjectColumn
        method: DELETE
        path: /projects/columns/{column_id}
        description: Delete a project column.
