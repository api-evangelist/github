  - type: http
    namespace: github-search
    baseUri: https://api.github.com
    description: GitHub REST API for searching code, commits, issues, labels, repositories, topics, and users.
    authentication:
      type: bearer
      token: '{{GITHUB_TOKEN}}'
    resources:
    - name: search
      path: /search
      description: Search operations across GitHub.
      operations:
      - name: searchCode
        method: GET
        path: /search/code
        description: Search code.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchCommits
        method: GET
        path: /search/commits
        description: Search commits.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchIssuesAndPullRequests
        method: GET
        path: /search/issues
        description: Search issues and pull requests.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchLabels
        method: GET
        path: /search/labels
        description: Search labels.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        - name: repository_id
          in: query
          type: integer
          required: true
          description: Repository ID to search labels in
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchRepositories
        method: GET
        path: /search/repositories
        description: Search repositories.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchTopics
        method: GET
        path: /search/topics
        description: Search topics.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchUsers
        method: GET
        path: /search/users
        description: Search users.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: github-project-management-api
    description: Unified REST API for project management workflows combining issues, projects, and search.
    resources:
    - path: /v1/repositories/{owner}/{repo}/issues
      name: issues
      description: Issue management
      operations:
      - method: GET
        name: listRepositoryIssues
        description: List issues
        call: github-issues.listRepositoryIssues
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createAnIssue
        description: Create an issue
        call: github-issues.createAnIssue
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/issues/{issue_number}
      name: issue
      description: Individual issue operations
      operations:
      - method: GET
        name: getAnIssue
        description: Get an issue
        call: github-issues.getAnIssue
        with:
          issue_number: rest.issue_number
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateAnIssue
        description: Update an issue
        call: github-issues.updateAnIssue
        with:
          issue_number: rest.issue_number
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/milestones
      name: milestones
      description: Milestone management
      operations:
      - method: GET
        name: listMilestones
        description: List milestones
        call: github-issues.listMilestones
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createMilestone
        description: Create a milestone
        call: github-issues.createMilestone
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{owner}/{repo}/labels
      name: labels
      description: Label management
      operations:
      - method: GET
        name: listLabelsForRepository
        description: List labels
        call: github-issues.listLabelsForRepository
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createLabel
        description: Create a label
        call: github-issues.createLabel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project_id}
      name: project
      description: Project operations
      operations:
      - method: GET
        name: getProject
        description: Get a project
        call: github-projects.getProject
        with:
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateProject
        description: Update a project
        call: github-projects.updateProject
        with:
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project_id}/columns
      name: columns
      description: Project column management
      operations:
      - method: GET
        name: listProjectColumns
        description: List columns
        call: github-projects.listProjectColumns
        with:
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createProjectColumn
        description: Create a column
        call: github-projects.createProjectColumn
        with:
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/issues
      name: issue-search
      description: Issue and PR search
      operations:
      - method: GET
        name: searchIssuesAndPullRequests
        description: Search issues and pull requests
        call: github-search.searchIssuesAndPullRequests
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9082
    namespace: github-project-management-mcp
    transport: http
    description: MCP server for AI-assisted project management workflows.
    tools:
    - name: list-issues
      description: List repository issues
      call: github-issues.listRepositoryIssues
      hints:
        readOnly: true
    - name: create-issue
      description: Create an issue
      call: github-issues.createAnIssue
    - name: get-issue
      description: Get an issue
      call: github-issues.getAnIssue
      hints:
        readOnly: true
    - name: update-issue
      description: Update an issue
      call: github-issues.updateAnIssue
      hints:
        idempotent: true
    - name: lock-issue
      description: Lock an issue
      call: github-issues.lockAnIssue
    - name: list-issue-comments
      description: List issue comments
      call: github-issues.listIssueComments
