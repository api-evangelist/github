naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Vulnerabilities
  description: 'github-repos-api — Vulnerabilities. 3 operations. Lead operation: GitHub Check if Vulnerability Alerts Are
    Enabled for Repository. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Vulnerabilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-vulnerabilities
    baseUri: ''
    description: github-repos-api — Vulnerabilities business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-vulnerability-alerts
      path: /repos/{owner}/{repo}/vulnerability-alerts
      operations:
      - name: checkifvulnerabilityalertsareenabledforrepository
        method: GET
        description: GitHub Check if Vulnerability Alerts Are Enabled for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: enablevulnerabilityalerts
        method: PUT
        description: GitHub Enable Vulnerability Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: disablevulnerabilityalerts
        method: DELETE
        description: GitHub Disable Vulnerability Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-vulnerabilities-rest
    port: 8080
    description: REST adapter for github-repos-api — Vulnerabilities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/vulnerability-alerts
      name: repos-owner-repo-vulnerability-alerts
      description: REST surface for repos-owner-repo-vulnerability-alerts.
      operations:
      - method: GET
        name: checkifvulnerabilityalertsareenabledforrepository
        description: GitHub Check if Vulnerability Alerts Are Enabled for Repository
        call: repo-tags-vulnerabilities.checkifvulnerabilityalertsareenabledforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: enablevulnerabilityalerts
        description: GitHub Enable Vulnerability Alerts
        call: repo-tags-vulnerabilities.enablevulnerabilityalerts
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: disablevulnerabilityalerts
        description: GitHub Disable Vulnerability Alerts
        call: repo-tags-vulnerabilities.disablevulnerabilityalerts
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-vulnerabilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Vulnerabilities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-check-if-vulnerability-alerts
      description: GitHub Check if Vulnerability Alerts Are Enabled for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-vulnerabilities.checkifvulnerabilityalertsareenabledforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-enable-vulnerability-alerts
      description: GitHub Enable Vulnerability Alerts
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-vulnerabilities.enablevulnerabilityalerts
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-disable-vulnerability-alerts
      description: GitHub Disable Vulnerability Alerts
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-tags-vulnerabilities.disablevulnerabilityalerts
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
