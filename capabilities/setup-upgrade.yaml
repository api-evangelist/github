naftiko: 1.0.0-alpha2
info:
  label: GitHub Setup API — Upgrade
  description: 'GitHub Setup API — Upgrade. 1 operations. Lead operation: GitHub Upgrade License. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Upgrade
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: setup-upgrade
    baseUri: ''
    description: GitHub Setup API — Upgrade business capability. Self-contained, no shared references.
    resources:
    - name: setup-api-upgrade
      path: /setup/api/upgrade
      operations:
      - name: upgradelicense
        method: POST
        description: GitHub Upgrade License
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: setup-upgrade-rest
    port: 8080
    description: REST adapter for GitHub Setup API — Upgrade. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/setup/api/upgrade
      name: setup-api-upgrade
      description: REST surface for setup-api-upgrade.
      operations:
      - method: POST
        name: upgradelicense
        description: GitHub Upgrade License
        call: setup-upgrade.upgradelicense
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: setup-upgrade-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Setup API — Upgrade. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-upgrade-license
      description: GitHub Upgrade License
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: setup-upgrade.upgradelicense
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
