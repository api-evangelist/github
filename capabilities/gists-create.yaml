naftiko: 1.0.0-alpha2
info:
  label: GitHub Gists API — Create
  description: 'GitHub Gists API — Create. 1 operations. Lead operation: GitHub Creategist Comment. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gists-create
    baseUri: ''
    description: GitHub Gists API — Create business capability. Self-contained, no shared references.
    resources:
    - name: gists-gist_id-comments
      path: /gists/{gist_id}/comments
      operations:
      - name: creategistcomment
        method: POST
        description: GitHub Creategist Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: gists-create-rest
    port: 8080
    description: REST adapter for GitHub Gists API — Create. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gists/{gist-id}/comments
      name: gists-gist-id-comments
      description: REST surface for gists-gist_id-comments.
      operations:
      - method: POST
        name: creategistcomment
        description: GitHub Creategist Comment
        call: gists-create.creategistcomment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gists-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Gists API — Create. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-creategist-comment
      description: GitHub Creategist Comment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gists-create.creategistcomment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
