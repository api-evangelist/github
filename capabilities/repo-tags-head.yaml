naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Head
  description: 'github-repos-api — Head. 1 operations. Lead operation: GitHub List Branches for Head Commit. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Head
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-head
    baseUri: ''
    description: github-repos-api — Head business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-commits-commit_sha-branches-where-head
      path: /repos/{owner}/{repo}/commits/{commit_sha}/branches-where-head
      operations:
      - name: listbranchesforheadcommit
        method: GET
        description: GitHub List Branches for Head Commit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-head-rest
    port: 8080
    description: REST adapter for github-repos-api — Head. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/commits/{commit-sha}/branches-where-head
      name: repos-owner-repo-commits-commit-sha-branches-where-head
      description: REST surface for repos-owner-repo-commits-commit_sha-branches-where-head.
      operations:
      - method: GET
        name: listbranchesforheadcommit
        description: GitHub List Branches for Head Commit
        call: repo-tags-head.listbranchesforheadcommit
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-head-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Head. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-branches-head-commit
      description: GitHub List Branches for Head Commit
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-head.listbranchesforheadcommit
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
