naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Tokens
  description: 'GitHub Repos API — Tokens. 3 operations. Lead operation: Create Registration Token For Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-tokens
    baseUri: ''
    description: GitHub Repos API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-runners-registration-token
      path: /repos/{owner}/{repo}/actions/runners/registration-token
      operations:
      - name: createregistrationtokenforrepository
        method: POST
        description: Create Registration Token For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-actions-runners-remove-token
      path: /repos/{owner}/{repo}/actions/runners/remove-token
      operations:
      - name: createremovetokenforrepository
        method: POST
        description: Create Remove Token For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: user-installations-installation_id-repositories
      path: /user/installations/{installation_id}/repositories
      operations:
      - name: listrepositoriesaccessibletotheuseraccesstoken
        method: GET
        description: List Repositories Accessible To The User Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-tokens-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Tokens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/runners/registration-token
      name: repos-owner-repo-actions-runners-registration-token
      description: REST surface for repos-owner-repo-actions-runners-registration-token.
      operations:
      - method: POST
        name: createregistrationtokenforrepository
        description: Create Registration Token For Repository
        call: temp-tokens.createregistrationtokenforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/actions/runners/remove-token
      name: repos-owner-repo-actions-runners-remove-token
      description: REST surface for repos-owner-repo-actions-runners-remove-token.
      operations:
      - method: POST
        name: createremovetokenforrepository
        description: Create Remove Token For Repository
        call: temp-tokens.createremovetokenforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/installations/{installation-id}/repositories
      name: user-installations-installation-id-repositories
      description: REST surface for user-installations-installation_id-repositories.
      operations:
      - method: GET
        name: listrepositoriesaccessibletotheuseraccesstoken
        description: List Repositories Accessible To The User Access Token
        call: temp-tokens.listrepositoriesaccessibletotheuseraccesstoken
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Tokens. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-registration-token-repository
      description: Create Registration Token For Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-tokens.createregistrationtokenforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: create-remove-token-repository
      description: Create Remove Token For Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-tokens.createremovetokenforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: list-repositories-accessible-user-access
      description: List Repositories Accessible To The User Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-tokens.listrepositoriesaccessibletotheuseraccesstoken
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
