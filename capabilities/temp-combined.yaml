naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Combined
  description: 'GitHub Repos API — Combined. 1 operations. Lead operation: Get The Combined Status For Specific Reference.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Combined
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-combined
    baseUri: ''
    description: GitHub Repos API — Combined business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-commits-ref-status
      path: /repos/{owner}/{repo}/commits/{ref}/status
      operations:
      - name: getthecombinedstatusforspecificreference
        method: GET
        description: Get The Combined Status For Specific Reference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-combined-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Combined. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/commits/{ref}/status
      name: repos-owner-repo-commits-ref-status
      description: REST surface for repos-owner-repo-commits-ref-status.
      operations:
      - method: GET
        name: getthecombinedstatusforspecificreference
        description: Get The Combined Status For Specific Reference
        call: temp-combined.getthecombinedstatusforspecificreference
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-combined-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Combined. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-combined-status-specific-reference
      description: Get The Combined Status For Specific Reference
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-combined.getthecombinedstatusforspecificreference
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
