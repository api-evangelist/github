naftiko: 1.0.0-alpha2
info:
  label: GitHub Auth API — Keys
  description: 'GitHub Auth API — Keys. 3 operations. Lead operation: GitHub Get All Authorized Ssh Keys. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth-keys
    baseUri: ''
    description: GitHub Auth API — Keys business capability. Self-contained, no shared references.
    resources:
    - name: setup-api-settings-authorized-keys
      path: /setup/api/settings/authorized-keys
      operations:
      - name: getallauthorizedsshkeys
        method: GET
        description: GitHub Get All Authorized Ssh Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addanauthorizedsshkey
        method: POST
        description: GitHub Add an Authorized Ssh Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removeanauthorizedsshkey
        method: DELETE
        description: GitHub Remove an Authorized Ssh Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: auth-keys-rest
    port: 8080
    description: REST adapter for GitHub Auth API — Keys. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/setup/api/settings/authorized-keys
      name: setup-api-settings-authorized-keys
      description: REST surface for setup-api-settings-authorized-keys.
      operations:
      - method: GET
        name: getallauthorizedsshkeys
        description: GitHub Get All Authorized Ssh Keys
        call: auth-keys.getallauthorizedsshkeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addanauthorizedsshkey
        description: GitHub Add an Authorized Ssh Key
        call: auth-keys.addanauthorizedsshkey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeanauthorizedsshkey
        description: GitHub Remove an Authorized Ssh Key
        call: auth-keys.removeanauthorizedsshkey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Auth API — Keys. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-all-authorized-ssh
      description: GitHub Get All Authorized Ssh Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: auth-keys.getallauthorizedsshkeys
      outputParameters:
      - type: object
        mapping: $.
    - name: github-add-authorized-ssh-key
      description: GitHub Add an Authorized Ssh Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: auth-keys.addanauthorizedsshkey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-authorized-ssh-key
      description: GitHub Remove an Authorized Ssh Key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: auth-keys.removeanauthorizedsshkey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
