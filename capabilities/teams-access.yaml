naftiko: 1.0.0-alpha2
info:
  label: GitHub Teams API — Access
  description: 'GitHub Teams API — Access. 4 operations. Lead operation: GitHub Get Teams with Access to the Protected Branch.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Access
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: teams-access
    baseUri: ''
    description: GitHub Teams API — Access business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-protection-restrictions-teams
      path: /repos/{owner}/{repo}/branches/{branch}/protection/restrictions/teams
      operations:
      - name: getteamswithaccesstotheprotectedbranch
        method: GET
        description: GitHub Get Teams with Access to the Protected Branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addteamaccessrestrictions
        method: POST
        description: GitHub Add Team Access Restrictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: setteamaccessrestrictions
        method: PUT
        description: GitHub Set Team Access Restrictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: removeteamaccessrestrictions
        method: DELETE
        description: GitHub Remove Team Access Restrictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: teams-access-rest
    port: 8080
    description: REST adapter for GitHub Teams API — Access. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/protection/restrictions/teams
      name: repos-owner-repo-branches-branch-protection-restrictions-teams
      description: REST surface for repos-owner-repo-branches-branch-protection-restrictions-teams.
      operations:
      - method: GET
        name: getteamswithaccesstotheprotectedbranch
        description: GitHub Get Teams with Access to the Protected Branch
        call: teams-access.getteamswithaccesstotheprotectedbranch
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addteamaccessrestrictions
        description: GitHub Add Team Access Restrictions
        call: teams-access.addteamaccessrestrictions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setteamaccessrestrictions
        description: GitHub Set Team Access Restrictions
        call: teams-access.setteamaccessrestrictions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeteamaccessrestrictions
        description: GitHub Remove Team Access Restrictions
        call: teams-access.removeteamaccessrestrictions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teams-access-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Teams API — Access. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-teams-access-protected
      description: GitHub Get Teams with Access to the Protected Branch
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teams-access.getteamswithaccesstotheprotectedbranch
      outputParameters:
      - type: object
        mapping: $.
    - name: github-add-team-access-restrictions
      description: GitHub Add Team Access Restrictions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: teams-access.addteamaccessrestrictions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-set-team-access-restrictions
      description: GitHub Set Team Access Restrictions
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: teams-access.setteamaccessrestrictions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-team-access-restrictions
      description: GitHub Remove Team Access Restrictions
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: teams-access.removeteamaccessrestrictions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
