naftiko: 1.0.0-alpha2
info:
  label: GitHub Search API — Topics
  description: 'GitHub Search API — Topics. 1 operations. Lead operation: GitHub Search Topics. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Topics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-topics
    baseUri: ''
    description: GitHub Search API — Topics business capability. Self-contained, no shared references.
    resources:
    - name: search-topics
      path: /search/topics
      operations:
      - name: searchtopics
        method: GET
        description: GitHub Search Topics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The query contains one or more search keywords and qualifiers. Qualifiers allow you to limit your search
            to specific areas of GitHub Enterprise Server. The REST
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
  exposes:
  - type: rest
    namespace: search-topics-rest
    port: 8080
    description: REST adapter for GitHub Search API — Topics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search/topics
      name: search-topics
      description: REST surface for search-topics.
      operations:
      - method: GET
        name: searchtopics
        description: GitHub Search Topics
        call: search-topics.searchtopics
        with:
          q: rest.q
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-topics-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Search API — Topics. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-search-topics
      description: GitHub Search Topics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-topics.searchtopics
      with:
        q: tools.q
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
