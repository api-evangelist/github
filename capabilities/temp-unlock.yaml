naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Unlock
  description: 'GitHub Repos API — Unlock. 2 operations. Lead operation: Unlock An Organization Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Unlock
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-unlock
    baseUri: ''
    description: GitHub Repos API — Unlock business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-migrations-migration_id-repos-repo_name-lock
      path: /orgs/{org}/migrations/{migration_id}/repos/{repo_name}/lock
      operations:
      - name: unlockanorganizationrepository
        method: DELETE
        description: Unlock An Organization Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-issues-issue_number-lock
      path: /repos/{owner}/{repo}/issues/{issue_number}/lock
      operations:
      - name: unlockanissue
        method: DELETE
        description: Unlock An Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-unlock-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Unlock. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/migrations/{migration-id}/repos/{repo-name}/lock
      name: orgs-org-migrations-migration-id-repos-repo-name-lock
      description: REST surface for orgs-org-migrations-migration_id-repos-repo_name-lock.
      operations:
      - method: DELETE
        name: unlockanorganizationrepository
        description: Unlock An Organization Repository
        call: temp-unlock.unlockanorganizationrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/issues/{issue-number}/lock
      name: repos-owner-repo-issues-issue-number-lock
      description: REST surface for repos-owner-repo-issues-issue_number-lock.
      operations:
      - method: DELETE
        name: unlockanissue
        description: Unlock An Issue
        call: temp-unlock.unlockanissue
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-unlock-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Unlock. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: unlock-organization-repository
      description: Unlock An Organization Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-unlock.unlockanorganizationrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: unlock-issue
      description: Unlock An Issue
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-unlock.unlockanissue
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
