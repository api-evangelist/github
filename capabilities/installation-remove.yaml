naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Remove
  description: 'GitHub Installation API — Remove. 1 operations. Lead operation: GitHub Remove Repository from an App Installation.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-remove
    baseUri: ''
    description: GitHub Installation API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: user-installations-installation_id-repositories-repository_id
      path: /user/installations/{installation_id}/repositories/{repository_id}
      operations:
      - name: removerepositoryfromanappinstallation
        method: DELETE
        description: GitHub Remove Repository from an App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-remove-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Remove. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user/installations/{installation-id}/repositories/{repository-id}
      name: user-installations-installation-id-repositories-repository-id
      description: REST surface for user-installations-installation_id-repositories-repository_id.
      operations:
      - method: DELETE
        name: removerepositoryfromanappinstallation
        description: GitHub Remove Repository from an App Installation
        call: installation-remove.removerepositoryfromanappinstallation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Remove. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-remove-repository-app-installation
      description: GitHub Remove Repository from an App Installation
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: installation-remove.removerepositoryfromanappinstallation
      outputParameters:
      - type: object
        mapping: $.
