naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Archive
  description: 'github-repos-api — Archive. 1 operations. Lead operation: GitHub Download Repository Archive (tar). Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Archive
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-archive
    baseUri: ''
    description: github-repos-api — Archive business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-tarball-ref
      path: /repos/{owner}/{repo}/tarball/{ref}
      operations:
      - name: downloadrepositoryarchivetar
        method: GET
        description: GitHub Download Repository Archive (tar)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ref
          in: path
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-archive-rest
    port: 8080
    description: REST adapter for github-repos-api — Archive. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/tarball/{ref}
      name: repos-owner-repo-tarball-ref
      description: REST surface for repos-owner-repo-tarball-ref.
      operations:
      - method: GET
        name: downloadrepositoryarchivetar
        description: GitHub Download Repository Archive (tar)
        call: repo-tags-archive.downloadrepositoryarchivetar
        with:
          ref: rest.ref
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-archive-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Archive. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-download-repository-archive-tar
      description: GitHub Download Repository Archive (tar)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-archive.downloadrepositoryarchivetar
      with:
        ref: tools.ref
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
