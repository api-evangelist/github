naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Accept
  description: 'GitHub User API — Accept. 1 operations. Lead operation: GitHub Accept Repository Invitation. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Accept
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-accept
    baseUri: ''
    description: GitHub User API — Accept business capability. Self-contained, no shared references.
    resources:
    - name: user-repository_invitations-invitation_id
      path: /user/repository_invitations/{invitation_id}
      operations:
      - name: acceptrepositoryinvitation
        method: PATCH
        description: GitHub Accept Repository Invitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-accept-rest
    port: 8080
    description: REST adapter for GitHub User API — Accept. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/repository-invitations/{invitation-id}
      name: user-repository-invitations-invitation-id
      description: REST surface for user-repository_invitations-invitation_id.
      operations:
      - method: PATCH
        name: acceptrepositoryinvitation
        description: GitHub Accept Repository Invitation
        call: users-accept.acceptrepositoryinvitation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-accept-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Accept. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-accept-repository-invitation
      description: GitHub Accept Repository Invitation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: users-accept.acceptrepositoryinvitation
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
