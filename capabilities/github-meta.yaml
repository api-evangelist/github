naftiko: 1.0.0-alpha2
info:
  label: GitHub v3 REST API — Meta
  description: 'GitHub v3 REST API — Meta. 4 operations. Lead operation: GitHub API Root. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Meta
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: github-meta
    baseUri: ''
    description: GitHub v3 REST API — Meta business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: metaroot
        method: GET
        description: GitHub API Root
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meta
      path: /meta
      operations:
      - name: metaget
        method: GET
        description: GitHub Get GitHub Enterprise Server Meta Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: octocat
      path: /octocat
      operations:
      - name: metagetoctocat
        method: GET
        description: GitHub Get Octocat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: s
          in: query
          type: string
          description: The words to show in Octocat's speech bubble
    - name: zen
      path: /zen
      operations:
      - name: metagetzen
        method: GET
        description: GitHub Get the Zen of GitHub
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: github-meta-rest
    port: 8080
    description: REST adapter for GitHub v3 REST API — Meta. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: metaroot
        description: GitHub API Root
        call: github-meta.metaroot
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meta
      name: meta
      description: REST surface for meta.
      operations:
      - method: GET
        name: metaget
        description: GitHub Get GitHub Enterprise Server Meta Information
        call: github-meta.metaget
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/octocat
      name: octocat
      description: REST surface for octocat.
      operations:
      - method: GET
        name: metagetoctocat
        description: GitHub Get Octocat
        call: github-meta.metagetoctocat
        with:
          s: rest.s
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/zen
      name: zen
      description: REST surface for zen.
      operations:
      - method: GET
        name: metagetzen
        description: GitHub Get the Zen of GitHub
        call: github-meta.metagetzen
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: github-meta-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub v3 REST API — Meta. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-api-root
      description: GitHub API Root
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: github-meta.metaroot
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-github-enterprise-server
      description: GitHub Get GitHub Enterprise Server Meta Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: github-meta.metaget
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-octocat
      description: GitHub Get Octocat
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: github-meta.metagetoctocat
      with:
        s: tools.s
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-zen-github
      description: GitHub Get the Zen of GitHub
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: github-meta.metagetzen
      outputParameters:
      - type: object
        mapping: $.
