naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Branches
  description: 'GitHub User API — Branches. 1 operations. Lead operation: GitHub Get Users with Access to the Protected Branch.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Branches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-branches
    baseUri: ''
    description: GitHub User API — Branches business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-protection-restrictions-users
      path: /repos/{owner}/{repo}/branches/{branch}/protection/restrictions/users
      operations:
      - name: getuserswithaccesstotheprotectedbranch
        method: GET
        description: GitHub Get Users with Access to the Protected Branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-branches-rest
    port: 8080
    description: REST adapter for GitHub User API — Branches. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/protection/restrictions/users
      name: repos-owner-repo-branches-branch-protection-restrictions-users
      description: REST surface for repos-owner-repo-branches-branch-protection-restrictions-users.
      operations:
      - method: GET
        name: getuserswithaccesstotheprotectedbranch
        description: GitHub Get Users with Access to the Protected Branch
        call: users-branches.getuserswithaccesstotheprotectedbranch
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-branches-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Branches. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-users-access-protected
      description: GitHub Get Users with Access to the Protected Branch
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-branches.getuserswithaccesstotheprotectedbranch
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
