naftiko: 1.0.0-alpha2
info:
  label: GitHub Auth API — Setup
  description: 'GitHub Auth API — Setup. 1 operations. Lead operation: GitHub Get All Authorized Ssh Keys. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Setup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth-setup
    baseUri: ''
    description: GitHub Auth API — Setup business capability. Self-contained, no shared references.
    resources:
    - name: setup-api-settings-authorized-keys
      path: /setup/api/settings/authorized-keys
      operations:
      - name: getallauthorizedsshkeys
        method: GET
        description: GitHub Get All Authorized Ssh Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: auth-setup-rest
    port: 8080
    description: REST adapter for GitHub Auth API — Setup. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/setup/api/settings/authorized-keys
      name: setup-api-settings-authorized-keys
      description: REST surface for setup-api-settings-authorized-keys.
      operations:
      - method: GET
        name: getallauthorizedsshkeys
        description: GitHub Get All Authorized Ssh Keys
        call: auth-setup.getallauthorizedsshkeys
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth-setup-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Auth API — Setup. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-all-authorized-ssh
      description: GitHub Get All Authorized Ssh Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: auth-setup.getallauthorizedsshkeys
      outputParameters:
      - type: object
        mapping: $.
