naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Restore
  description: 'GitHub Org API — Restore. 2 operations. Lead operation: GitHub Restore Package for an Organization. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Restore
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-restore
    baseUri: ''
    description: GitHub Org API — Restore business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-packages-package_type-package_name-restore
      path: /orgs/{org}/packages/{package_type}/{package_name}/restore
      operations:
      - name: restorepackageforanorganization
        method: POST
        description: GitHub Restore Package for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: package token
    - name: orgs-org-packages-package_type-package_name-versions-package_version_id-restore
      path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}/restore
      operations:
      - name: restorepackageversionforanorganization
        method: POST
        description: GitHub Restore Package Version for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-restore-rest
    port: 8080
    description: REST adapter for GitHub Org API — Restore. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/packages/{package-type}/{package-name}/restore
      name: orgs-org-packages-package-type-package-name-restore
      description: REST surface for orgs-org-packages-package_type-package_name-restore.
      operations:
      - method: POST
        name: restorepackageforanorganization
        description: GitHub Restore Package for an Organization
        call: organizations-restore.restorepackageforanorganization
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org}/packages/{package-type}/{package-name}/versions/{package-version-id}/restore
      name: orgs-org-packages-package-type-package-name-versions-package-version-id-restore
      description: REST surface for orgs-org-packages-package_type-package_name-versions-package_version_id-restore.
      operations:
      - method: POST
        name: restorepackageversionforanorganization
        description: GitHub Restore Package Version for an Organization
        call: organizations-restore.restorepackageversionforanorganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-restore-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Restore. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-restore-package-organization
      description: GitHub Restore Package for an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: organizations-restore.restorepackageforanorganization
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
    - name: github-restore-package-version-organization
      description: GitHub Restore Package Version for an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: organizations-restore.restorepackageversionforanorganization
      outputParameters:
      - type: object
        mapping: $.
