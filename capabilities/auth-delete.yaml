naftiko: 1.0.0-alpha2
info:
  label: GitHub Auth API — Delete
  description: 'GitHub Auth API — Delete. 2 operations. Lead operation: GitHub Delete an Impersonation Oauth Token. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth-delete
    baseUri: ''
    description: GitHub Auth API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: admin-users-username-authorizations
      path: /admin/users/{username}/authorizations
      operations:
      - name: deleteanimpersonationoauthtoken
        method: DELETE
        description: GitHub Delete an Impersonation Oauth Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: authorizations-authorization_id
      path: /authorizations/{authorization_id}
      operations:
      - name: deleteanauthorization
        method: DELETE
        description: GitHub Delete an Authorization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: auth-delete-rest
    port: 8080
    description: REST adapter for GitHub Auth API — Delete. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/users/{username}/authorizations
      name: admin-users-username-authorizations
      description: REST surface for admin-users-username-authorizations.
      operations:
      - method: DELETE
        name: deleteanimpersonationoauthtoken
        description: GitHub Delete an Impersonation Oauth Token
        call: auth-delete.deleteanimpersonationoauthtoken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/authorizations/{authorization-id}
      name: authorizations-authorization-id
      description: REST surface for authorizations-authorization_id.
      operations:
      - method: DELETE
        name: deleteanauthorization
        description: GitHub Delete an Authorization
        call: auth-delete.deleteanauthorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Auth API — Delete. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-delete-impersonation-oauth-token
      description: GitHub Delete an Impersonation Oauth Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: auth-delete.deleteanimpersonationoauthtoken
      outputParameters:
      - type: object
        mapping: $.
    - name: github-delete-authorization
      description: GitHub Delete an Authorization
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: auth-delete.deleteanauthorization
      outputParameters:
      - type: object
        mapping: $.
