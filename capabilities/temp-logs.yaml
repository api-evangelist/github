naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Logs
  description: 'GitHub Repos API — Logs. 4 operations. Lead operation: Download Job Logs For Workflow Run. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
