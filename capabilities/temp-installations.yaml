  - type: http
    namespace: temp-installations
    baseUri: ''
    description: GitHub Repos API — Installations business capability. Self-contained, no shared references.
    resources:
    - name: installation-repositories
      path: /installation/repositories
      operations:
      - name: listrepositoriesaccessibletotheappinstallation
        method: GET
        description: List Repositories Accessible To The App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-installation
      path: /repos/{owner}/{repo}/installation
      operations:
      - name: getrepositoryinstallationfortheauthenticatedapp
        method: GET
        description: Get Repository Installation For The Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: user-installations-installation_id-repositories-repository_id
      path: /user/installations/{installation_id}/repositories/{repository_id}
      operations:
      - name: addrepositorytoanappinstallation
        method: PUT
        description: Add Repository To An App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: removerepositoryfromanappinstallation
        method: DELETE
        description: Remove Repository From An App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-installations-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Installations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/installation/repositories
      name: installation-repositories
      description: REST surface for installation-repositories.
      operations:
      - method: GET
        name: listrepositoriesaccessibletotheappinstallation
        description: List Repositories Accessible To The App Installation
        call: temp-installations.listrepositoriesaccessibletotheappinstallation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/installation
      name: repos-owner-repo-installation
      description: REST surface for repos-owner-repo-installation.
      operations:
      - method: GET
        name: getrepositoryinstallationfortheauthenticatedapp
        description: Get Repository Installation For The Authenticated App
        call: temp-installations.getrepositoryinstallationfortheauthenticatedapp
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/installations/{installation-id}/repositories/{repository-id}
