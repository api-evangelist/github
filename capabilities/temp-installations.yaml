naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Installations
  description: 'GitHub Repos API — Installations. 4 operations. Lead operation: List Repositories Accessible To The App Installation.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Installations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
