        name: addrepositorytoanappinstallation
        description: Add Repository To An App Installation
        call: temp-installations.addrepositorytoanappinstallation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removerepositoryfromanappinstallation
        description: Remove Repository From An App Installation
        call: temp-installations.removerepositoryfromanappinstallation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-installations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Installations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
