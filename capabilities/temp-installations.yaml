      outputParameters:
      - type: object
        mapping: $.
    - name: get-repository-installation-authenticated-app
      description: Get Repository Installation For The Authenticated App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-installations.getrepositoryinstallationfortheauthenticatedapp
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: add-repository-app-installation
      description: Add Repository To An App Installation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: temp-installations.addrepositorytoanappinstallation
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
