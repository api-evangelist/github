    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Runs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-review-history-forworkflow
      description: GitHub Get the Review History Forworkflow Run
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-runs.getthereviewhistoryforworkflowrun
      outputParameters:
      - type: object
        mapping: $.
