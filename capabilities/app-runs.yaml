      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-runs-rest
    port: 8080
    description: REST adapter for GitHub Application API — Runs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/runs/{run-id}/approvals
      name: repos-owner-repo-actions-runs-run-id-approvals
      description: REST surface for repos-owner-repo-actions-runs-run_id-approvals.
      operations:
      - method: GET
        name: getthereviewhistoryforworkflowrun
        description: GitHub Get the Review History Forworkflow Run
        call: app-runs.getthereviewhistoryforworkflowrun
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
