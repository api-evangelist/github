  description: 'GitHub Application API — Runs. 1 operations. Lead operation: GitHub Get the Review History Forworkflow Run.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Runs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-runs
    baseUri: ''
    description: GitHub Application API — Runs business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-runs-run_id-approvals
      path: /repos/{owner}/{repo}/actions/runs/{run_id}/approvals
      operations:
      - name: getthereviewhistoryforworkflowrun
        method: GET
        description: GitHub Get the Review History Forworkflow Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
