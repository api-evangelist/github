naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Issues
  description: 'GitHub Org API — Issues. 1 operations. Lead operation: GitHub List Organization Issues Assigned to the Authenticated
    User. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Issues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-issues
    baseUri: ''
    description: GitHub Org API — Issues business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-issues
      path: /orgs/{org}/issues
      operations:
      - name: listorganizationissuesassignedtotheauthenticateduser
        method: GET
        description: GitHub List Organization Issues Assigned to the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Indicates which sorts of issues to return. `assigned` means issues assigned to you. `created` means
            issues created by you. `mentioned` means issues mentioning y
        - name: state
          in: query
          type: string
          description: Indicates the state of the issues to return.
        - name: sort
          in: query
          type: string
          description: What to sort results by.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-issues-rest
    port: 8080
    description: REST adapter for GitHub Org API — Issues. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/issues
      name: orgs-org-issues
      description: REST surface for orgs-org-issues.
      operations:
      - method: GET
        name: listorganizationissuesassignedtotheauthenticateduser
        description: GitHub List Organization Issues Assigned to the Authenticated User
        call: organizations-issues.listorganizationissuesassignedtotheauthenticateduser
        with:
          filter: rest.filter
          state: rest.state
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-issues-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Issues. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-organization-issues-assigned
      description: GitHub List Organization Issues Assigned to the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organizations-issues.listorganizationissuesassignedtotheauthenticateduser
      with:
        filter: tools.filter
        state: tools.state
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
