naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — State
  description: 'GitHub Repos API — State. 2 operations. Lead operation: Create Tag Protection State For Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - State
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-state
    baseUri: ''
    description: GitHub Repos API — State business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-tags-protection
      path: /repos/{owner}/{repo}/tags/protection
      operations:
      - name: createtagprotectionstateforrepository
        method: POST
        description: Create Tag Protection State For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-tags-protection-tag_protection_id
      path: /repos/{owner}/{repo}/tags/protection/{tag_protection_id}
      operations:
      - name: deletetagprotectionstateforrepository
        method: DELETE
        description: Delete Tag Protection State For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-state-rest
    port: 8080
    description: REST adapter for GitHub Repos API — State. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/tags/protection
      name: repos-owner-repo-tags-protection
      description: REST surface for repos-owner-repo-tags-protection.
      operations:
      - method: POST
        name: createtagprotectionstateforrepository
        description: Create Tag Protection State For Repository
        call: temp-state.createtagprotectionstateforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/tags/protection/{tag-protection-id}
      name: repos-owner-repo-tags-protection-tag-protection-id
      description: REST surface for repos-owner-repo-tags-protection-tag_protection_id.
      operations:
      - method: DELETE
        name: deletetagprotectionstateforrepository
        description: Delete Tag Protection State For Repository
        call: temp-state.deletetagprotectionstateforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-state-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — State. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-tag-protection-state-repository
      description: Create Tag Protection State For Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-state.createtagprotectionstateforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tag-protection-state-repository
      description: Delete Tag Protection State For Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-state.deletetagprotectionstateforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
