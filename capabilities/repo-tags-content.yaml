naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Content
  description: 'github-repos-api — Content. 2 operations. Lead operation: GitHub Get Repository Content. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Content
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-content
    baseUri: ''
    description: github-repos-api — Content business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-contents-path
      path: /repos/{owner}/{repo}/contents/{path}
      operations:
      - name: getrepositorycontent
        method: GET
        description: GitHub Get Repository Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: path parameter
          required: true
        - name: ref
          in: query
          type: string
          description: 'The name of the commit/branch/tag. Default: the repositorys default branch.'
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-releases-generate-notes
      path: /repos/{owner}/{repo}/releases/generate-notes
      operations:
      - name: generatereleasenotescontentforrelease
        method: POST
        description: GitHub Generate Release Notes Content for Release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-content-rest
    port: 8080
    description: REST adapter for github-repos-api — Content. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/contents/{path}
      name: repos-owner-repo-contents-path
      description: REST surface for repos-owner-repo-contents-path.
      operations:
      - method: GET
        name: getrepositorycontent
        description: GitHub Get Repository Content
        call: repo-tags-content.getrepositorycontent
        with:
          path: rest.path
          ref: rest.ref
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/releases/generate-notes
      name: repos-owner-repo-releases-generate-notes
      description: REST surface for repos-owner-repo-releases-generate-notes.
      operations:
      - method: POST
        name: generatereleasenotescontentforrelease
        description: GitHub Generate Release Notes Content for Release
        call: repo-tags-content.generatereleasenotescontentforrelease
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-content-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Content. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-repository-content
      description: GitHub Get Repository Content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-content.getrepositorycontent
      with:
        path: tools.path
        ref: tools.ref
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-generate-release-notes-content
      description: GitHub Generate Release Notes Content for Release
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-tags-content.generatereleasenotescontentforrelease
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
