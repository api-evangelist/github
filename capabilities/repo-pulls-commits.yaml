naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Commits
  description: 'github-repos-api — Commits. 1 operations. Lead operation: GitHub List Commits on Pull Request. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Commits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-pulls-commits
    baseUri: ''
    description: github-repos-api — Commits business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-pull_number-commits
      path: /repos/{owner}/{repo}/pulls/{pull_number}/commits
      operations:
      - name: listcommitsonpullrequest
        method: GET
        description: GitHub List Commits on Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-pulls-commits-rest
    port: 8080
    description: REST adapter for github-repos-api — Commits. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/{pull-number}/commits
      name: repos-owner-repo-pulls-pull-number-commits
      description: REST surface for repos-owner-repo-pulls-pull_number-commits.
      operations:
      - method: GET
        name: listcommitsonpullrequest
        description: GitHub List Commits on Pull Request
        call: repo-pulls-commits.listcommitsonpullrequest
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-pulls-commits-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Commits. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-commits-pull-request
      description: GitHub List Commits on Pull Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-pulls-commits.listcommitsonpullrequest
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
