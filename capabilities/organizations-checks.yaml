    namespace: organizations-checks
    baseUri: ''
    description: GitHub Org API — Checks business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-members-username
      path: /orgs/{org}/members/{username}
      operations:
      - name: checkorganizationmembershipforuser
        method: GET
        description: GitHub Check Organization Membership for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
