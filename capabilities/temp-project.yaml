naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Project
  description: 'GitHub Repos API — Project. 1 operations. Lead operation: Create Repository Project. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Project
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-project
    baseUri: ''
    description: GitHub Repos API — Project business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-projects
      path: /repos/{owner}/{repo}/projects
      operations:
      - name: createrepositoryproject
        method: POST
        description: Create Repository Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-project-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Project. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/projects
      name: repos-owner-repo-projects
      description: REST surface for repos-owner-repo-projects.
      operations:
      - method: POST
        name: createrepositoryproject
        description: Create Repository Project
        call: temp-project.createrepositoryproject
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-project-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Project. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-repository-project
      description: Create Repository Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-project.createrepositoryproject
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
