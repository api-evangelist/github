naftiko: 1.0.0-alpha2
info:
  label: GitHub Application API — Sets
  description: 'GitHub Application API — Sets. 1 operations. Lead operation: GitHub Set App Access Restrictions. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Sets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-sets
    baseUri: ''
    description: GitHub Application API — Sets business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-branches-branch-protection-restrictions-apps
      path: /repos/{owner}/{repo}/branches/{branch}/protection/restrictions/apps
      operations:
      - name: setappaccessrestrictions
        method: PUT
        description: GitHub Set App Access Restrictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-sets-rest
    port: 8080
    description: REST adapter for GitHub Application API — Sets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/branches/{branch}/protection/restrictions/apps
      name: repos-owner-repo-branches-branch-protection-restrictions-apps
      description: REST surface for repos-owner-repo-branches-branch-protection-restrictions-apps.
      operations:
      - method: PUT
        name: setappaccessrestrictions
        description: GitHub Set App Access Restrictions
        call: app-sets.setappaccessrestrictions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-sets-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Sets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-set-app-access-restrictions
      description: GitHub Set App Access Restrictions
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: app-sets.setappaccessrestrictions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
