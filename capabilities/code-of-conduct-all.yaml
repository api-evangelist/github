naftiko: 1.0.0-alpha2
info:
  label: GitHub Code of Conduct API — All
  description: 'GitHub Code of Conduct API — All. 1 operations. Lead operation: GitHub Get All Codes of Conduct. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - All
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: code-of-conduct-all
    baseUri: ''
    description: GitHub Code of Conduct API — All business capability. Self-contained, no shared references.
    resources:
    - name: codes_of_conduct
      path: /codes_of_conduct
      operations:
      - name: getallcodesofconduct
        method: GET
        description: GitHub Get All Codes of Conduct
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: code-of-conduct-all-rest
    port: 8080
    description: REST adapter for GitHub Code of Conduct API — All. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/codes-of-conduct
      name: codes-of-conduct
      description: REST surface for codes_of_conduct.
      operations:
      - method: GET
        name: getallcodesofconduct
        description: GitHub Get All Codes of Conduct
        call: code-of-conduct-all.getallcodesofconduct
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: code-of-conduct-all-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Code of Conduct API — All. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-all-codes-conduct
      description: GitHub Get All Codes of Conduct
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: code-of-conduct-all.getallcodesofconduct
      outputParameters:
      - type: object
        mapping: $.
