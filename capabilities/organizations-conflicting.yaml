naftiko: 1.0.0-alpha2
info:
  label: GitHub Org API — Conflicting
  description: 'GitHub Org API — Conflicting. 1 operations. Lead operation: GitHub Get List of Conflicting Packages During
    Docker Migration for Organization. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Conflicting
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations-conflicting
    baseUri: ''
    description: GitHub Org API — Conflicting business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-docker-conflicts
      path: /orgs/{org}/docker/conflicts
      operations:
      - name: getlistofconflictingpackagesduringdockermigrationfororganization
        method: GET
        description: GitHub Get List of Conflicting Packages During Docker Migration for Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: organizations-conflicting-rest
    port: 8080
    description: REST adapter for GitHub Org API — Conflicting. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/docker/conflicts
      name: orgs-org-docker-conflicts
      description: REST surface for orgs-org-docker-conflicts.
      operations:
      - method: GET
        name: getlistofconflictingpackagesduringdockermigrationfororganization
        description: GitHub Get List of Conflicting Packages During Docker Migration for Organization
        call: organizations-conflicting.getlistofconflictingpackagesduringdockermigrationfororganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-conflicting-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Org API — Conflicting. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-get-list-conflicting-packages
      description: GitHub Get List of Conflicting Packages During Docker Migration for Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organizations-conflicting.getlistofconflictingpackagesduringdockermigrationfororganization
      outputParameters:
      - type: object
        mapping: $.
