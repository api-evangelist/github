naftiko: 1.0.0-alpha2
info:
  label: GitHub Installation API — Delete
  description: 'GitHub Installation API — Delete. 1 operations. Lead operation: GitHub Delete an Installation for the Authenticated
    App. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: installation-delete
    baseUri: ''
    description: GitHub Installation API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: app-installations-installation_id
      path: /app/installations/{installation_id}
      operations:
      - name: deleteaninstallationfortheauthenticatedapp
        method: DELETE
        description: GitHub Delete an Installation for the Authenticated App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: installation-delete-rest
    port: 8080
    description: REST adapter for GitHub Installation API — Delete. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/installations/{installation-id}
      name: app-installations-installation-id
      description: REST surface for app-installations-installation_id.
      operations:
      - method: DELETE
        name: deleteaninstallationfortheauthenticatedapp
        description: GitHub Delete an Installation for the Authenticated App
        call: installation-delete.deleteaninstallationfortheauthenticatedapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: installation-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Installation API — Delete. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-delete-installation-authenticated-app
      description: GitHub Delete an Installation for the Authenticated App
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: installation-delete.deleteaninstallationfortheauthenticatedapp
      outputParameters:
      - type: object
        mapping: $.
