naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Notifications
  description: 'GitHub Repos API — Notifications. 2 operations. Lead operation: List Repository Notifications For The Authenticated
    User. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Notifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-notifications
    baseUri: ''
    description: GitHub Repos API — Notifications business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-notifications
      path: /repos/{owner}/{repo}/notifications
      operations:
      - name: listrepositorynotificationsfortheauthenticateduser
        method: GET
        description: List Repository Notifications For The Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: markrepositorynotificationsasread
        method: PUT
        description: Mark Repository Notifications As Read
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-notifications-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Notifications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/notifications
      name: repos-owner-repo-notifications
      description: REST surface for repos-owner-repo-notifications.
      operations:
      - method: GET
        name: listrepositorynotificationsfortheauthenticateduser
        description: List Repository Notifications For The Authenticated User
        call: temp-notifications.listrepositorynotificationsfortheauthenticateduser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: markrepositorynotificationsasread
        description: Mark Repository Notifications As Read
        call: temp-notifications.markrepositorynotificationsasread
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-notifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Notifications. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-repository-notifications-authenticated-user
      description: List Repository Notifications For The Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-notifications.listrepositorynotificationsfortheauthenticateduser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: mark-repository-notifications-read
      description: Mark Repository Notifications As Read
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: temp-notifications.markrepositorynotificationsasread
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
