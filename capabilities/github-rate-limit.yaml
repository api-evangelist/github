    - path: /v1/rate-limit
      name: rate-limit
      description: REST surface for rate_limit.
      operations:
      - method: GET
        name: ratelimitget
        description: GitHub Get Rate Limit Status for the Authenticated User
        call: github-rate-limit.ratelimitget
        outputParameters:
        - type: object
          mapping: $.
