    - name: rate_limit
      path: /rate_limit
      operations:
      - name: ratelimitget
        method: GET
        description: GitHub Get Rate Limit Status for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
