naftiko: 1.0.0-alpha2
info:
  label: github-repo-actions-api — Update
  description: 'github-repo-actions-api — Update. 2 operations. Lead operation: GitHub Create or Update Repository Secret.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-actions-update
    baseUri: ''
    description: github-repo-actions-api — Update business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-secrets-secret_name
      path: /repos/{owner}/{repo}/actions/secrets/{secret_name}
      operations:
      - name: createorupdaterepositorysecret
        method: PUT
        description: GitHub Create or Update Repository Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-actions-variables-name
      path: /repos/{owner}/{repo}/actions/variables/{name}
      operations:
      - name: updaterepositoryvariable
        method: PATCH
        description: GitHub Update Repository Variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-actions-update-rest
    port: 8080
    description: REST adapter for github-repo-actions-api — Update. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/secrets/{secret-name}
      name: repos-owner-repo-actions-secrets-secret-name
      description: REST surface for repos-owner-repo-actions-secrets-secret_name.
      operations:
      - method: PUT
        name: createorupdaterepositorysecret
        description: GitHub Create or Update Repository Secret
        call: repo-actions-update.createorupdaterepositorysecret
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/actions/variables/{name}
      name: repos-owner-repo-actions-variables-name
      description: REST surface for repos-owner-repo-actions-variables-name.
      operations:
      - method: PATCH
        name: updaterepositoryvariable
        description: GitHub Update Repository Variable
        call: repo-actions-update.updaterepositoryvariable
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-actions-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-actions-api — Update. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-create-update-repository-secret
      description: GitHub Create or Update Repository Secret
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-actions-update.createorupdaterepositorysecret
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-update-repository-variable
      description: GitHub Update Repository Variable
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-actions-update.updaterepositoryvariable
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
