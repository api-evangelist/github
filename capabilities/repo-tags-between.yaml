naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Between
  description: 'github-repos-api — Between. 1 operations. Lead operation: GitHub Get Diff of the Dependencies Between Commits.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Between
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-between
    baseUri: ''
    description: github-repos-api — Between business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-dependency-graph-compare-basehead
      path: /repos/{owner}/{repo}/dependency-graph/compare/{basehead}
      operations:
      - name: getdiffofthedependenciesbetweencommits
        method: GET
        description: GitHub Get Diff of the Dependencies Between Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: basehead
          in: path
          type: string
          description: The base and head Git revisions to compare. The Git revisions will be resolved to commit SHAs. Named
            revisions will be resolved to their corresponding HEAD comm
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-between-rest
    port: 8080
    description: REST adapter for github-repos-api — Between. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/dependency-graph/compare/{basehead}
      name: repos-owner-repo-dependency-graph-compare-basehead
      description: REST surface for repos-owner-repo-dependency-graph-compare-basehead.
      operations:
      - method: GET
        name: getdiffofthedependenciesbetweencommits
        description: GitHub Get Diff of the Dependencies Between Commits
        call: repo-tags-between.getdiffofthedependenciesbetweencommits
        with:
          basehead: rest.basehead
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-between-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Between. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-diff-dependencies-between
      description: GitHub Get Diff of the Dependencies Between Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-between.getdiffofthedependenciesbetweencommits
      with:
        basehead: tools.basehead
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
