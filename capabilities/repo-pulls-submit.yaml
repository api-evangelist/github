naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Submit
  description: 'github-repos-api — Submit. 1 operations. Lead operation: GitHub Submit Review for Pull Request. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Submit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-pulls-submit
    baseUri: ''
    description: github-repos-api — Submit business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-pull_number-reviews-review_id-events
      path: /repos/{owner}/{repo}/pulls/{pull_number}/reviews/{review_id}/events
      operations:
      - name: submitreviewforpullrequest
        method: POST
        description: GitHub Submit Review for Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-pulls-submit-rest
    port: 8080
    description: REST adapter for github-repos-api — Submit. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/{pull-number}/reviews/{review-id}/events
      name: repos-owner-repo-pulls-pull-number-reviews-review-id-events
      description: REST surface for repos-owner-repo-pulls-pull_number-reviews-review_id-events.
      operations:
      - method: POST
        name: submitreviewforpullrequest
        description: GitHub Submit Review for Pull Request
        call: repo-pulls-submit.submitreviewforpullrequest
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-pulls-submit-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Submit. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-submit-review-pull-request
      description: GitHub Submit Review for Pull Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-pulls-submit.submitreviewforpullrequest
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
