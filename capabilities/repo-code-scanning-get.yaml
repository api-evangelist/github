        idempotent: true
      call: repo-code-scanning-get.getcodescanningdefaultsetupconfiguration
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
