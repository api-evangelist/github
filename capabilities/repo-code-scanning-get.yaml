        idempotent: true
      call: repo-code-scanning-get.getcodescanninganalysisforrepository
      with:
        analysis_id: tools.analysis_id
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
