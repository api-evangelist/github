naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Ldap
  description: 'GitHub User API — Ldap. 2 operations. Lead operation: GitHub Update Ldap Mapping for User. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Ldap
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-ldap
    baseUri: ''
    description: GitHub User API — Ldap business capability. Self-contained, no shared references.
    resources:
    - name: admin-ldap-users-username-mapping
      path: /admin/ldap/users/{username}/mapping
      operations:
      - name: updateldapmappingforuser
        method: PATCH
        description: GitHub Update Ldap Mapping for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-ldap-users-username-sync
      path: /admin/ldap/users/{username}/sync
      operations:
      - name: syncldapmappingforuser
        method: POST
        description: GitHub Sync Ldap Mapping for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-ldap-rest
    port: 8080
    description: REST adapter for GitHub User API — Ldap. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/ldap/users/{username}/mapping
      name: admin-ldap-users-username-mapping
      description: REST surface for admin-ldap-users-username-mapping.
      operations:
      - method: PATCH
        name: updateldapmappingforuser
        description: GitHub Update Ldap Mapping for User
        call: users-ldap.updateldapmappingforuser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/ldap/users/{username}/sync
      name: admin-ldap-users-username-sync
      description: REST surface for admin-ldap-users-username-sync.
      operations:
      - method: POST
        name: syncldapmappingforuser
        description: GitHub Sync Ldap Mapping for User
        call: users-ldap.syncldapmappingforuser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-ldap-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Ldap. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-update-ldap-mapping-user
      description: GitHub Update Ldap Mapping for User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: users-ldap.updateldapmappingforuser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-sync-ldap-mapping-user
      description: GitHub Sync Ldap Mapping for User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users-ldap.syncldapmappingforuser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
