naftiko: 1.0.0-alpha2
info:
  label: GitHub Search API — Commits
  description: 'GitHub Search API — Commits. 1 operations. Lead operation: GitHub Search Commits. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Commits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-commits
    baseUri: ''
    description: GitHub Search API — Commits business capability. Self-contained, no shared references.
    resources:
    - name: search-commits
      path: /search/commits
      operations:
      - name: searchcommits
        method: GET
        description: GitHub Search Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The query contains one or more search keywords and qualifiers. Qualifiers allow you to limit your search
            to specific areas of GitHub Enterprise Server. The REST
          required: true
        - name: sort
          in: query
          type: string
          description: 'Sorts the results of your query by `author-date` or `committer-date`. Default: [best match](https://docs.github.com/enterprise-server@3.9/rest/search/search#ran'
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
  exposes:
  - type: rest
    namespace: search-commits-rest
    port: 8080
    description: REST adapter for GitHub Search API — Commits. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search/commits
      name: search-commits
      description: REST surface for search-commits.
      operations:
      - method: GET
        name: searchcommits
        description: GitHub Search Commits
        call: search-commits.searchcommits
        with:
          q: rest.q
          sort: rest.sort
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-commits-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Search API — Commits. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-search-commits
      description: GitHub Search Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-commits.searchcommits
      with:
        q: tools.q
        sort: tools.sort
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
