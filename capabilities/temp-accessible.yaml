naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Accessible
  description: 'GitHub Repos API — Accessible. 2 operations. Lead operation: List Repositories Accessible To The App Installation.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Accessible
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-accessible
    baseUri: ''
    description: GitHub Repos API — Accessible business capability. Self-contained, no shared references.
    resources:
    - name: installation-repositories
      path: /installation/repositories
      operations:
      - name: listrepositoriesaccessibletotheappinstallation
        method: GET
        description: List Repositories Accessible To The App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: user-installations-installation_id-repositories
      path: /user/installations/{installation_id}/repositories
      operations:
      - name: listrepositoriesaccessibletotheuseraccesstoken
        method: GET
        description: List Repositories Accessible To The User Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-accessible-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Accessible. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/installation/repositories
      name: installation-repositories
      description: REST surface for installation-repositories.
      operations:
      - method: GET
        name: listrepositoriesaccessibletotheappinstallation
        description: List Repositories Accessible To The App Installation
        call: temp-accessible.listrepositoriesaccessibletotheappinstallation
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/installations/{installation-id}/repositories
      name: user-installations-installation-id-repositories
      description: REST surface for user-installations-installation_id-repositories.
      operations:
      - method: GET
        name: listrepositoriesaccessibletotheuseraccesstoken
        description: List Repositories Accessible To The User Access Token
        call: temp-accessible.listrepositoriesaccessibletotheuseraccesstoken
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-accessible-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Accessible. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-repositories-accessible-app-installation
      description: List Repositories Accessible To The App Installation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-accessible.listrepositoriesaccessibletotheappinstallation
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: list-repositories-accessible-user-access
      description: List Repositories Accessible To The User Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-accessible.listrepositoriesaccessibletotheuseraccesstoken
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
