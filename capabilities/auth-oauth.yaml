naftiko: 1.0.0-alpha2
info:
  label: GitHub Auth API — Oauth
  description: 'GitHub Auth API — Oauth. 2 operations. Lead operation: GitHub Create an Impersonation Oauth Token. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Oauth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth-oauth
    baseUri: ''
    description: GitHub Auth API — Oauth business capability. Self-contained, no shared references.
    resources:
    - name: admin-users-username-authorizations
      path: /admin/users/{username}/authorizations
      operations:
      - name: createanimpersonationoauthtoken
        method: POST
        description: GitHub Create an Impersonation Oauth Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteanimpersonationoauthtoken
        method: DELETE
        description: GitHub Delete an Impersonation Oauth Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: auth-oauth-rest
    port: 8080
    description: REST adapter for GitHub Auth API — Oauth. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/users/{username}/authorizations
      name: admin-users-username-authorizations
      description: REST surface for admin-users-username-authorizations.
      operations:
      - method: POST
        name: createanimpersonationoauthtoken
        description: GitHub Create an Impersonation Oauth Token
        call: auth-oauth.createanimpersonationoauthtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteanimpersonationoauthtoken
        description: GitHub Delete an Impersonation Oauth Token
        call: auth-oauth.deleteanimpersonationoauthtoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth-oauth-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Auth API — Oauth. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-create-impersonation-oauth-token
      description: GitHub Create an Impersonation Oauth Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: auth-oauth.createanimpersonationoauthtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-delete-impersonation-oauth-token
      description: GitHub Delete an Impersonation Oauth Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: auth-oauth.deleteanimpersonationoauthtoken
      outputParameters:
      - type: object
        mapping: $.
