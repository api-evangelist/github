naftiko: "1.0.0-alpha1"

info:
  label: "GitHub Packages"
  description: "Manage GitHub Packages including package listing, versions, and restoration for organizations, users, and the authenticated user. Package operations are found across github-organizations-openapi and github-users-api (16 operations total)."
  tags:
    - GitHub
    - Packages
    - Versions
    - Container Registry
  created: "2026-04-17"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GITHUB_TOKEN: GITHUB_TOKEN

capability:
  consumes:
    - type: http
      namespace: github-packages
      baseUri: https://api.github.com
      description: "GitHub REST API for packages and package versions management."
      authentication:
        type: bearer
        token: "{{GITHUB_TOKEN}}"
      resources:
        - name: org-packages
          path: /orgs/{org}/packages
          description: "Organization package management."
          operations:
            - name: listPackagesForAnOrganization
              method: GET
              description: "List packages for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPackageForAnOrganization
              method: GET
              path: /orgs/{org}/packages/{package_type}/{package_name}
              description: "Get a package for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deletePackageForAnOrganization
              method: DELETE
              path: /orgs/{org}/packages/{package_type}/{package_name}
              description: "Delete a package for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restorePackageForAnOrganization
              method: POST
              path: /orgs/{org}/packages/{package_type}/{package_name}/restore
              description: "Restore a package for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listPackageVersionsForPackageOwnedByAnOrganization
              method: GET
              path: /orgs/{org}/packages/{package_type}/{package_name}/versions
              description: "List package versions for an organization package."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPackageVersionForAnOrganization
              method: GET
              path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}
              description: "Get a package version for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deletePackageVersionForAnOrganization
              method: DELETE
              path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}
              description: "Delete a package version for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restorePackageVersionForAnOrganization
              method: POST
              path: /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}/restore
              description: "Restore a package version for an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-packages
          path: /user/packages
          description: "Authenticated user package management."
          operations:
            - name: listPackagesForTheAuthenticatedUsersNamespace
              method: GET
              description: "List packages for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPackageForTheAuthenticatedUser
              method: GET
              path: /user/packages/{package_type}/{package_name}
              description: "Get a package for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deletePackageForTheAuthenticatedUser
              method: DELETE
              path: /user/packages/{package_type}/{package_name}
              description: "Delete a package for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restorePackageForTheAuthenticatedUser
              method: POST
              path: /user/packages/{package_type}/{package_name}/restore
              description: "Restore a package for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listPackageVersionsForPackageOwnedByTheAuthenticatedUser
              method: GET
              path: /user/packages/{package_type}/{package_name}/versions
              description: "List package versions for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPackageVersionForTheAuthenticatedUser
              method: GET
              path: /user/packages/{package_type}/{package_name}/versions/{package_version_id}
              description: "Get a package version for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deletePackageVersionForTheAuthenticatedUser
              method: DELETE
              path: /user/packages/{package_type}/{package_name}/versions/{package_version_id}
              description: "Delete a package version for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restorePackageVersionForTheAuthenticatedUser
              method: POST
              path: /user/packages/{package_type}/{package_name}/versions/{package_version_id}/restore
              description: "Restore a package version for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8107
      namespace: github-packages-api
      resources:
        - path: /v1/organizations/{org}/packages
          name: org-packages
          description: "Organization package listing"
          operations:
            - method: GET
              name: listPackagesForAnOrganization
              description: "List packages for an organization"
        - path: /v1/organizations/{org}/packages/{package_type}/{package_name}
          name: org-package
          description: "Individual organization package"
          operations:
            - method: GET
              name: getPackageForAnOrganization
              description: "Get a package"
            - method: DELETE
              name: deletePackageForAnOrganization
              description: "Delete a package"
        - path: /v1/user/packages
          name: user-packages
          description: "User package listing"
          operations:
            - method: GET
              name: listPackagesForTheAuthenticatedUsersNamespace
              description: "List packages"

    - type: mcp
      port: 9107
      namespace: github-packages-mcp
      transport: http
      tools:
        - name: list-org-packages
          description: "List packages for an organization"
          call: "github-packages.listPackagesForAnOrganization"
          hints:
            readOnly: true
        - name: get-org-package
          description: "Get a package for an organization"
          call: "github-packages.getPackageForAnOrganization"
          hints:
            readOnly: true
        - name: delete-org-package
          description: "Delete a package for an organization"
          call: "github-packages.deletePackageForAnOrganization"
          hints:
            destructive: true
        - name: restore-org-package
          description: "Restore a package for an organization"
          call: "github-packages.restorePackageForAnOrganization"
        - name: list-org-package-versions
          description: "List package versions for an organization"
          call: "github-packages.listPackageVersionsForPackageOwnedByAnOrganization"
          hints:
            readOnly: true
        - name: list-user-packages
          description: "List packages for the authenticated user"
          call: "github-packages.listPackagesForTheAuthenticatedUsersNamespace"
          hints:
            readOnly: true
        - name: get-user-package
          description: "Get a package for the authenticated user"
          call: "github-packages.getPackageForTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: delete-user-package
          description: "Delete a package for the authenticated user"
          call: "github-packages.deletePackageForTheAuthenticatedUser"
          hints:
            destructive: true
        - name: list-user-package-versions
          description: "List package versions for the authenticated user"
          call: "github-packages.listPackageVersionsForPackageOwnedByTheAuthenticatedUser"
          hints:
            readOnly: true
