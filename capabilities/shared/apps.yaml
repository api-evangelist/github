naftiko: "1.0.0-alpha1"

info:
  label: "GitHub Apps"
  description: "Manage GitHub Apps and installations including app authentication, webhook configuration, installation tokens, and repository access. Sourced from github-app-api-openapi (26 REST operations) and github-installation-openapi (17 REST operations)."
  tags:
    - GitHub
    - Apps
    - Installations
    - OAuth
    - Webhooks
  created: "2026-04-17"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GITHUB_TOKEN: GITHUB_TOKEN

capability:
  consumes:
    - type: http
      namespace: github-apps
      baseUri: https://api.github.com
      description: "GitHub REST API for GitHub Apps, installations, tokens, and webhooks."
      authentication:
        type: bearer
        token: "{{GITHUB_TOKEN}}"
      resources:
        - name: apps
          path: /app
          description: "GitHub App management."
          operations:
            - name: getTheAuthenticatedApp
              method: GET
              description: "Get the authenticated app."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: creategithubAppFrommanifest
              method: POST
              path: /app-manifests/{code}/conversions
              description: "Create a GitHub App from a manifest."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAnApp
              method: GET
              path: /apps/{app_slug}
              description: "Get an app."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: app-webhooks
          path: /app/hook
          description: "App webhook configuration and delivery."
          operations:
            - name: getwebhookConfigurationForAnApp
              method: GET
              path: /app/hook/config
              description: "Get webhook configuration for an app."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updatewebhookConfigurationForAnApp
              method: PATCH
              path: /app/hook/config
              description: "Update webhook configuration for an app."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listDeliveriesForAnAppWebhook
              method: GET
              path: /app/hook/deliveries
              description: "List deliveries for an app webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getdeliveryForAnAppWebhook
              method: GET
              path: /app/hook/deliveries/{delivery_id}
              description: "Get a delivery for an app webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: redeliverdeliveryForAnAppWebhook
              method: POST
              path: /app/hook/deliveries/{delivery_id}/attempts
              description: "Redeliver a delivery for an app webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: installations
          path: /app/installations
          description: "App installation management."
          operations:
            - name: listInstallationRequestsForTheAuthenticatedApp
              method: GET
              path: /app/installation-requests
              description: "List installation requests."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listInstallationsForTheAuthenticatedApp
              method: GET
              description: "List installations for the authenticated app."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAnInstallationForTheAuthenticatedApp
              method: GET
              path: /app/installations/{installation_id}
              description: "Get an installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAnInstallationForTheAuthenticatedApp
              method: DELETE
              path: /app/installations/{installation_id}
              description: "Delete an installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createAnInstallationAccessTokenForAnApp
              method: POST
              path: /app/installations/{installation_id}/access_tokens
              description: "Create an installation access token."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: suspendAnAppInstallation
              method: PUT
              path: /app/installations/{installation_id}/suspended
              description: "Suspend an app installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unsuspendAnAppInstallation
              method: DELETE
              path: /app/installations/{installation_id}/suspended
              description: "Unsuspend an app installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: installation-repos
          path: /installation/repositories
          description: "Installation repository access management."
          operations:
            - name: listRepositoriesAccessibleToTheAppInstallation
              method: GET
              description: "List repositories accessible to the app installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: revokeAnInstallationAccessToken
              method: DELETE
              path: /installation/token
              description: "Revoke an installation access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: oauth
          path: /applications
          description: "OAuth token management."
          operations:
            - name: deleteAnAppAuthorization
              method: DELETE
              path: /applications/{client_id}/grant
              description: "Delete an app authorization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: checktoken
              method: POST
              path: /applications/{client_id}/token
              description: "Check a token."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resetToken
              method: PATCH
              path: /applications/{client_id}/token
              description: "Reset a token."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAnAppToken
              method: DELETE
              path: /applications/{client_id}/token
              description: "Delete an app token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createscopedAccessToken
              method: POST
              path: /applications/{client_id}/token/scoped
              description: "Create a scoped access token."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-installations
          path: /user/installations
          description: "User installation access management."
          operations:
            - name: listAppInstallationsAccessibleToTheUserAccessToken
              method: GET
              description: "List app installations accessible to the user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listRepositoriesAccessibleToTheUserAccessToken
              method: GET
              path: /user/installations/{installation_id}/repositories
              description: "List repositories accessible to the user access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addrepositoryToAnAppInstallation
              method: PUT
              path: /user/installations/{installation_id}/repositories/{repository_id}
              description: "Add a repository to an app installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removerepositoryFromAnAppInstallation
              method: DELETE
              path: /user/installations/{installation_id}/repositories/{repository_id}
              description: "Remove a repository from an app installation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8111
      namespace: github-apps-api
      resources:
        - path: /v1/app
          name: app
          description: "Authenticated app"
          operations:
            - method: GET
              name: getTheAuthenticatedApp
              description: "Get the authenticated app"
        - path: /v1/apps/{app_slug}
          name: app-by-slug
          description: "App lookup"
          operations:
            - method: GET
              name: getAnApp
              description: "Get an app"
        - path: /v1/app/installations
          name: installations
          description: "Installation management"
          operations:
            - method: GET
              name: listInstallationsForTheAuthenticatedApp
              description: "List installations"
        - path: /v1/app/installations/{installation_id}
          name: installation
          description: "Individual installation"
          operations:
            - method: GET
              name: getAnInstallationForTheAuthenticatedApp
              description: "Get an installation"
            - method: DELETE
              name: deleteAnInstallationForTheAuthenticatedApp
              description: "Delete an installation"
        - path: /v1/app/installations/{installation_id}/access-tokens
          name: installation-tokens
          description: "Installation access tokens"
          operations:
            - method: POST
              name: createAnInstallationAccessTokenForAnApp
              description: "Create an installation access token"

    - type: mcp
      port: 9111
      namespace: github-apps-mcp
      transport: http
      tools:
        - name: get-authenticated-app
          description: "Get the authenticated app"
          call: "github-apps.getTheAuthenticatedApp"
          hints:
            readOnly: true
        - name: get-app
          description: "Get an app by slug"
          call: "github-apps.getAnApp"
          hints:
            readOnly: true
        - name: list-installations
          description: "List installations for the authenticated app"
          call: "github-apps.listInstallationsForTheAuthenticatedApp"
          hints:
            readOnly: true
        - name: get-installation
          description: "Get an installation"
          call: "github-apps.getAnInstallationForTheAuthenticatedApp"
          hints:
            readOnly: true
        - name: delete-installation
          description: "Delete an installation"
          call: "github-apps.deleteAnInstallationForTheAuthenticatedApp"
          hints:
            destructive: true
        - name: create-installation-token
          description: "Create an installation access token"
          call: "github-apps.createAnInstallationAccessTokenForAnApp"
        - name: suspend-installation
          description: "Suspend an app installation"
          call: "github-apps.suspendAnAppInstallation"
        - name: unsuspend-installation
          description: "Unsuspend an app installation"
          call: "github-apps.unsuspendAnAppInstallation"
        - name: list-installation-repos
          description: "List repositories accessible to the app installation"
          call: "github-apps.listRepositoriesAccessibleToTheAppInstallation"
          hints:
            readOnly: true
        - name: get-webhook-config
          description: "Get webhook configuration"
          call: "github-apps.getwebhookConfigurationForAnApp"
          hints:
            readOnly: true
        - name: update-webhook-config
          description: "Update webhook configuration"
          call: "github-apps.updatewebhookConfigurationForAnApp"
          hints:
            idempotent: true
        - name: list-webhook-deliveries
          description: "List webhook deliveries"
          call: "github-apps.listDeliveriesForAnAppWebhook"
          hints:
            readOnly: true
        - name: check-token
          description: "Check an OAuth token"
          call: "github-apps.checktoken"
          hints:
            readOnly: true
        - name: reset-token
          description: "Reset an OAuth token"
          call: "github-apps.resetToken"
        - name: create-scoped-token
          description: "Create a scoped access token"
          call: "github-apps.createscopedAccessToken"
