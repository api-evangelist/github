naftiko: "1.0.0-alpha1"

info:
  label: "GitHub Projects"
  description: "Manage GitHub Projects (classic), including project boards, columns, cards, and collaborators. Sourced from github-projects-openapi (28 REST operations) and github-repo-projects-api-openapi (2 operations)."
  tags:
    - GitHub
    - Projects
    - Columns
    - Cards
    - Project Management
  created: "2026-04-17"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GITHUB_TOKEN: GITHUB_TOKEN

capability:
  consumes:
    - type: http
      namespace: github-projects
      baseUri: https://api.github.com
      description: "GitHub REST API for projects, columns, cards, and collaborators."
      authentication:
        type: bearer
        token: "{{GITHUB_TOKEN}}"
      resources:
        - name: projects
          path: /projects
          description: "Project CRUD operations."
          operations:
            - name: getProject
              method: GET
              path: /projects/{project_id}
              description: "Get a project."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateProject
              method: PATCH
              path: /projects/{project_id}
              description: "Update a project."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteProject
              method: DELETE
              path: /projects/{project_id}
              description: "Delete a project."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listOrganizationProjects
              method: GET
              path: /orgs/{org}/projects
              description: "List organization projects."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createAnOrganizationProject
              method: POST
              path: /orgs/{org}/projects
              description: "Create an organization project."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listRepositoryProjects
              method: GET
              path: /repos/{owner}/{repo}/projects
              description: "List repository projects."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createRepositoryProject
              method: POST
              path: /repos/{owner}/{repo}/projects
              description: "Create a repository project."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createUserProject
              method: POST
              path: /user/projects
              description: "Create a user project."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listUserProjects
              method: GET
              path: /users/{username}/projects
              description: "List user projects."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: columns
          path: /projects/{project_id}/columns
          description: "Project column management."
          operations:
            - name: listProjectColumns
              method: GET
              description: "List project columns."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createProjectColumn
              method: POST
              description: "Create a project column."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getProjectColumn
              method: GET
              path: /projects/columns/{column_id}
              description: "Get a project column."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateAnExistingProjectColumn
              method: PATCH
              path: /projects/columns/{column_id}
              description: "Update a project column."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteProjectColumn
              method: DELETE
              path: /projects/columns/{column_id}
              description: "Delete a project column."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: moveProjectColumn
              method: POST
              path: /projects/columns/{column_id}/moves
              description: "Move a project column."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cards
          path: /projects/columns/{column_id}/cards
          description: "Project card management."
          operations:
            - name: listProjectCards
              method: GET
              description: "List project cards."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createProjectCard
              method: POST
              description: "Create a project card."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getProjectCard
              method: GET
              path: /projects/columns/cards/{card_id}
              description: "Get a project card."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateAnExistingProjectCard
              method: PATCH
              path: /projects/columns/cards/{card_id}
              description: "Update a project card."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteProjectCard
              method: DELETE
              path: /projects/columns/cards/{card_id}
              description: "Delete a project card."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: moveProjectCard
              method: POST
              path: /projects/columns/cards/{card_id}/moves
              description: "Move a project card."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: collaborators
          path: /projects/{project_id}/collaborators
          description: "Project collaborator management."
          operations:
            - name: listProjectCollaborators
              method: GET
              description: "List project collaborators."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addProjectCollaborator
              method: PUT
              path: /projects/{project_id}/collaborators/{username}
              description: "Add a project collaborator."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removeUserAsCollaborator
              method: DELETE
              path: /projects/{project_id}/collaborators/{username}
              description: "Remove a user as collaborator."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getProjectPermissionForUser
              method: GET
              path: /projects/{project_id}/collaborators/{username}/permission
              description: "Get project permission for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8108
      namespace: github-projects-api
      resources:
        - path: /v1/projects/{project_id}
          name: project
          description: "Project operations"
          operations:
            - method: GET
              name: getProject
              description: "Get a project"
            - method: PATCH
              name: updateProject
              description: "Update a project"
            - method: DELETE
              name: deleteProject
              description: "Delete a project"
        - path: /v1/projects/{project_id}/columns
          name: columns
          description: "Project column management"
          operations:
            - method: GET
              name: listProjectColumns
              description: "List project columns"
            - method: POST
              name: createProjectColumn
              description: "Create a column"
        - path: /v1/projects/columns/{column_id}/cards
          name: cards
          description: "Project card management"
          operations:
            - method: GET
              name: listProjectCards
              description: "List project cards"
            - method: POST
              name: createProjectCard
              description: "Create a card"

    - type: mcp
      port: 9108
      namespace: github-projects-mcp
      transport: http
      tools:
        - name: get-project
          description: "Get a project"
          call: "github-projects.getProject"
          hints:
            readOnly: true
        - name: update-project
          description: "Update a project"
          call: "github-projects.updateProject"
          hints:
            idempotent: true
        - name: delete-project
          description: "Delete a project"
          call: "github-projects.deleteProject"
          hints:
            destructive: true
        - name: list-org-projects
          description: "List organization projects"
          call: "github-projects.listOrganizationProjects"
          hints:
            readOnly: true
        - name: create-org-project
          description: "Create an organization project"
          call: "github-projects.createAnOrganizationProject"
        - name: list-repo-projects
          description: "List repository projects"
          call: "github-projects.listRepositoryProjects"
          hints:
            readOnly: true
        - name: create-repo-project
          description: "Create a repository project"
          call: "github-projects.createRepositoryProject"
        - name: list-columns
          description: "List project columns"
          call: "github-projects.listProjectColumns"
          hints:
            readOnly: true
        - name: create-column
          description: "Create a project column"
          call: "github-projects.createProjectColumn"
        - name: move-column
          description: "Move a project column"
          call: "github-projects.moveProjectColumn"
        - name: list-cards
          description: "List project cards"
          call: "github-projects.listProjectCards"
          hints:
            readOnly: true
        - name: create-card
          description: "Create a project card"
          call: "github-projects.createProjectCard"
        - name: move-card
          description: "Move a project card"
          call: "github-projects.moveProjectCard"
        - name: list-collaborators
          description: "List project collaborators"
          call: "github-projects.listProjectCollaborators"
          hints:
            readOnly: true
        - name: add-collaborator
          description: "Add a project collaborator"
          call: "github-projects.addProjectCollaborator"
          hints:
            idempotent: true
