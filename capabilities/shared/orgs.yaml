naftiko: "1.0.0-alpha1"

info:
  label: "GitHub Organizations"
  description: "Manage GitHub organizations, teams, members, webhooks, custom roles, and organization-level settings. Sourced from github-organizations-openapi (130 operations) and github-teams-openapi (79 operations)."
  tags:
    - GitHub
    - Organizations
    - Teams
    - Members
  created: "2026-04-17"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GITHUB_TOKEN: GITHUB_TOKEN

capability:
  consumes:
    - type: http
      namespace: github-orgs
      baseUri: https://api.github.com
      description: "GitHub REST API for organizations, teams, members, and organization-level management."
      authentication:
        type: bearer
        token: "{{GITHUB_TOKEN}}"
      resources:
        - name: organizations
          path: /orgs/{org}
          description: "Organization CRUD and listing."
          operations:
            - name: listOrganizations
              method: GET
              path: /organizations
              description: "List organizations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAnOrganization
              method: GET
              description: "Get an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateAnOrganization
              method: PATCH
              description: "Update an organization."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAnOrganization
              method: DELETE
              description: "Delete an organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listOrganizationsForTheAuthenticatedUser
              method: GET
              path: /user/orgs
              description: "List organizations for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: members
          path: /orgs/{org}/members
          description: "Organization member management."
          operations:
            - name: listOrganizationMembers
              method: GET
              description: "List organization members."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: checkOrganizationMembershipForUser
              method: GET
              path: /orgs/{org}/members/{username}
              description: "Check organization membership for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removeAnOrganizationMember
              method: DELETE
              path: /orgs/{org}/members/{username}
              description: "Remove an organization member."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getOrganizationMembershipForUser
              method: GET
              path: /orgs/{org}/memberships/{username}
              description: "Get organization membership for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: setOrganizationMembershipForUser
              method: PUT
              path: /orgs/{org}/memberships/{username}
              description: "Set organization membership for a user."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removeOrganizationMembershipForUser
              method: DELETE
              path: /orgs/{org}/memberships/{username}
              description: "Remove organization membership for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listOutsideCollaboratorsForAnOrganization
              method: GET
              path: /orgs/{org}/outside_collaborators
              description: "List outside collaborators."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listPublicOrganizationMembers
              method: GET
              path: /orgs/{org}/public_members
              description: "List public organization members."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: teams
          path: /orgs/{org}/teams
          description: "Team CRUD and management."
          operations:
            - name: listTeams
              method: GET
              description: "List teams."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createTeam
              method: POST
              description: "Create a team."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getTeamByName
              method: GET
              path: /orgs/{org}/teams/{team_slug}
              description: "Get a team by name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateTeam
              method: PATCH
              path: /orgs/{org}/teams/{team_slug}
              description: "Update a team."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteTeam
              method: DELETE
              path: /orgs/{org}/teams/{team_slug}
              description: "Delete a team."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listTeamMembers
              method: GET
              path: /orgs/{org}/teams/{team_slug}/members
              description: "List team members."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getTeamMembershipForUser
              method: GET
              path: /orgs/{org}/teams/{team_slug}/memberships/{username}
              description: "Get team membership for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addOrUpdateTeamMembershipForUser
              method: PUT
              path: /orgs/{org}/teams/{team_slug}/memberships/{username}
              description: "Add or update team membership for a user."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removeTeamMembershipForUser
              method: DELETE
              path: /orgs/{org}/teams/{team_slug}/memberships/{username}
              description: "Remove team membership for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listChildTeams
              method: GET
              path: /orgs/{org}/teams/{team_slug}/teams
              description: "List child teams."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listTeamRepositories
              method: GET
              path: /orgs/{org}/teams/{team_slug}/repos
              description: "List team repositories."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addOrUpdateTeamRepositoryPermissions
              method: PUT
              path: /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}
              description: "Add or update team repository permissions."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removeRepositoryFromTeam
              method: DELETE
              path: /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}
              description: "Remove a repository from a team."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: team-discussions
          path: /orgs/{org}/teams/{team_slug}/discussions
          description: "Team discussion management."
          operations:
            - name: listDiscussions
              method: GET
              description: "List discussions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createDiscussion
              method: POST
              description: "Create a discussion."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getDiscussion
              method: GET
              path: /orgs/{org}/teams/{team_slug}/discussions/{discussion_number}
              description: "Get a discussion."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateDiscussion
              method: PATCH
              path: /orgs/{org}/teams/{team_slug}/discussions/{discussion_number}
              description: "Update a discussion."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteDiscussion
              method: DELETE
              path: /orgs/{org}/teams/{team_slug}/discussions/{discussion_number}
              description: "Delete a discussion."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: webhooks
          path: /orgs/{org}/hooks
          description: "Organization webhook management."
          operations:
            - name: listOrganizationWebhooks
              method: GET
              description: "List organization webhooks."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createAnOrganizationWebhook
              method: POST
              description: "Create an organization webhook."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAnOrganizationWebhook
              method: GET
              path: /orgs/{org}/hooks/{hook_id}
              description: "Get an organization webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateAnOrganizationWebhook
              method: PATCH
              path: /orgs/{org}/hooks/{hook_id}
              description: "Update an organization webhook."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAnOrganizationWebhook
              method: DELETE
              path: /orgs/{org}/hooks/{hook_id}
              description: "Delete an organization webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: org-repos
          path: /orgs/{org}/repos
          description: "Organization repository management."
          operations:
            - name: listOrganizationRepositories
              method: GET
              description: "List organization repositories."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createAnOrganizationRepository
              method: POST
              description: "Create an organization repository."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8106
      namespace: github-orgs-api
      resources:
        - path: /v1/organizations
          name: organizations
          description: "Organization listing"
          operations:
            - method: GET
              name: listOrganizations
              description: "List organizations"
        - path: /v1/organizations/{org}
          name: organization
          description: "Organization operations"
          operations:
            - method: GET
              name: getAnOrganization
              description: "Get an organization"
            - method: PATCH
              name: updateAnOrganization
              description: "Update an organization"
        - path: /v1/organizations/{org}/members
          name: members
          description: "Member management"
          operations:
            - method: GET
              name: listOrganizationMembers
              description: "List organization members"
        - path: /v1/organizations/{org}/teams
          name: teams
          description: "Team management"
          operations:
            - method: GET
              name: listTeams
              description: "List teams"
            - method: POST
              name: createTeam
              description: "Create a team"
        - path: /v1/organizations/{org}/teams/{team_slug}
          name: team
          description: "Individual team operations"
          operations:
            - method: GET
              name: getTeamByName
              description: "Get a team"
            - method: PATCH
              name: updateTeam
              description: "Update a team"
            - method: DELETE
              name: deleteTeam
              description: "Delete a team"

    - type: mcp
      port: 9106
      namespace: github-orgs-mcp
      transport: http
      tools:
        - name: list-organizations
          description: "List organizations"
          call: "github-orgs.listOrganizations"
          hints:
            readOnly: true
        - name: get-organization
          description: "Get an organization"
          call: "github-orgs.getAnOrganization"
          hints:
            readOnly: true
        - name: update-organization
          description: "Update an organization"
          call: "github-orgs.updateAnOrganization"
          hints:
            idempotent: true
        - name: list-members
          description: "List organization members"
          call: "github-orgs.listOrganizationMembers"
          hints:
            readOnly: true
        - name: set-membership
          description: "Set organization membership for a user"
          call: "github-orgs.setOrganizationMembershipForUser"
          hints:
            idempotent: true
        - name: remove-member
          description: "Remove an organization member"
          call: "github-orgs.removeAnOrganizationMember"
          hints:
            destructive: true
        - name: list-teams
          description: "List teams"
          call: "github-orgs.listTeams"
          hints:
            readOnly: true
        - name: create-team
          description: "Create a team"
          call: "github-orgs.createTeam"
        - name: get-team
          description: "Get a team by name"
          call: "github-orgs.getTeamByName"
          hints:
            readOnly: true
        - name: update-team
          description: "Update a team"
          call: "github-orgs.updateTeam"
          hints:
            idempotent: true
        - name: delete-team
          description: "Delete a team"
          call: "github-orgs.deleteTeam"
          hints:
            destructive: true
        - name: list-team-members
          description: "List team members"
          call: "github-orgs.listTeamMembers"
          hints:
            readOnly: true
        - name: add-team-member
          description: "Add or update team membership"
          call: "github-orgs.addOrUpdateTeamMembershipForUser"
          hints:
            idempotent: true
        - name: remove-team-member
          description: "Remove team membership"
          call: "github-orgs.removeTeamMembershipForUser"
          hints:
            destructive: true
        - name: list-team-repos
          description: "List team repositories"
          call: "github-orgs.listTeamRepositories"
          hints:
            readOnly: true
        - name: list-org-repos
          description: "List organization repositories"
          call: "github-orgs.listOrganizationRepositories"
          hints:
            readOnly: true
        - name: create-org-repo
          description: "Create an organization repository"
          call: "github-orgs.createAnOrganizationRepository"
        - name: list-webhooks
          description: "List organization webhooks"
          call: "github-orgs.listOrganizationWebhooks"
          hints:
            readOnly: true
