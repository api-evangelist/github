naftiko: "1.0.0-alpha1"

info:
  label: "GitHub Repos"
  description: "Manage GitHub repositories, branches, commits, tags, and releases including content, deployments, environments, forks, and repository settings."
  tags:
    - GitHub
    - Repositories
    - Branches
    - Commits
    - Tags
    - Releases
  created: "2026-04-17"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GITHUB_TOKEN: GITHUB_TOKEN

capability:
  consumes:
    - type: http
      namespace: github-repos
      baseUri: https://api.github.com
      description: "GitHub REST API for repositories, branches, commits, tags, and releases management. Sourced from github-repos-api (153 operations), github-repo-branches-api (35 operations), and github-repo-tags-api (158 operations including overlapping repo operations)."
      authentication:
        type: bearer
        token: "{{GITHUB_TOKEN}}"
      resources:
        - name: repositories
          path: /repos/{owner}/{repo}
          description: "Core repository management operations."
          operations:
            - name: getRepository
              method: GET
              description: "Get a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateRepository
              method: PATCH
              description: "Update a repository."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteRepository
              method: DELETE
              description: "Delete a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listPublicRepositories
              method: GET
              path: /repositories
              description: "List all public repositories."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createRepositoryUsingTemplate
              method: POST
              path: /repos/{template_owner}/{template_repo}/generate
              description: "Create a repository using a template."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: transferRepository
              method: POST
              description: "Transfer a repository."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listForks
              method: GET
              path: /repos/{owner}/{repo}/forks
              description: "List forks."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createFork
              method: POST
              path: /repos/{owner}/{repo}/forks
              description: "Create a fork."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listRepositoryContributors
              method: GET
              path: /repos/{owner}/{repo}/contributors
              description: "List repository contributors."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listRepositoryLanguages
              method: GET
              path: /repos/{owner}/{repo}/languages
              description: "List repository languages."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listRepositoryTeams
              method: GET
              path: /repos/{owner}/{repo}/teams
              description: "List repository teams."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAllRepositoryTopics
              method: GET
              path: /repos/{owner}/{repo}/topics
              description: "Get all repository topics."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: replaceAllRepositoryTopics
              method: PUT
              path: /repos/{owner}/{repo}/topics
              description: "Replace all repository topics."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: searchRepositories
              method: GET
              path: /search/repositories
              description: "Search repositories."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: branches
          path: /repos/{owner}/{repo}/branches
          description: "Branch management and protection rules."
          operations:
            - name: getBranch
              method: GET
              path: /repos/{owner}/{repo}/branches/{branch}
              description: "Get a branch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: renameBranch
              method: POST
              path: /repos/{owner}/{repo}/branches/{branch}/rename
              description: "Rename a branch."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getBranchProtection
              method: GET
              path: /repos/{owner}/{repo}/branches/{branch}/protection
              description: "Get branch protection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateBranchProtection
              method: PUT
              path: /repos/{owner}/{repo}/branches/{branch}/protection
              description: "Update branch protection."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteBranchProtection
              method: DELETE
              path: /repos/{owner}/{repo}/branches/{branch}/protection
              description: "Delete branch protection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: setAdminBranchProtection
              method: POST
              path: /repos/{owner}/{repo}/branches/{branch}/protection/enforce_admins
              description: "Set admin branch protection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAdminBranchProtection
              method: DELETE
              path: /repos/{owner}/{repo}/branches/{branch}/protection/enforce_admins
              description: "Delete admin branch protection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getStatusChecksProtection
              method: GET
              path: /repos/{owner}/{repo}/branches/{branch}/protection/required_status_checks
              description: "Get status checks protection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateStatusCheckProtection
              method: PATCH
              path: /repos/{owner}/{repo}/branches/{branch}/protection/required_status_checks
              description: "Update status check protection."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: syncForkBranchWithTheUpstreamRepository
              method: POST
              path: /repos/{owner}/{repo}/merge-upstream
              description: "Sync a fork branch with the upstream repository."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: mergeBranch
              method: POST
              path: /repos/{owner}/{repo}/merges
              description: "Merge a branch."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: commits
          path: /repos/{owner}/{repo}/commits
          description: "Commit listing, comparison, and status operations."
          operations:
            - name: listCommits
              method: GET
              description: "List commits."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getCommit
              method: GET
              path: /repos/{owner}/{repo}/commits/{ref}
              description: "Get a commit."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: compareTwoCommits
              method: GET
              path: /repos/{owner}/{repo}/compare/{basehead}
              description: "Compare two commits."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listBranchesForHeadCommit
              method: GET
              path: /repos/{owner}/{repo}/commits/{commit_sha}/branches-where-head
              description: "List branches for HEAD commit."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listCommitComments
              method: GET
              path: /repos/{owner}/{repo}/commits/{commit_sha}/comments
              description: "List commit comments."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createCommitComment
              method: POST
              path: /repos/{owner}/{repo}/commits/{commit_sha}/comments
              description: "Create a commit comment."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listCommitCommentsForRepository
              method: GET
              path: /repos/{owner}/{repo}/comments
              description: "List commit comments for a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getCommitComment
              method: GET
              path: /repos/{owner}/{repo}/comments/{comment_id}
              description: "Get a commit comment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateCommitComment
              method: PATCH
              path: /repos/{owner}/{repo}/comments/{comment_id}
              description: "Update a commit comment."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteCommitComment
              method: DELETE
              path: /repos/{owner}/{repo}/comments/{comment_id}
              description: "Delete a commit comment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createCommitStatus
              method: POST
              path: /repos/{owner}/{repo}/statuses/{sha}
              description: "Create a commit status."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getTheCombinedStatusForSpecificReference
              method: GET
              path: /repos/{owner}/{repo}/commits/{ref}/status
              description: "Get the combined status for a specific reference."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listCommitStatusesForReference
              method: GET
              path: /repos/{owner}/{repo}/commits/{ref}/statuses
              description: "List commit statuses for a reference."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tags
          path: /repos/{owner}/{repo}/tags
          description: "Tag listing and protection."
          operations:
            - name: listRepositoryTags
              method: GET
              description: "List repository tags."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listTagProtectionStatesForRepository
              method: GET
              path: /repos/{owner}/{repo}/tags/protection
              description: "List tag protection states for a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createTagProtectionStateForRepository
              method: POST
              path: /repos/{owner}/{repo}/tags/protection
              description: "Create a tag protection state for a repository."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteTagProtectionStateForRepository
              method: DELETE
              path: /repos/{owner}/{repo}/tags/protection/{tag_protection_id}
              description: "Delete a tag protection state for a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: releases
          path: /repos/{owner}/{repo}/releases
          description: "Release creation, management, and assets."
          operations:
            - name: listReleases
              method: GET
              description: "List releases."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createRelease
              method: POST
              description: "Create a release."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getRelease
              method: GET
              path: /repos/{owner}/{repo}/releases/{release_id}
              description: "Get a release."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateRelease
              method: PATCH
              path: /repos/{owner}/{repo}/releases/{release_id}
              description: "Update a release."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteRelease
              method: DELETE
              path: /repos/{owner}/{repo}/releases/{release_id}
              description: "Delete a release."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getTheLatestRelease
              method: GET
              path: /repos/{owner}/{repo}/releases/latest
              description: "Get the latest release."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getReleaseByTagName
              method: GET
              path: /repos/{owner}/{repo}/releases/tags/{tag}
              description: "Get a release by tag name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: generateReleaseNotesContentForRelease
              method: POST
              path: /repos/{owner}/{repo}/releases/generate-notes
              description: "Generate release notes content for a release."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listReleaseAssets
              method: GET
              path: /repos/{owner}/{repo}/releases/{release_id}/assets
              description: "List release assets."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: uploadReleaseAsset
              method: POST
              path: /repos/{owner}/{repo}/releases/{release_id}/assets
              description: "Upload a release asset."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getReleaseAsset
              method: GET
              path: /repos/{owner}/{repo}/releases/assets/{asset_id}
              description: "Get a release asset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateReleaseAsset
              method: PATCH
              path: /repos/{owner}/{repo}/releases/assets/{asset_id}
              description: "Update a release asset."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteReleaseAsset
              method: DELETE
              path: /repos/{owner}/{repo}/releases/assets/{asset_id}
              description: "Delete a release asset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: content
          path: /repos/{owner}/{repo}/contents
          description: "Repository content and file management."
          operations:
            - name: getRepositoryContent
              method: GET
              path: /repos/{owner}/{repo}/contents/{path}
              description: "Get repository content."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createOrUpdateFileContents
              method: PUT
              path: /repos/{owner}/{repo}/contents/{path}
              description: "Create or update file contents."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteFile
              method: DELETE
              path: /repos/{owner}/{repo}/contents/{path}
              description: "Delete a file."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getRepositoryReadme
              method: GET
              path: /repos/{owner}/{repo}/readme
              description: "Get a repository README."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: git-data
          path: /repos/{owner}/{repo}/git
          description: "Low-level Git data operations for blobs, trees, commits, refs, and tags."
          operations:
            - name: createBlob
              method: POST
              path: /repos/{owner}/{repo}/git/blobs
              description: "Create a blob."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getBlob
              method: GET
              path: /repos/{owner}/{repo}/git/blobs/{file_sha}
              description: "Get a blob."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createCommit
              method: POST
              path: /repos/{owner}/{repo}/git/commits
              description: "Create a commit."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getCommitObject
              method: GET
              path: /repos/{owner}/{repo}/git/commits/{commit_sha}
              description: "Get a commit object."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listMatchingReferences
              method: GET
              path: /repos/{owner}/{repo}/git/matching-refs/{ref}
              description: "List matching references."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getReference
              method: GET
              path: /repos/{owner}/{repo}/git/ref/{ref}
              description: "Get a reference."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createReference
              method: POST
              path: /repos/{owner}/{repo}/git/refs
              description: "Create a reference."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateReference
              method: PATCH
              path: /repos/{owner}/{repo}/git/refs/{ref}
              description: "Update a reference."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteReference
              method: DELETE
              path: /repos/{owner}/{repo}/git/refs/{ref}
              description: "Delete a reference."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createTagObject
              method: POST
              path: /repos/{owner}/{repo}/git/tags
              description: "Create a tag object."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getTag
              method: GET
              path: /repos/{owner}/{repo}/git/tags/{tag_sha}
              description: "Get a tag."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createTree
              method: POST
              path: /repos/{owner}/{repo}/git/trees
              description: "Create a tree."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getTree
              method: GET
              path: /repos/{owner}/{repo}/git/trees/{tree_sha}
              description: "Get a tree."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: github-repos-api
      resources:
        - path: /v1/repositories
          name: repositories
          description: "List and search repositories"
          operations:
            - method: GET
              name: listPublicRepositories
              description: "List all public repositories"
            - method: GET
              name: searchRepositories
              description: "Search repositories"
        - path: /v1/repositories/{owner}/{repo}
          name: repository
          description: "Repository CRUD operations"
          operations:
            - method: GET
              name: getRepository
              description: "Get a repository"
            - method: PATCH
              name: updateRepository
              description: "Update a repository"
            - method: DELETE
              name: deleteRepository
              description: "Delete a repository"
        - path: /v1/repositories/{owner}/{repo}/branches/{branch}
          name: branch
          description: "Branch operations"
          operations:
            - method: GET
              name: getBranch
              description: "Get a branch"
        - path: /v1/repositories/{owner}/{repo}/commits
          name: commits
          description: "Commit listing and details"
          operations:
            - method: GET
              name: listCommits
              description: "List commits"
        - path: /v1/repositories/{owner}/{repo}/commits/{ref}
          name: commit
          description: "Individual commit operations"
          operations:
            - method: GET
              name: getCommit
              description: "Get a commit"
        - path: /v1/repositories/{owner}/{repo}/tags
          name: tags
          description: "Tag operations"
          operations:
            - method: GET
              name: listRepositoryTags
              description: "List repository tags"
        - path: /v1/repositories/{owner}/{repo}/releases
          name: releases
          description: "Release management"
          operations:
            - method: GET
              name: listReleases
              description: "List releases"
            - method: POST
              name: createRelease
              description: "Create a release"
        - path: /v1/repositories/{owner}/{repo}/releases/{release_id}
          name: release
          description: "Individual release operations"
          operations:
            - method: GET
              name: getRelease
              description: "Get a release"
            - method: PATCH
              name: updateRelease
              description: "Update a release"
            - method: DELETE
              name: deleteRelease
              description: "Delete a release"
        - path: /v1/repositories/{owner}/{repo}/contents/{path}
          name: content
          description: "Repository content operations"
          operations:
            - method: GET
              name: getRepositoryContent
              description: "Get repository content"
            - method: PUT
              name: createOrUpdateFileContents
              description: "Create or update file contents"
            - method: DELETE
              name: deleteFile
              description: "Delete a file"

    - type: mcp
      port: 9100
      namespace: github-repos-mcp
      transport: http
      tools:
        - name: get-repository
          description: "Get a repository"
          call: "github-repos.getRepository"
          hints:
            readOnly: true
        - name: update-repository
          description: "Update a repository"
          call: "github-repos.updateRepository"
          hints:
            idempotent: true
        - name: delete-repository
          description: "Delete a repository"
          call: "github-repos.deleteRepository"
          hints:
            destructive: true
        - name: list-commits
          description: "List commits"
          call: "github-repos.listCommits"
          hints:
            readOnly: true
        - name: get-commit
          description: "Get a commit"
          call: "github-repos.getCommit"
          hints:
            readOnly: true
        - name: compare-commits
          description: "Compare two commits"
          call: "github-repos.compareTwoCommits"
          hints:
            readOnly: true
        - name: get-branch
          description: "Get a branch"
          call: "github-repos.getBranch"
          hints:
            readOnly: true
        - name: rename-branch
          description: "Rename a branch"
          call: "github-repos.renameBranch"
        - name: get-branch-protection
          description: "Get branch protection"
          call: "github-repos.getBranchProtection"
          hints:
            readOnly: true
        - name: update-branch-protection
          description: "Update branch protection"
          call: "github-repos.updateBranchProtection"
          hints:
            idempotent: true
        - name: list-tags
          description: "List repository tags"
          call: "github-repos.listRepositoryTags"
          hints:
            readOnly: true
        - name: list-releases
          description: "List releases"
          call: "github-repos.listReleases"
          hints:
            readOnly: true
        - name: create-release
          description: "Create a release"
          call: "github-repos.createRelease"
        - name: get-release
          description: "Get a release"
          call: "github-repos.getRelease"
          hints:
            readOnly: true
        - name: update-release
          description: "Update a release"
          call: "github-repos.updateRelease"
          hints:
            idempotent: true
        - name: delete-release
          description: "Delete a release"
          call: "github-repos.deleteRelease"
          hints:
            destructive: true
        - name: get-content
          description: "Get repository content"
          call: "github-repos.getRepositoryContent"
          hints:
            readOnly: true
        - name: create-or-update-file
          description: "Create or update file contents"
          call: "github-repos.createOrUpdateFileContents"
          hints:
            idempotent: true
        - name: merge-branch
          description: "Merge a branch"
          call: "github-repos.mergeBranch"
