naftiko: "1.0.0-alpha1"

info:
  label: "GitHub Users"
  description: "Manage GitHub users, authenticated user profile, emails, SSH keys, GPG keys, social accounts, followers, and starred repositories. Sourced from github-users-api (93 operations)."
  tags:
    - GitHub
    - Users
    - Emails
    - SSH Keys
    - GPG Keys
  created: "2026-04-17"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GITHUB_TOKEN: GITHUB_TOKEN

capability:
  consumes:
    - type: http
      namespace: github-users
      baseUri: https://api.github.com
      description: "GitHub REST API for users, emails, SSH keys, GPG keys, and profile management."
      authentication:
        type: bearer
        token: "{{GITHUB_TOKEN}}"
      resources:
        - name: authenticated-user
          path: /user
          description: "Authenticated user profile management."
          operations:
            - name: getTheAuthenticatedUser
              method: GET
              description: "Get the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateTheAuthenticatedUser
              method: PATCH
              description: "Update the authenticated user."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: emails
          path: /user/emails
          description: "Email address management for the authenticated user."
          operations:
            - name: listEmailAddressesForTheAuthenticatedUser
              method: GET
              description: "List email addresses."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addAnEmailAddressForTheAuthenticatedUser
              method: POST
              description: "Add an email address."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAnEmailAddressForTheAuthenticatedUser
              method: DELETE
              description: "Delete an email address."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listPublicEmailAddressesForTheAuthenticatedUser
              method: GET
              path: /user/public_emails
              description: "List public email addresses."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: ssh-keys
          path: /user/keys
          description: "SSH key management for the authenticated user."
          operations:
            - name: listPublicSshKeysForTheAuthenticatedUser
              method: GET
              description: "List public SSH keys."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createPublicSshKeyForTheAuthenticatedUser
              method: POST
              description: "Create a public SSH key."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPublicSshKeyForTheAuthenticatedUser
              method: GET
              path: /user/keys/{key_id}
              description: "Get a public SSH key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deletePublicSshKeyForTheAuthenticatedUser
              method: DELETE
              path: /user/keys/{key_id}
              description: "Delete a public SSH key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: gpg-keys
          path: /user/gpg_keys
          description: "GPG key management for the authenticated user."
          operations:
            - name: listGpgKeysForTheAuthenticatedUser
              method: GET
              description: "List GPG keys."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createGpgKeyForTheAuthenticatedUser
              method: POST
              description: "Create a GPG key."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getGpgKeyForTheAuthenticatedUser
              method: GET
              path: /user/gpg_keys/{gpg_key_id}
              description: "Get a GPG key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteGpgKeyForTheAuthenticatedUser
              method: DELETE
              path: /user/gpg_keys/{gpg_key_id}
              description: "Delete a GPG key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: ssh-signing-keys
          path: /user/ssh_signing_keys
          description: "SSH signing key management."
          operations:
            - name: listSshSigningKeysForTheAuthenticatedUser
              method: GET
              description: "List SSH signing keys."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createSshSigningKeyForTheAuthenticatedUser
              method: POST
              description: "Create an SSH signing key."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAnSshSigningKeyForTheAuthenticatedUser
              method: GET
              path: /user/ssh_signing_keys/{ssh_signing_key_id}
              description: "Get an SSH signing key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteAnSshSigningKeyForTheAuthenticatedUser
              method: DELETE
              path: /user/ssh_signing_keys/{ssh_signing_key_id}
              description: "Delete an SSH signing key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: followers
          path: /user/followers
          description: "Follower management."
          operations:
            - name: listFollowersOfTheAuthenticatedUser
              method: GET
              description: "List followers of the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listThePeopleTheAuthenticatedUserFollows
              method: GET
              path: /user/following
              description: "List the people the authenticated user follows."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: checkIfPersonIsFollowedByTheAuthenticatedUser
              method: GET
              path: /user/following/{username}
              description: "Check if a person is followed."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: followUser
              method: PUT
              path: /user/following/{username}
              description: "Follow a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unfollowUser
              method: DELETE
              path: /user/following/{username}
              description: "Unfollow a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: public-users
          path: /users
          description: "Public user lookup and listing."
          operations:
            - name: listUsers
              method: GET
              description: "List users."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUser
              method: GET
              path: /users/{username}
              description: "Get a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listFollowersOfUser
              method: GET
              path: /users/{username}/followers
              description: "List followers of a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listThePeopleUserFollows
              method: GET
              path: /users/{username}/following
              description: "List the people a user follows."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listPublicKeysForUser
              method: GET
              path: /users/{username}/keys
              description: "List public keys for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listGpgKeysForUser
              method: GET
              path: /users/{username}/gpg_keys
              description: "List GPG keys for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listOrganizationsForUser
              method: GET
              path: /users/{username}/orgs
              description: "List organizations for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: listRepositoriesForUser
              method: GET
              path: /users/{username}/repos
              description: "List repositories for a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: searchUsers
              method: GET
              path: /search/users
              description: "Search users."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: social-accounts
          path: /user/social_accounts
          description: "Social account management."
          operations:
            - name: listSocialAccountsForTheAuthenticatedUser
              method: GET
              description: "List social accounts."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addSocialAccountsForTheAuthenticatedUser
              method: POST
              description: "Add social accounts."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteSocialAccountsForTheAuthenticatedUser
              method: DELETE
              description: "Delete social accounts."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: starred
          path: /user/starred
          description: "Starred repository management."
          operations:
            - name: listRepositoriesStarredByTheAuthenticatedUser
              method: GET
              description: "List repositories starred by the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: starRepositoryForTheAuthenticatedUser
              method: PUT
              path: /user/starred/{owner}/{repo}
              description: "Star a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unstarRepositoryForTheAuthenticatedUser
              method: DELETE
              path: /user/starred/{owner}/{repo}
              description: "Unstar a repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: github-users-api
      resources:
        - path: /v1/user
          name: authenticated-user
          description: "Authenticated user profile"
          operations:
            - method: GET
              name: getTheAuthenticatedUser
              description: "Get authenticated user"
            - method: PATCH
              name: updateTheAuthenticatedUser
              description: "Update authenticated user"
        - path: /v1/user/emails
          name: emails
          description: "Email management"
          operations:
            - method: GET
              name: listEmailAddressesForTheAuthenticatedUser
              description: "List email addresses"
            - method: POST
              name: addAnEmailAddressForTheAuthenticatedUser
              description: "Add an email address"
        - path: /v1/user/keys
          name: ssh-keys
          description: "SSH key management"
          operations:
            - method: GET
              name: listPublicSshKeysForTheAuthenticatedUser
              description: "List SSH keys"
            - method: POST
              name: createPublicSshKeyForTheAuthenticatedUser
              description: "Create an SSH key"
        - path: /v1/users
          name: users
          description: "Public user listing"
          operations:
            - method: GET
              name: listUsers
              description: "List users"
        - path: /v1/users/{username}
          name: user
          description: "Public user profile"
          operations:
            - method: GET
              name: getUser
              description: "Get a user"

    - type: mcp
      port: 9105
      namespace: github-users-mcp
      transport: http
      tools:
        - name: get-authenticated-user
          description: "Get the authenticated user"
          call: "github-users.getTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: update-authenticated-user
          description: "Update the authenticated user"
          call: "github-users.updateTheAuthenticatedUser"
          hints:
            idempotent: true
        - name: list-emails
          description: "List email addresses"
          call: "github-users.listEmailAddressesForTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: add-email
          description: "Add an email address"
          call: "github-users.addAnEmailAddressForTheAuthenticatedUser"
        - name: list-ssh-keys
          description: "List SSH keys"
          call: "github-users.listPublicSshKeysForTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: create-ssh-key
          description: "Create an SSH key"
          call: "github-users.createPublicSshKeyForTheAuthenticatedUser"
        - name: list-gpg-keys
          description: "List GPG keys"
          call: "github-users.listGpgKeysForTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: create-gpg-key
          description: "Create a GPG key"
          call: "github-users.createGpgKeyForTheAuthenticatedUser"
        - name: list-followers
          description: "List followers"
          call: "github-users.listFollowersOfTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: follow-user
          description: "Follow a user"
          call: "github-users.followUser"
        - name: unfollow-user
          description: "Unfollow a user"
          call: "github-users.unfollowUser"
        - name: get-user
          description: "Get a public user profile"
          call: "github-users.getUser"
          hints:
            readOnly: true
        - name: search-users
          description: "Search users"
          call: "github-users.searchUsers"
          hints:
            readOnly: true
        - name: list-starred
          description: "List starred repositories"
          call: "github-users.listRepositoriesStarredByTheAuthenticatedUser"
          hints:
            readOnly: true
        - name: star-repository
          description: "Star a repository"
          call: "github-users.starRepositoryForTheAuthenticatedUser"
