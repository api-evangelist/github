naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Matching
  description: 'GitHub Repos API — Matching. 1 operations. Lead operation: List Matching References. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Matching
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-matching
    baseUri: ''
    description: GitHub Repos API — Matching business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-git-matching-refs-ref
      path: /repos/{owner}/{repo}/git/matching-refs/{ref}
      operations:
      - name: listmatchingreferences
        method: GET
        description: List Matching References
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-matching-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Matching. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/git/matching-refs/{ref}
      name: repos-owner-repo-git-matching-refs-ref
      description: REST surface for repos-owner-repo-git-matching-refs-ref.
      operations:
      - method: GET
        name: listmatchingreferences
        description: List Matching References
        call: temp-matching.listmatchingreferences
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-matching-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Matching. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-matching-references
      description: List Matching References
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-matching.listmatchingreferences
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
