naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Migrations
  description: 'GitHub Repos API — Migrations. 2 operations. Lead operation: List Repositories In An Organization Migration.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Migrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-migrations
    baseUri: ''
    description: GitHub Repos API — Migrations business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-migrations-migration_id-repositories
      path: /orgs/{org}/migrations/{migration_id}/repositories
      operations:
      - name: listrepositoriesinanorganizationmigration
        method: GET
        description: List Repositories In An Organization Migration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: user-migrations-migration_id-repositories
      path: /user/migrations/{migration_id}/repositories
      operations:
      - name: listrepositoriesforusermigration
        method: GET
        description: List Repositories For User Migration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-migrations-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Migrations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org}/migrations/{migration-id}/repositories
      name: orgs-org-migrations-migration-id-repositories
      description: REST surface for orgs-org-migrations-migration_id-repositories.
      operations:
      - method: GET
        name: listrepositoriesinanorganizationmigration
        description: List Repositories In An Organization Migration
        call: temp-migrations.listrepositoriesinanorganizationmigration
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/migrations/{migration-id}/repositories
      name: user-migrations-migration-id-repositories
      description: REST surface for user-migrations-migration_id-repositories.
      operations:
      - method: GET
        name: listrepositoriesforusermigration
        description: List Repositories For User Migration
        call: temp-migrations.listrepositoriesforusermigration
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-migrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Migrations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-repositories-organization-migration
      description: List Repositories In An Organization Migration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-migrations.listrepositoriesinanorganizationmigration
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: list-repositories-user-migration
      description: List Repositories For User Migration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-migrations.listrepositoriesforusermigration
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
