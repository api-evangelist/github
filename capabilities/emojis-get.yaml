naftiko: 1.0.0-alpha2
info:
  label: GitHub Emojis API — Get
  description: 'GitHub Emojis API — Get. 1 operations. Lead operation: GitHub Get Emojis. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: emojis-get
    baseUri: ''
    description: GitHub Emojis API — Get business capability. Self-contained, no shared references.
    resources:
    - name: emojis
      path: /emojis
      operations:
      - name: getemojis
        method: GET
        description: GitHub Get Emojis
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: emojis-get-rest
    port: 8080
    description: REST adapter for GitHub Emojis API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/emojis
      name: emojis
      description: REST surface for emojis.
      operations:
      - method: GET
        name: getemojis
        description: GitHub Get Emojis
        call: emojis-get.getemojis
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: emojis-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Emojis API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-emojis
      description: GitHub Get Emojis
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: emojis-get.getemojis
      outputParameters:
      - type: object
        mapping: $.
