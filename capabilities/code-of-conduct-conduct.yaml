naftiko: 1.0.0-alpha2
info:
  label: GitHub Code of Conduct API — Conduct
  description: 'GitHub Code of Conduct API — Conduct. 2 operations. Lead operation: GitHub Get All Codes of Conduct. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Conduct
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: code-of-conduct-conduct
    baseUri: ''
    description: GitHub Code of Conduct API — Conduct business capability. Self-contained, no shared references.
    resources:
    - name: codes_of_conduct
      path: /codes_of_conduct
      operations:
      - name: getallcodesofconduct
        method: GET
        description: GitHub Get All Codes of Conduct
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: codes_of_conduct-key
      path: /codes_of_conduct/{key}
      operations:
      - name: getcodeofconduct
        method: GET
        description: GitHub Get Code of Conduct
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: code-of-conduct-conduct-rest
    port: 8080
    description: REST adapter for GitHub Code of Conduct API — Conduct. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/codes-of-conduct
      name: codes-of-conduct
      description: REST surface for codes_of_conduct.
      operations:
      - method: GET
        name: getallcodesofconduct
        description: GitHub Get All Codes of Conduct
        call: code-of-conduct-conduct.getallcodesofconduct
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/codes-of-conduct/{key}
      name: codes-of-conduct-key
      description: REST surface for codes_of_conduct-key.
      operations:
      - method: GET
        name: getcodeofconduct
        description: GitHub Get Code of Conduct
        call: code-of-conduct-conduct.getcodeofconduct
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: code-of-conduct-conduct-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Code of Conduct API — Conduct. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-all-codes-conduct
      description: GitHub Get All Codes of Conduct
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: code-of-conduct-conduct.getallcodesofconduct
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-code-conduct
      description: GitHub Get Code of Conduct
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: code-of-conduct-conduct.getcodeofconduct
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
