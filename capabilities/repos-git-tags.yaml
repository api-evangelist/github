naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Git Tags
  description: 'github-repos-api — Git Tags. 2 operations. Lead operation: GitHub Create Tag Object. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Git Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repos-git-tags
    baseUri: http://localhost:8080/rest/github-repos-api/1.1.4
    description: github-repos-api — Git Tags business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-git-tags
      path: /repos/{owner}/{repo}/git/tags
      operations:
      - name: createtagobject
        method: POST
        description: GitHub Create Tag Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-git-tags-tag_sha
      path: /repos/{owner}/{repo}/git/tags/{tag_sha}
      operations:
      - name: gettag
        method: GET
        description: GitHub Get Tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag_sha
          in: path
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repos-git-tags-rest
    port: 8080
    description: REST adapter for github-repos-api — Git Tags. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/git/tags
      name: repos-owner-repo-git-tags
      description: REST surface for repos-owner-repo-git-tags.
      operations:
      - method: POST
        name: createtagobject
        description: GitHub Create Tag Object
        call: repos-git-tags.createtagobject
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/git/tags/{tag-sha}
      name: repos-owner-repo-git-tags-tag-sha
      description: REST surface for repos-owner-repo-git-tags-tag_sha.
      operations:
      - method: GET
        name: gettag
        description: GitHub Get Tag
        call: repos-git-tags.gettag
        with:
          tag_sha: rest.tag_sha
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repos-git-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Git Tags. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-create-tag-object
      description: GitHub Create Tag Object
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repos-git-tags.createtagobject
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-tag
      description: GitHub Get Tag
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repos-git-tags.gettag
      with:
        tag_sha: tools.tag_sha
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
