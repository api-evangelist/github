naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Annotations
  description: 'github-repos-api — Annotations. 1 operations. Lead operation: GitHub List Check Run Annotations. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Annotations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-annotations
    baseUri: ''
    description: github-repos-api — Annotations business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-check-runs-check_run_id-annotations
      path: /repos/{owner}/{repo}/check-runs/{check_run_id}/annotations
      operations:
      - name: listcheckrunannotations
        method: GET
        description: GitHub List Check Run Annotations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-annotations-rest
    port: 8080
    description: REST adapter for github-repos-api — Annotations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/check-runs/{check-run-id}/annotations
      name: repos-owner-repo-check-runs-check-run-id-annotations
      description: REST surface for repos-owner-repo-check-runs-check_run_id-annotations.
      operations:
      - method: GET
        name: listcheckrunannotations
        description: GitHub List Check Run Annotations
        call: repo-tags-annotations.listcheckrunannotations
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-annotations-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Annotations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-check-run-annotations
      description: GitHub List Check Run Annotations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-annotations.listcheckrunannotations
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
