naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Re-deliver
  description: 'GitHub Repos API — Re-deliver. 1 operations. Lead operation: Redeliver Delivery For Repository Webhook. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Re-deliver
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-re-deliver
    baseUri: ''
    description: GitHub Repos API — Re-deliver business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-hooks-hook_id-deliveries-delivery_id-attempts
      path: /repos/{owner}/{repo}/hooks/{hook_id}/deliveries/{delivery_id}/attempts
      operations:
      - name: redeliverdeliveryforrepositorywebhook
        method: POST
        description: Redeliver Delivery For Repository Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-re-deliver-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Re-deliver. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/hooks/{hook-id}/deliveries/{delivery-id}/attempts
      name: repos-owner-repo-hooks-hook-id-deliveries-delivery-id-attempts
      description: REST surface for repos-owner-repo-hooks-hook_id-deliveries-delivery_id-attempts.
      operations:
      - method: POST
        name: redeliverdeliveryforrepositorywebhook
        description: Redeliver Delivery For Repository Webhook
        call: temp-re-deliver.redeliverdeliveryforrepositorywebhook
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-re-deliver-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Re-deliver. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: redeliver-delivery-repository-webhook
      description: Redeliver Delivery For Repository Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-re-deliver.redeliverdeliveryforrepositorywebhook
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
