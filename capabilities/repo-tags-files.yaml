naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Files
  description: 'github-repos-api — Files. 2 operations. Lead operation: GitHub Create or Update File Contents. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-files
    baseUri: ''
    description: github-repos-api — Files business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-contents-path
      path: /repos/{owner}/{repo}/contents/{path}
      operations:
      - name: createorupdatefilecontents
        method: PUT
        description: GitHub Create or Update File Contents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: path parameter
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletefile
        method: DELETE
        description: GitHub Delete File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: path parameter
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-files-rest
    port: 8080
    description: REST adapter for github-repos-api — Files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/contents/{path}
      name: repos-owner-repo-contents-path
      description: REST surface for repos-owner-repo-contents-path.
      operations:
      - method: PUT
        name: createorupdatefilecontents
        description: GitHub Create or Update File Contents
        call: repo-tags-files.createorupdatefilecontents
        with:
          path: rest.path
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefile
        description: GitHub Delete File
        call: repo-tags-files.deletefile
        with:
          path: rest.path
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Files. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-create-update-file-contents
      description: GitHub Create or Update File Contents
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-files.createorupdatefilecontents
      with:
        path: tools.path
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-delete-file
      description: GitHub Delete File
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-tags-files.deletefile
      with:
        path: tools.path
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
