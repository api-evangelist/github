naftiko: 1.0.0-alpha2
info:
  label: GitHub Search API — Users
  description: 'GitHub Search API — Users. 1 operations. Lead operation: GitHub Search Users. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-users
    baseUri: ''
    description: GitHub Search API — Users business capability. Self-contained, no shared references.
    resources:
    - name: search-users
      path: /search/users
      operations:
      - name: searchusers
        method: GET
        description: GitHub Search Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The query contains one or more search keywords and qualifiers. Qualifiers allow you to limit your search
            to specific areas of GitHub Enterprise Server. The REST
          required: true
        - name: sort
          in: query
          type: string
          description: 'Sorts the results of your query by number of `followers` or `repositories`, or when the person `joined`
            GitHub Enterprise Server. Default: [best match](https://'
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
  exposes:
  - type: rest
    namespace: search-users-rest
    port: 8080
    description: REST adapter for GitHub Search API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search/users
      name: search-users
      description: REST surface for search-users.
      operations:
      - method: GET
        name: searchusers
        description: GitHub Search Users
        call: search-users.searchusers
        with:
          q: rest.q
          sort: rest.sort
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Search API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-search-users
      description: GitHub Search Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-users.searchusers
      with:
        q: tools.q
        sort: tools.sort
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
