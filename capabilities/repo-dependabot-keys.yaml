naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Keys
  description: 'github-repos-api — Keys. 1 operations. Lead operation: GitHub Get Repository Public Key. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-dependabot-keys
    baseUri: ''
    description: github-repos-api — Keys business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-dependabot-secrets-public-key
      path: /repos/{owner}/{repo}/dependabot/secrets/public-key
      operations:
      - name: getrepositorydependabotsecretspublickey
        method: GET
        description: GitHub Get Repository Public Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-dependabot-keys-rest
    port: 8080
    description: REST adapter for github-repos-api — Keys. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/dependabot/secrets/public-key
      name: repos-owner-repo-dependabot-secrets-public-key
      description: REST surface for repos-owner-repo-dependabot-secrets-public-key.
      operations:
      - method: GET
        name: getrepositorydependabotsecretspublickey
        description: GitHub Get Repository Public Key
        call: repo-dependabot-keys.getrepositorydependabotsecretspublickey
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-dependabot-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Keys. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-repository-public-key
      description: GitHub Get Repository Public Key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-dependabot-keys.getrepositorydependabotsecretspublickey
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
