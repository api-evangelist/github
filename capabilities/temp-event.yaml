naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Event
  description: 'GitHub Repos API — Event. 2 operations. Lead operation: Create Workflow Dispatch Event. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Event
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-event
    baseUri: ''
    description: GitHub Repos API — Event business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-workflows-workflow_id-dispatches
      path: /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches
      operations:
      - name: createworkflowdispatchevent
        method: POST
        description: Create Workflow Dispatch Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-dispatches
      path: /repos/{owner}/{repo}/dispatches
      operations:
      - name: createrepositorydispatchevent
        method: POST
        description: Create Repository Dispatch Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-event-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Event. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/workflows/{workflow-id}/dispatches
      name: repos-owner-repo-actions-workflows-workflow-id-dispatches
      description: REST surface for repos-owner-repo-actions-workflows-workflow_id-dispatches.
      operations:
      - method: POST
        name: createworkflowdispatchevent
        description: Create Workflow Dispatch Event
        call: temp-event.createworkflowdispatchevent
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/dispatches
      name: repos-owner-repo-dispatches
      description: REST surface for repos-owner-repo-dispatches.
      operations:
      - method: POST
        name: createrepositorydispatchevent
        description: Create Repository Dispatch Event
        call: temp-event.createrepositorydispatchevent
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-event-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Event. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-workflow-dispatch-event
      description: Create Workflow Dispatch Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-event.createworkflowdispatchevent
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-repository-dispatch-event
      description: Create Repository Dispatch Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-event.createrepositorydispatchevent
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
