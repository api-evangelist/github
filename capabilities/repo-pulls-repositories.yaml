naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Repositories
  description: 'github-repos-api — Repositories. 1 operations. Lead operation: GitHub List Review Comments in Repository.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Repositories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-pulls-repositories
    baseUri: ''
    description: github-repos-api — Repositories business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-comments
      path: /repos/{owner}/{repo}/pulls/comments
      operations:
      - name: listreviewcommentsinrepository
        method: GET
        description: GitHub List Review Comments in Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
        - name: direction
          in: query
          type: string
          description: The direction to sort results. Ignored without `sort` parameter.
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-pulls-repositories-rest
    port: 8080
    description: REST adapter for github-repos-api — Repositories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/comments
      name: repos-owner-repo-pulls-comments
      description: REST surface for repos-owner-repo-pulls-comments.
      operations:
      - method: GET
        name: listreviewcommentsinrepository
        description: GitHub List Review Comments in Repository
        call: repo-pulls-repositories.listreviewcommentsinrepository
        with:
          sort: rest.sort
          direction: rest.direction
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-pulls-repositories-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Repositories. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-review-comments-repository
      description: GitHub List Review Comments in Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-pulls-repositories.listreviewcommentsinrepository
      with:
        sort: tools.sort
        direction: tools.direction
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
