naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Assignees
  description: 'github-repos-api — Assignees. 2 operations. Lead operation: GitHub Add Assignees to an Issue. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Assignees
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-issues-assignees
    baseUri: ''
    description: github-repos-api — Assignees business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-issue_number-assignees
      path: /repos/{owner}/{repo}/issues/{issue_number}/assignees
      operations:
      - name: addassigneestoanissue
        method: POST
        description: GitHub Add Assignees to an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: removeassigneesfromanissue
        method: DELETE
        description: GitHub Remove Assignees from an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-issues-assignees-rest
    port: 8080
    description: REST adapter for github-repos-api — Assignees. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/{issue-number}/assignees
      name: repos-owner-repo-issues-issue-number-assignees
      description: REST surface for repos-owner-repo-issues-issue_number-assignees.
      operations:
      - method: POST
        name: addassigneestoanissue
        description: GitHub Add Assignees to an Issue
        call: repo-issues-assignees.addassigneestoanissue
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeassigneesfromanissue
        description: GitHub Remove Assignees from an Issue
        call: repo-issues-assignees.removeassigneesfromanissue
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-issues-assignees-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Assignees. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-add-assignees-issue
      description: GitHub Add Assignees to an Issue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repo-issues-assignees.addassigneestoanissue
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: github-remove-assignees-issue
      description: GitHub Remove Assignees from an Issue
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-issues-assignees.removeassigneesfromanissue
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
