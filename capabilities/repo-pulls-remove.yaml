naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Remove
  description: 'github-repos-api — Remove. 1 operations. Lead operation: GitHub Remove Requested Reviewers from Pull Request.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-pulls-remove
    baseUri: ''
    description: github-repos-api — Remove business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-pull_number-requested_reviewers
      path: /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers
      operations:
      - name: removerequestedreviewersfrompullrequest
        method: DELETE
        description: GitHub Remove Requested Reviewers from Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-pulls-remove-rest
    port: 8080
    description: REST adapter for github-repos-api — Remove. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/{pull-number}/requested-reviewers
      name: repos-owner-repo-pulls-pull-number-requested-reviewers
      description: REST surface for repos-owner-repo-pulls-pull_number-requested_reviewers.
      operations:
      - method: DELETE
        name: removerequestedreviewersfrompullrequest
        description: GitHub Remove Requested Reviewers from Pull Request
        call: repo-pulls-remove.removerequestedreviewersfrompullrequest
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-pulls-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Remove. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-remove-requested-reviewers-pull
      description: GitHub Remove Requested Reviewers from Pull Request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-pulls-remove.removerequestedreviewersfrompullrequest
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
