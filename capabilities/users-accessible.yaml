naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Accessible
  description: 'GitHub User API — Accessible. 2 operations. Lead operation: GitHub List App Installations Accessible to the
    User Access Token. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Accessible
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-accessible
    baseUri: ''
    description: GitHub User API — Accessible business capability. Self-contained, no shared references.
    resources:
    - name: user-installations
      path: /user/installations
      operations:
      - name: listappinstallationsaccessibletotheuseraccesstoken
        method: GET
        description: GitHub List App Installations Accessible to the User Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: user-installations-installation_id-repositories
      path: /user/installations/{installation_id}/repositories
      operations:
      - name: listrepositoriesaccessibletotheuseraccesstoken
        method: GET
        description: GitHub List Repositories Accessible to the User Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-accessible-rest
    port: 8080
    description: REST adapter for GitHub User API — Accessible. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/installations
      name: user-installations
      description: REST surface for user-installations.
      operations:
      - method: GET
        name: listappinstallationsaccessibletotheuseraccesstoken
        description: GitHub List App Installations Accessible to the User Access Token
        call: users-accessible.listappinstallationsaccessibletotheuseraccesstoken
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/installations/{installation-id}/repositories
      name: user-installations-installation-id-repositories
      description: REST surface for user-installations-installation_id-repositories.
      operations:
      - method: GET
        name: listrepositoriesaccessibletotheuseraccesstoken
        description: GitHub List Repositories Accessible to the User Access Token
        call: users-accessible.listrepositoriesaccessibletotheuseraccesstoken
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-accessible-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Accessible. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-app-installations-accessible
      description: GitHub List App Installations Accessible to the User Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-accessible.listappinstallationsaccessibletotheuseraccesstoken
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-list-repositories-accessible-user
      description: GitHub List Repositories Accessible to the User Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-accessible.listrepositoriesaccessibletotheuseraccesstoken
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
