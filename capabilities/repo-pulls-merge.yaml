naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Merge
  description: 'github-repos-api — Merge. 1 operations. Lead operation: GitHub Merge Pull Request. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Merge
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-pulls-merge
    baseUri: ''
    description: github-repos-api — Merge business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-pull_number-merge
      path: /repos/{owner}/{repo}/pulls/{pull_number}/merge
      operations:
      - name: mergepullrequest
        method: PUT
        description: GitHub Merge Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-pulls-merge-rest
    port: 8080
    description: REST adapter for github-repos-api — Merge. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/{pull-number}/merge
      name: repos-owner-repo-pulls-pull-number-merge
      description: REST surface for repos-owner-repo-pulls-pull_number-merge.
      operations:
      - method: PUT
        name: mergepullrequest
        description: GitHub Merge Pull Request
        call: repo-pulls-merge.mergepullrequest
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-pulls-merge-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Merge. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-merge-pull-request
      description: GitHub Merge Pull Request
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-pulls-merge.mergepullrequest
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
