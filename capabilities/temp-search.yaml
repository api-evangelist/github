naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Search
  description: 'GitHub Repos API — Search. 1 operations. Lead operation: Search Repositories. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-search
    baseUri: ''
    description: GitHub Repos API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search-repositories
      path: /search/repositories
      operations:
      - name: searchrepositories
        method: GET
        description: Search Repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The query contains one or more search keywords and qualifiers. Qualifiers allow you to limit your search
            to specific areas of GitHub Enterprise Server. The REST
          required: true
        - name: sort
          in: query
          type: string
          description: 'Sorts the results of your query by number of `stars`, `forks`, or `help-wanted-issues` or how recently
            the items were `updated`. Default: [best match](https://d'
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-search-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search/repositories
      name: search-repositories
      description: REST surface for search-repositories.
      operations:
      - method: GET
        name: searchrepositories
        description: Search Repositories
        call: temp-search.searchrepositories
        with:
          q: rest.q
          sort: rest.sort
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-repositories
      description: Search Repositories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-search.searchrepositories
      with:
        q: tools.q
        sort: tools.sort
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
