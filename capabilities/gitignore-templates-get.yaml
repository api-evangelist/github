naftiko: 1.0.0-alpha2
info:
  label: GitHub Gitignore Templates API — Get
  description: 'GitHub Gitignore Templates API — Get. 1 operations. Lead operation: GitHub Get Gitignore Template. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gitignore-templates-get
    baseUri: ''
    description: GitHub Gitignore Templates API — Get business capability. Self-contained, no shared references.
    resources:
    - name: gitignore-templates-name
      path: /gitignore/templates/{name}
      operations:
      - name: getgitignoretemplate
        method: GET
        description: GitHub Get Gitignore Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: gitignore-templates-get-rest
    port: 8080
    description: REST adapter for GitHub Gitignore Templates API — Get. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/gitignore/templates/{name}
      name: gitignore-templates-name
      description: REST surface for gitignore-templates-name.
      operations:
      - method: GET
        name: getgitignoretemplate
        description: GitHub Get Gitignore Template
        call: gitignore-templates-get.getgitignoretemplate
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gitignore-templates-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Gitignore Templates API — Get. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-gitignore-template
      description: GitHub Get Gitignore Template
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitignore-templates-get.getgitignoretemplate
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
