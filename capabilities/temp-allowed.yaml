naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Allowed
  description: 'GitHub Repos API — Allowed. 2 operations. Lead operation: Get Allowed Actions For Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Allowed
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-allowed
    baseUri: ''
    description: GitHub Repos API — Allowed business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-permissions-selected-actions
      path: /repos/{owner}/{repo}/actions/permissions/selected-actions
      operations:
      - name: getallowedactionsforrepository
        method: GET
        description: Get Allowed Actions For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: setallowedactionsforrepository
        method: PUT
        description: Set Allowed Actions For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-allowed-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Allowed. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/permissions/selected-actions
      name: repos-owner-repo-actions-permissions-selected-actions
      description: REST surface for repos-owner-repo-actions-permissions-selected-actions.
      operations:
      - method: GET
        name: getallowedactionsforrepository
        description: Get Allowed Actions For Repository
        call: temp-allowed.getallowedactionsforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setallowedactionsforrepository
        description: Set Allowed Actions For Repository
        call: temp-allowed.setallowedactionsforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-allowed-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Allowed. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-allowed-actions-repository
      description: Get Allowed Actions For Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-allowed.getallowedactionsforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: set-allowed-actions-repository
      description: Set Allowed Actions For Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: temp-allowed.setallowedactionsforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
