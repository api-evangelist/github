naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Label
  description: 'GitHub Repos API — Label. 1 operations. Lead operation: Remove Custom Label From Self-hosted Runner For Repository.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Label
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-label
    baseUri: ''
    description: GitHub Repos API — Label business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-runners-runner_id-labels-name
      path: /repos/{owner}/{repo}/actions/runners/{runner_id}/labels/{name}
      operations:
      - name: removecustomlabelfromselfhostedrunnerforrepository
        method: DELETE
        description: Remove Custom Label From Self-hosted Runner For Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-label-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Label. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/runners/{runner-id}/labels/{name}
      name: repos-owner-repo-actions-runners-runner-id-labels-name
      description: REST surface for repos-owner-repo-actions-runners-runner_id-labels-name.
      operations:
      - method: DELETE
        name: removecustomlabelfromselfhostedrunnerforrepository
        description: Remove Custom Label From Self-hosted Runner For Repository
        call: temp-label.removecustomlabelfromselfhostedrunnerforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-label-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Label. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: remove-custom-label-self-hosted
      description: Remove Custom Label From Self-hosted Runner For Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: temp-label.removecustomlabelfromselfhostedrunnerforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
