naftiko: 1.0.0-alpha2
info:
  label: GitHub Issues API — Timelines
  description: 'GitHub Issues API — Timelines. 1 operations. Lead operation: GitHub List Timeline Events for an Issue. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Timelines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: issues-timelines
    baseUri: ''
    description: GitHub Issues API — Timelines business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-issues-issue_number-timeline
      path: /repos/{owner}/{repo}/issues/{issue_number}/timeline
      operations:
      - name: listtimelineeventsforanissue
        method: GET
        description: GitHub List Timeline Events for an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: issues-timelines-rest
    port: 8080
    description: REST adapter for GitHub Issues API — Timelines. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/issues/{issue-number}/timeline
      name: repos-owner-repo-issues-issue-number-timeline
      description: REST surface for repos-owner-repo-issues-issue_number-timeline.
      operations:
      - method: GET
        name: listtimelineeventsforanissue
        description: GitHub List Timeline Events for an Issue
        call: issues-timelines.listtimelineeventsforanissue
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issues-timelines-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Issues API — Timelines. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-timeline-events-issue
      description: GitHub List Timeline Events for an Issue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issues-timelines.listtimelineeventsforanissue
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
