naftiko: 1.0.0-alpha2
info:
  label: GitHub Application API — Deliveries
  description: 'GitHub Application API — Deliveries. 3 operations. Lead operation: GitHub List Deliveries for an App Webhook.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Deliveries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-deliveries
    baseUri: ''
    description: GitHub Application API — Deliveries business capability. Self-contained, no shared references.
    resources:
    - name: app-hook-deliveries
      path: /app/hook/deliveries
      operations:
      - name: listdeliveriesforanappwebhook
        method: GET
        description: GitHub List Deliveries for an App Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: redelivery
          in: query
          type: boolean
    - name: app-hook-deliveries-delivery_id
      path: /app/hook/deliveries/{delivery_id}
      operations:
      - name: getdeliveryforanappwebhook
        method: GET
        description: GitHub Getdelivery for an App Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-hook-deliveries-delivery_id-attempts
      path: /app/hook/deliveries/{delivery_id}/attempts
      operations:
      - name: redeliverdeliveryforanappwebhook
        method: POST
        description: GitHub Redeliverdelivery for an App Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-deliveries-rest
    port: 8080
    description: REST adapter for GitHub Application API — Deliveries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/hook/deliveries
      name: app-hook-deliveries
      description: REST surface for app-hook-deliveries.
      operations:
      - method: GET
        name: listdeliveriesforanappwebhook
        description: GitHub List Deliveries for an App Webhook
        call: app-deliveries.listdeliveriesforanappwebhook
        with:
          redelivery: rest.redelivery
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/hook/deliveries/{delivery-id}
      name: app-hook-deliveries-delivery-id
      description: REST surface for app-hook-deliveries-delivery_id.
      operations:
      - method: GET
        name: getdeliveryforanappwebhook
        description: GitHub Getdelivery for an App Webhook
        call: app-deliveries.getdeliveryforanappwebhook
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/hook/deliveries/{delivery-id}/attempts
      name: app-hook-deliveries-delivery-id-attempts
      description: REST surface for app-hook-deliveries-delivery_id-attempts.
      operations:
      - method: POST
        name: redeliverdeliveryforanappwebhook
        description: GitHub Redeliverdelivery for an App Webhook
        call: app-deliveries.redeliverdeliveryforanappwebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-deliveries-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Deliveries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-list-deliveries-app-webhook
      description: GitHub List Deliveries for an App Webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-deliveries.listdeliveriesforanappwebhook
      with:
        redelivery: tools.redelivery
      outputParameters:
      - type: object
        mapping: $.
    - name: github-getdelivery-app-webhook
      description: GitHub Getdelivery for an App Webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-deliveries.getdeliveryforanappwebhook
      outputParameters:
      - type: object
        mapping: $.
    - name: github-redeliverdelivery-app-webhook
      description: GitHub Redeliverdelivery for an App Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: app-deliveries.redeliverdeliveryforanappwebhook
      outputParameters:
      - type: object
        mapping: $.
