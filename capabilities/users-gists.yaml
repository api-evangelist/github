naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Gists
  description: 'GitHub User API — Gists. 1 operations. Lead operation: GitHub List Gists for User. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Gists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-gists
    baseUri: ''
    description: GitHub User API — Gists business capability. Self-contained, no shared references.
    resources:
    - name: users-username-gists
      path: /users/{username}/gists
      operations:
      - name: listgistsforuser
        method: GET
        description: GitHub List Gists for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-gists-rest
    port: 8080
    description: REST adapter for GitHub User API — Gists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users/{username}/gists
      name: users-username-gists
      description: REST surface for users-username-gists.
      operations:
      - method: GET
        name: listgistsforuser
        description: GitHub List Gists for User
        call: users-gists.listgistsforuser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-gists-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Gists. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-gists-user
      description: GitHub List Gists for User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-gists.listgistsforuser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
