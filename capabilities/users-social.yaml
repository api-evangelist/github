      path: /user/social_accounts
      operations:
      - name: listsocialaccountsfortheauthenticateduser
        method: GET
        description: GitHub List Social Accounts for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: addsocialaccountsfortheauthenticateduser
        method: POST
        description: GitHub Add Social Accounts for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesocialaccountsfortheauthenticateduser
        method: DELETE
        description: GitHub Delete Social Accounts for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
