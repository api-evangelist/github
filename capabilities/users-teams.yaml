naftiko: 1.0.0-alpha2
info:
  label: GitHub User API — Teams
  description: 'GitHub User API — Teams. 1 operations. Lead operation: GitHub List Teams for the Authenticated User. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-teams
    baseUri: ''
    description: GitHub User API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: user-teams
      path: /user/teams
      operations:
      - name: listteamsfortheauthenticateduser
        method: GET
        description: GitHub List Teams for the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-teams-rest
    port: 8080
    description: REST adapter for GitHub User API — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/teams
      name: user-teams
      description: REST surface for user-teams.
      operations:
      - method: GET
        name: listteamsfortheauthenticateduser
        description: GitHub List Teams for the Authenticated User
        call: users-teams.listteamsfortheauthenticateduser
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub User API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-list-teams-authenticated-user
      description: GitHub List Teams for the Authenticated User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-teams.listteamsfortheauthenticateduser
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
