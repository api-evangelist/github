naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Replace
  description: 'github-repos-api — Replace. 1 operations. Lead operation: GitHub Replace All Repository Topics. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Replace
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-replace
    baseUri: ''
    description: github-repos-api — Replace business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-topics
      path: /repos/{owner}/{repo}/topics
      operations:
      - name: replaceallrepositorytopics
        method: PUT
        description: GitHub Replace All Repository Topics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-replace-rest
    port: 8080
    description: REST adapter for github-repos-api — Replace. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/topics
      name: repos-owner-repo-topics
      description: REST surface for repos-owner-repo-topics.
      operations:
      - method: PUT
        name: replaceallrepositorytopics
        description: GitHub Replace All Repository Topics
        call: repo-tags-replace.replaceallrepositorytopics
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-replace-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Replace. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-replace-all-repository-topics
      description: GitHub Replace All Repository Topics
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-tags-replace.replaceallrepositorytopics
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
