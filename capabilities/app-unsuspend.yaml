naftiko: 1.0.0-alpha2
info:
  label: GitHub Application API — Unsuspend
  description: 'GitHub Application API — Unsuspend. 1 operations. Lead operation: GitHub Unsuspend an App Installation. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Unsuspend
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-unsuspend
    baseUri: ''
    description: GitHub Application API — Unsuspend business capability. Self-contained, no shared references.
    resources:
    - name: app-installations-installation_id-suspended
      path: /app/installations/{installation_id}/suspended
      operations:
      - name: unsuspendanappinstallation
        method: DELETE
        description: GitHub Unsuspend an App Installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-unsuspend-rest
    port: 8080
    description: REST adapter for GitHub Application API — Unsuspend. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/installations/{installation-id}/suspended
      name: app-installations-installation-id-suspended
      description: REST surface for app-installations-installation_id-suspended.
      operations:
      - method: DELETE
        name: unsuspendanappinstallation
        description: GitHub Unsuspend an App Installation
        call: app-unsuspend.unsuspendanappinstallation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-unsuspend-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Application API — Unsuspend. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-unsuspend-app-installation
      description: GitHub Unsuspend an App Installation
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: app-unsuspend.unsuspendanappinstallation
      outputParameters:
      - type: object
        mapping: $.
