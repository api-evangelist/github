naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Hourly
  description: 'github-repos-api — Hourly. 1 operations. Lead operation: GitHub Get the Hourly Commit Count for Each Day.
    Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Hourly
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-hourly
    baseUri: ''
    description: github-repos-api — Hourly business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-stats-punch_card
      path: /repos/{owner}/{repo}/stats/punch_card
      operations:
      - name: getthehourlycommitcountforeachday
        method: GET
        description: GitHub Get the Hourly Commit Count for Each Day
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-hourly-rest
    port: 8080
    description: REST adapter for github-repos-api — Hourly. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/stats/punch-card
      name: repos-owner-repo-stats-punch-card
      description: REST surface for repos-owner-repo-stats-punch_card.
      operations:
      - method: GET
        name: getthehourlycommitcountforeachday
        description: GitHub Get the Hourly Commit Count for Each Day
        call: repo-tags-hourly.getthehourlycommitcountforeachday
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-hourly-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Hourly. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-hourly-commit-count
      description: GitHub Get the Hourly Commit Count for Each Day
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-hourly.getthehourlycommitcountforeachday
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
