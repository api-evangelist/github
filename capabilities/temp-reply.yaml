naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Reply
  description: 'GitHub Repos API — Reply. 1 operations. Lead operation: Create Reply For Review Comment. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Reply
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-reply
    baseUri: ''
    description: GitHub Repos API — Reply business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-pulls-pull_number-comments-comment_id-replies
      path: /repos/{owner}/{repo}/pulls/{pull_number}/comments/{comment_id}/replies
      operations:
      - name: createreplyforreviewcomment
        method: POST
        description: Create Reply For Review Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-reply-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Reply. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/pulls/{pull-number}/comments/{comment-id}/replies
      name: repos-owner-repo-pulls-pull-number-comments-comment-id-replies
      description: REST surface for repos-owner-repo-pulls-pull_number-comments-comment_id-replies.
      operations:
      - method: POST
        name: createreplyforreviewcomment
        description: Create Reply For Review Comment
        call: temp-reply.createreplyforreviewcomment
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-reply-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Reply. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-reply-review-comment
      description: Create Reply For Review Comment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-reply.createreplyforreviewcomment
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
