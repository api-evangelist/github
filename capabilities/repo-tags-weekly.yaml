naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Weekly
  description: 'github-repos-api — Weekly. 2 operations. Lead operation: GitHub Get the Weekly Commit Activity. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Weekly
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-weekly
    baseUri: ''
    description: github-repos-api — Weekly business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-stats-code_frequency
      path: /repos/{owner}/{repo}/stats/code_frequency
      operations:
      - name: gettheweeklycommitactivity
        method: GET
        description: GitHub Get the Weekly Commit Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    - name: repos-owner-repo-stats-participation
      path: /repos/{owner}/{repo}/stats/participation
      operations:
      - name: gettheweeklycommitcount
        method: GET
        description: GitHub Get the Weekly Commit Count
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-weekly-rest
    port: 8080
    description: REST adapter for github-repos-api — Weekly. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/stats/code-frequency
      name: repos-owner-repo-stats-code-frequency
      description: REST surface for repos-owner-repo-stats-code_frequency.
      operations:
      - method: GET
        name: gettheweeklycommitactivity
        description: GitHub Get the Weekly Commit Activity
        call: repo-tags-weekly.gettheweeklycommitactivity
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos/{owner}/{repo}/stats/participation
      name: repos-owner-repo-stats-participation
      description: REST surface for repos-owner-repo-stats-participation.
      operations:
      - method: GET
        name: gettheweeklycommitcount
        description: GitHub Get the Weekly Commit Count
        call: repo-tags-weekly.gettheweeklycommitcount
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-weekly-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Weekly. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-get-weekly-commit-activity
      description: GitHub Get the Weekly Commit Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-weekly.gettheweeklycommitactivity
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-get-weekly-commit-count
      description: GitHub Get the Weekly Commit Count
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-weekly.gettheweeklycommitcount
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
