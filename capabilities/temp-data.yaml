naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Data
  description: 'GitHub Repos API — Data. 1 operations. Lead operation: Upload An Analysis As Sarif Data. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-data
    baseUri: ''
    description: GitHub Repos API — Data business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-code-scanning-sarifs
      path: /repos/{owner}/{repo}/code-scanning/sarifs
      operations:
      - name: uploadananalysisassarifdata
        method: POST
        description: Upload An Analysis As Sarif Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-data-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Data. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/code-scanning/sarifs
      name: repos-owner-repo-code-scanning-sarifs
      description: REST surface for repos-owner-repo-code-scanning-sarifs.
      operations:
      - method: POST
        name: uploadananalysisassarifdata
        description: Upload An Analysis As Sarif Data
        call: temp-data.uploadananalysisassarifdata
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Data. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: upload-analysis-sarif-data
      description: Upload An Analysis As Sarif Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: temp-data.uploadananalysisassarifdata
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
