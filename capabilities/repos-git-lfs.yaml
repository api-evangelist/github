naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Git LFS
  description: 'github-repos-api — Git LFS. 2 operations. Lead operation: GitHub Enable Git Lfs for Repository. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Git LFS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repos-git-lfs
    baseUri: http://localhost:8080/rest/github-repos-api/1.1.4
    description: github-repos-api — Git LFS business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-lfs
      path: /repos/{owner}/{repo}/lfs
      operations:
      - name: enablegitlfsforrepository
        method: PUT
        description: GitHub Enable Git Lfs for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
      - name: disablegitlfsforrepository
        method: DELETE
        description: GitHub Disable Git Lfs for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repos-git-lfs-rest
    port: 8080
    description: REST adapter for github-repos-api — Git LFS. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/lfs
      name: repos-owner-repo-lfs
      description: REST surface for repos-owner-repo-lfs.
      operations:
      - method: PUT
        name: enablegitlfsforrepository
        description: GitHub Enable Git Lfs for Repository
        call: repos-git-lfs.enablegitlfsforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: disablegitlfsforrepository
        description: GitHub Disable Git Lfs for Repository
        call: repos-git-lfs.disablegitlfsforrepository
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repos-git-lfs-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Git LFS. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-enable-git-lfs-repository
      description: GitHub Enable Git Lfs for Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repos-git-lfs.enablegitlfsforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: github-disable-git-lfs-repository
      description: GitHub Disable Git Lfs for Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repos-git-lfs.disablegitlfsforrepository
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
