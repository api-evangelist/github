naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Delete
  description: 'github-repos-api — Delete. 1 operations. Lead operation: GitHub Delete Repository Subscription. Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-subscription-delete
    baseUri: ''
    description: github-repos-api — Delete business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-subscription
      path: /repos/{owner}/{repo}/subscription
      operations:
      - name: deleterepositorysubscription
        method: DELETE
        description: GitHub Delete Repository Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-subscription-delete-rest
    port: 8080
    description: REST adapter for github-repos-api — Delete. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/subscription
      name: repos-owner-repo-subscription
      description: REST surface for repos-owner-repo-subscription.
      operations:
      - method: DELETE
        name: deleterepositorysubscription
        description: GitHub Delete Repository Subscription
        call: repo-subscription-delete.deleterepositorysubscription
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-subscription-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Delete. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-delete-repository-subscription
      description: GitHub Delete Repository Subscription
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repo-subscription-delete.deleterepositorysubscription
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
