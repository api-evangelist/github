naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Watchers
  description: 'github-repos-api — Watchers. 1 operations. Lead operation: GitHub List Watchers. Self-contained Naftiko capability
    covering one Github business surface.'
  tags:
  - Github
  - Watchers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-tags-watchers
    baseUri: ''
    description: github-repos-api — Watchers business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-subscribers
      path: /repos/{owner}/{repo}/subscribers
      operations:
      - name: listwatchers
        method: GET
        description: GitHub List Watchers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-tags-watchers-rest
    port: 8080
    description: REST adapter for github-repos-api — Watchers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/subscribers
      name: repos-owner-repo-subscribers
      description: REST surface for repos-owner-repo-subscribers.
      operations:
      - method: GET
        name: listwatchers
        description: GitHub List Watchers
        call: repo-tags-watchers.listwatchers
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-tags-watchers-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Watchers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: github-list-watchers
      description: GitHub List Watchers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-tags-watchers.listwatchers
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
