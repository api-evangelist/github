naftiko: 1.0.0-alpha2
info:
  label: GitHub Repos API — Repos
  description: 'GitHub Repos API — Repos. 1 operations. Lead operation: Download Repository Archive (zip). Self-contained
    Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - Repos
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: temp-repos
    baseUri: ''
    description: GitHub Repos API — Repos business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-zipball-ref
      path: /repos/{owner}/{repo}/zipball/{ref}
      operations:
      - name: downloadrepositoryarchivezip
        method: GET
        description: Download Repository Archive (zip)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ref
          in: path
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: temp-repos-rest
    port: 8080
    description: REST adapter for GitHub Repos API — Repos. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/zipball/{ref}
      name: repos-owner-repo-zipball-ref
      description: REST surface for repos-owner-repo-zipball-ref.
      operations:
      - method: GET
        name: downloadrepositoryarchivezip
        description: Download Repository Archive (zip)
        call: temp-repos.downloadrepositoryarchivezip
        with:
          ref: rest.ref
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temp-repos-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitHub Repos API — Repos. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: download-repository-archive-zip
      description: Download Repository Archive (zip)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temp-repos.downloadrepositoryarchivezip
      with:
        ref: tools.ref
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
