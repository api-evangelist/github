naftiko: 1.0.0-alpha2
info:
  label: github-repo-actions-api — History
  description: 'github-repo-actions-api — History. 1 operations. Lead operation: GitHub Get the Review History for Workflow
    Run. Self-contained Naftiko capability covering one Github business surface.'
  tags:
  - Github
  - History
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-actions-history
    baseUri: ''
    description: github-repo-actions-api — History business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-actions-runs-run_id-approvals
      path: /repos/{owner}/{repo}/actions/runs/{run_id}/approvals
      operations:
      - name: getthereviewhistoryforworkflowrun
        method: GET
        description: GitHub Get the Review History for Workflow Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-actions-history-rest
    port: 8080
    description: REST adapter for github-repo-actions-api — History. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/actions/runs/{run-id}/approvals
      name: repos-owner-repo-actions-runs-run-id-approvals
      description: REST surface for repos-owner-repo-actions-runs-run_id-approvals.
      operations:
      - method: GET
        name: getthereviewhistoryforworkflowrun
        description: GitHub Get the Review History for Workflow Run
        call: repo-actions-history.getthereviewhistoryforworkflowrun
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-actions-history-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repo-actions-api — History. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: github-get-review-history-workflow
      description: GitHub Get the Review History for Workflow Run
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repo-actions-history.getthereviewhistoryforworkflowrun
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
