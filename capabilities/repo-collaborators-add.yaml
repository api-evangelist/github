naftiko: 1.0.0-alpha2
info:
  label: github-repos-api — Add
  description: 'github-repos-api — Add. 1 operations. Lead operation: GitHub Add Repository Collaborator. Self-contained Naftiko
    capability covering one Github business surface.'
  tags:
  - Github
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: repo-collaborators-add
    baseUri: ''
    description: github-repos-api — Add business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-collaborators-username
      path: /repos/{owner}/{repo}/collaborators/{username}
      operations:
      - name: addrepositorycollaborator
        method: PUT
        description: GitHub Add Repository Collaborator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-GitHub-Api-Version
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GITHUB_API_KEY}}'
  exposes:
  - type: rest
    namespace: repo-collaborators-add-rest
    port: 8080
    description: REST adapter for github-repos-api — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/collaborators/{username}
      name: repos-owner-repo-collaborators-username
      description: REST surface for repos-owner-repo-collaborators-username.
      operations:
      - method: PUT
        name: addrepositorycollaborator
        description: GitHub Add Repository Collaborator
        call: repo-collaborators-add.addrepositorycollaborator
        with:
          Authorization: rest.Authorization
          X-GitHub-Api-Version: rest.X-GitHub-Api-Version
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repo-collaborators-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for github-repos-api — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: github-add-repository-collaborator
      description: GitHub Add Repository Collaborator
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repo-collaborators-add.addrepositorycollaborator
      with:
        Authorization: tools.Authorization
        X-GitHub-Api-Version: tools.X-GitHub-Api-Version
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
