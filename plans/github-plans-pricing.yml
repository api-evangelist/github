specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: GitHub
providerId: github
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - DevOps
  - Source Control
  - CI/CD
  - API Management
description: GitHub plans aligned to product tiers (Free, Team, Enterprise). REST and GraphQL API access
  is included with all plans; rate limits scale with plan/auth context.
sources:
  - https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api
  - https://github.com/pricing
plans:
  - id: github-free
    name: Free
    type: freemium
    description: Free tier for individuals and small teams. Includes REST and GraphQL API access.
    entries:
      - label: Authenticated REST API requests
        name: rest_authenticated
        type: rate
        metric: requests
        limit: 5000
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Unauthenticated REST API requests
        name: rest_unauthenticated
        type: rate
        metric: requests
        limit: 60
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: GitHub Actions minutes
        name: actions_minutes
        type: quota
        metric: minutes
        limit: 2000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Packages storage
        name: packages_storage
        type: quota
        metric: GB
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Unlimited public/private repos
      - name: REST API
      - name: GraphQL API
      - name: GitHub Actions
      - name: GitHub Packages
      - name: Community support
  - id: github-team
    name: Team
    type: paid
    description: $4/user/month. Adds protected branches, code owners, draft PRs, required reviewers.
    entries:
      - label: Per user
        name: seat
        type: subscription
        metric: user
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '4.00'
        userMultiplied: true
      - label: Authenticated REST API requests
        name: rest_authenticated
        type: rate
        metric: requests
        limit: 5000
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: GitHub Actions minutes
        name: actions_minutes
        type: quota
        metric: minutes
        limit: 3000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Packages storage
        name: packages_storage
        type: quota
        metric: GB
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Protected branches
      - name: Code owners
      - name: Required reviewers
      - name: Draft pull requests
      - name: GitHub Pages
      - name: Web-based support
  - id: github-enterprise-cloud
    name: Enterprise Cloud
    type: enterprise
    description: $21/user/month. SAML SSO, audit logs, advanced auditing, higher API limits.
    entries:
      - label: Per user
        name: seat
        type: subscription
        metric: user
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '21.00'
        userMultiplied: true
      - label: Authenticated REST API requests (App)
        name: rest_app
        type: rate
        metric: requests
        limit: 15000
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: GitHub Actions minutes
        name: actions_minutes
        type: quota
        metric: minutes
        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Packages storage
        name: packages_storage
        type: quota
        metric: GB
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: SAML SSO
      - name: User provisioning (SCIM)
      - name: Audit log API
      - name: Advanced auditing
      - name: GitHub Connect
      - name: Premium support
      - name: Higher API rate limits (15,000/hr for Apps)
