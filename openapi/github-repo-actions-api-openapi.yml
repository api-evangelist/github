        - created_at
        - last_accessed_at
        - size_in_bytes
        default: last_accessed_at
    actions-cache-key-required:
      name: key
      description: key for identifying the cache.
      in: query
      required: true
      schema:
        type: string
    cache-id:
      name: cache_id
      description: The unique identifier of the GitHub Actions cache.
      in: path
      required: true
      schema:
        type: integer
    job-id:
      name: job_id
      description: The unique identifier of the job.
      in: path
      required: true
      schema:
        type: integer
    actor:
      name: actor
      description: |-
        Returns someone's workflow runs. Use the login for the user who created the `push` associated with the check suite or workflow run.
      in: query
      required: false
      schema:
        type: string
    workflow-run-branch:
      name: branch
      description: |-
        Returns workflow runs associated with a branch. Use the name of the branch of the `push`.
      in: query
      required: false
      schema:
        type: string
    event:
      name: event
      description: |-
        Returns workflow run triggered by the event you specify. For example, `push`, `pull_request` or `issue`. For more information, see "[Events that trigger workflows](https://docs.github.com/enterprise-server@3.9/actions/automating-your-workflow-with-github-actions/events-that-trigger-workflows)."
      in: query
      required: false
      schema:
        type: string
    workflow-run-status:
      name: status
      description: |-
        Returns workflow runs with the check run `status` or `conclusion` that you specify. For example, a conclusion can be `success` or a status can be `in_progress`. Only GitHub Actions can set a status of `waiting`, `pending`, or `requested`.
      in: query
      required: false
      schema:
        type: string
        enum:
        - completed
        - action_required
        - cancelled
        - failure
        - neutral
        - skipped
        - stale
        - success
        - timed_out
        - in_progress
        - queued
        - requested
        - waiting
        - pending
    created:
      name: created
      description: |-
        Returns workflow runs created within the given date-time range. For more information on the syntax, see "[Understanding the search syntax](https://docs.github.com/enterprise-server@3.9/search-github/getting-started-with-searching-on-github/understanding-the-search-syntax#query-for-dates)."
      in: query
      required: false
      schema:
        type: string
        format: date-time
    exclude-pull-requests:
      name: exclude_pull_requests
      description: If `true` pull requests are omitted from the response (empty array).
      in: query
      required: false
      schema:
        type: boolean
        default: false
    workflow-run-check-suite-id:
      name: check_suite_id
      description: Returns workflow runs with the `check_suite_id` that you specify.
      in: query
      schema:
        type: integer
    workflow-run-head-sha:
      name: head_sha
      description: |-
        Only returns workflow runs that are associated with the specified `head_sha`.
      in: query
      required: false
      schema:
        type: string
    run-id:
      name: run_id
      description: The unique identifier of the workflow run.
      in: path
      required: true
      schema:
        type: integer
    attempt-number:
      name: attempt_number
      description: The attempt number of the workflow run.
      in: path
      required: true
      schema:
        type: integer
    workflow-id:
      name: workflow_id
      in: path
      description: |-
        The ID of the workflow. You can also pass the workflow file name as a string.
      required: true
      schema:
        oneOf:
        - type: integer
        - type: string
