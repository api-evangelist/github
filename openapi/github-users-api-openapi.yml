      description: The account owner of the repository. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    repo:
      name: repo
      description: >-
        The name of the repository without the `.git` extension. The name is not
        case sensitive.
      in: path
      required: true
      schema:
        type: string
    branch:
      name: branch
      description: >-
        The name of the branch. Cannot contain wildcard characters. To use
        wildcard characters in branch names, use [the GraphQL
        API](https://docs.github.com/enterprise-server@3.9/graphql).
      in: path
      required: true
      schema:
        type: string
      x-multi-segment: true
    order:
      name: order
      description: >-
        Determines whether the first search result returned is the highest
        number of matches (`desc`) or lowest number of matches (`asc`). This
        parameter is ignored unless you provide `sort`.
      in: query
      required: false
      schema:
        type: string
        enum:
        - desc
        - asc
        default: desc
    per-page:
      name: per_page
      description: >-
        The number of results per page (max 100). For more information, see
        "[Using pagination in the REST
