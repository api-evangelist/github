  /user/repository_invitations/{invitation_id}:
    patch:
      summary: GitHub Accept Repository Invitation
      description: >-
        This API operation allows an authenticated user to accept a pending
        repository invitation by sending a PATCH request to the
        `/user/repository_invitations/{invitation_id}` endpoint, where
        `{invitation_id}` is the unique identifier of the invitation to be
        accepted. When invoked, it processes the invitation and grants the user
        access to the specified repository with the permissions defined in the
        invitation. This is commonly used when a repository owner or
        administrator has invited a user to collaborate on a private repository,
        and the user needs to programmatically accept the invitation rather than
        doing so through the GitHub web interface. Upon successful execution,
        the user becomes a collaborator on the repository and can perform
        actions according to their assigned access level.
