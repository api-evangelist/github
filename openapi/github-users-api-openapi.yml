  /user/repos:
    get:
      summary: GitHub List Repositories for the Authenticated User
      description: >-
        Lists repositories that the authenticated user has explicit permission
        (`:read`, `:write`, or `:admin`) to access.


        The authenticated user has explicit permission to access repositories
        they own, repositories where they are a collaborator, and repositories
        that they can access through an organization membership.
      tags:
      - Authenticated
      - Lists
      - Repositories
      - Users
      operationId: listRepositoriesForTheAuthenticatedUser
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/enterprise-server@3.9/rest/repos/repos#list-repositories-for-the-authenticated-user
      parameters:
      - name: visibility
        description: Limit results to repositories with the specified visibility.
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - public
          - private
          default: all
        example: all
      - name: affiliation
        description: |-
          Comma-separated list of values. Can include:  
           * `owner`: Repositories that are owned by the authenticated user.  
           * `collaborator`: Repositories that the user has been added to as a collaborator.  
           * `organization_member`: Repositories that the user has access to through being a member of an organization. This includes every repository on every team that the user is on.
        in: query
        required: false
        schema:
          type: string
          default: owner,collaborator,organization_member
        example: example_value
      - name: type
        description: >-
          Limit results to repositories of the specified type. Will cause a
          `422` error if used in the same request as **visibility** or
          **affiliation**.
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - owner
          - public
          - private
          - member
          default: all
        example: all
      - name: sort
        description: The property to sort the results by.
        in: query
        required: false
        schema:
          type: string
          enum:
          - created
          - updated
          - pushed
          - full_name
          default: full_name
        example: created
      - name: direction
        description: >-
          The order to sort by. Default: `asc` when using `full_name`,
          otherwise `desc`.
        in: query
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
        example: asc
