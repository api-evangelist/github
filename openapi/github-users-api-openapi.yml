    post:
      summary: GitHub Start User Migration
      description: >-
        Initiates the process of migrating a user's repositories and associated
        data from GitHub. This endpoint creates a new migration archive that
        includes the user's selected repositories, issues, pull requests, and
        other metadata. The migration must be authenticated with the user's
        credentials and requires proper OAuth scopes or personal access token
        permissions. Once started, the migration runs asynchronously and returns
        a migration ID that can be used to check the status and download the
        resulting archive. This operation is typically used when moving
        repositories between GitHub instances or exporting data for backup
        purposes, and the resulting archive can be imported into another GitHub
        account or GitHub Enterprise instance.
      tags:
      - Migrations
      - Start
      - Users
      operationId: startUserMigration
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/enterprise-server@3.9/rest/migrations/users#start-a-user-migration
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        example: example_value
      - in: header
        name: X-GitHub-Api-Version
        schema:
          type: string
          default: '2022-11-28'
        example: example_value
      - in: header
        name: Accept
        schema:
          type: string
          default: application/vnd.github+json
        example: example_value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                lock_repositories:
                  description: >-
                    Lock the repositories being migrated at the start of the
                    migration
                  example: true
                  readOnly: false
                  type: boolean
                exclude_metadata:
                  description: >-
                    Indicates whether metadata should be excluded and only git
                    source should be included for the migration.
                  example: true
                  readOnly: false
                  type: boolean
                exclude_git_data:
                  description: >-
                    Indicates whether the repository git data should be excluded
                    from the migration.
                  example: true
                  readOnly: false
                  type: boolean
                exclude_attachments:
                  description: Do not include attachments in the migration
                  example: true
                  readOnly: false
                  type: boolean
                exclude_releases:
                  description: Do not include releases in the migration
                  example: true
                  readOnly: false
                  type: boolean
                exclude_owner_projects:
                  description: >-
                    Indicates whether projects owned by the organization or
                    users should be excluded.
                  example: true
                  readOnly: false
                  type: boolean
                org_metadata_only:
                  type: boolean
                  example: true
                  description: >-
                    Indicates whether this should only include organization
                    metadata (repositories array should be empty and will ignore
                    other flags).
                  default: false
                exclude:
                  description: >-
                    Exclude attributes from the API response to improve
                    performance
                  example:
                  - repositories
                  readOnly: false
                  type: array
                  items:
                    description: Allowed values that can be passed to the exclude param.
                    enum:
                    - repositories
                    example: repositories
                    type: string
                repositories:
                  type: array
                  items:
                    description: Repository path, owner and name
                    example: acme/widgets
                    type: string
              required:
              - repositories
              type: object
            examples:
              default:
                value:
                  repositories:
                  - octocat/Hello-World
                  lock_repositories: true
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/migration'
              examples:
                default:
                  $ref: '#/components/examples/migration-2'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '422':
          $ref: '#/components/responses/validation_failed'
