        subcategory: invitations
      security:
      - bearerHttpAuthentication: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      summary: GitHub Decline Repository Invitation
      description: >-
        This API operation allows an authenticated GitHub user to decline a
        pending repository invitation by providing the invitation ID as a path
        parameter. When invoked with a DELETE request to the endpoint, it
        removes the specified invitation from the user's pending invitations
        list, effectively rejecting the request to become a collaborator on the
        repository. The operation requires authentication and the invitation ID
        must correspond to a valid pending invitation for the authenticated
        user.
