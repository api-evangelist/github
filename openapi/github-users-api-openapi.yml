      description: The unique identifier of the installation.
      in: path
      required: true
      schema:
        type: integer
      examples:
        default:
          value: 1
    repository-id:
      name: repository_id
      description: The unique identifier of the repository.
      in: path
      required: true
      schema:
        type: integer
    labels:
      name: labels
      description: 'A list of comma separated label names. Example: `bug,ui,@high`'
      in: query
      required: false
      schema:
        type: string
