        - login
        - organizations_url
        - received_events_url
        - repos_url
        - site_admin
        - starred_url
        - subscriptions_url
        - type
        - url
    basic-error:
      title: Basic Error
      description: Basic Error
      type: object
      properties:
        message:
          type: string
        documentation_url:
          type: string
        url:
          type: string
        status:
          type: string
    scim-error:
      title: Scim Error
      description: Scim Error
      type: object
      properties:
        message:
          type: string
        documentation_url:
          type: string
        detail:
          type: string
        status:
          type: integer
        scimType:
          type: string
        schemas:
          type: array
          items:
            type: string
    code-scanning-analysis-tool-name:
      type: string
      description: The name of the tool used to generate the code scanning analysis.
    code-scanning-analysis-tool-guid:
      type: string
      description: |-
        The GUID of the tool used to generate the code scanning analysis, if provided in the uploaded SARIF data.
    code-scanning-alert-state-query:
      type: string
      description: State of a code scanning alert.
      enum:
        - open
        - closed
        - dismissed
        - fixed
    alert-number:
      type: integer
      description: The security alert number.
      readOnly: true
    alert-created-at:
      type: string
      description: |-
        The time that the alert was created in ISO 8601 format: `YYYY-MM-DDTHH:MM:SSZ`.
      format: date-time
      readOnly: true
    alert-updated-at:
      type: string
      description: |-
        The time that the alert was last updated in ISO 8601 format: `YYYY-MM-DDTHH:MM:SSZ`.
      format: date-time
      readOnly: true
    alert-url:
      type: string
      description: The REST API URL of the alert resource.
      format: uri
      readOnly: true
    alert-html-url:
      type: string
      description: The GitHub URL of the alert resource.
      format: uri
      readOnly: true
    alert-instances-url:
      type: string
      description: The REST API URL for fetching the list of instances for an alert.
      format: uri
      readOnly: true
    code-scanning-alert-state:
      type: string
      description: State of a code scanning alert.
      enum:
        - open
        - dismissed
        - fixed
    alert-fixed-at:
      type: string
      description: |-
        The time that the alert was no longer detected and was considered fixed in ISO 8601 format: `YYYY-MM-DDTHH:MM:SSZ`.
      format: date-time
      readOnly: true
    alert-dismissed-at:
      type: string
      description: |-
        The time that the alert was dismissed in ISO 8601 format: `YYYY-MM-DDTHH:MM:SSZ`.
      format: date-time
      readOnly: true
    code-scanning-alert-dismissed-reason:
      type: string
      description: |-
        **Required when the state is dismissed.** The reason for dismissing or closing the alert.
      enum:
        - false positive
        - won't fix
        - used in tests
    code-scanning-alert-dismissed-comment:
      type: string
      description: The dismissal comment associated with the dismissal of the alert.
      maxLength: 280
    code-scanning-alert-rule-summary:
      type: object
      properties:
        id:
          type: string
          description: unique identifier for the rule used to detect the alert.
        name:
          type: string
          description: The name of the rule used to detect the alert.
        tags:
          type: array
          description: set of tags applicable for the rule.
          items:
            type: string
        severity:
          type: string
          description: The severity of the alert.
          enum:
            - none
            - note
            - warning
            - error
        security_severity_level:
          type: string
          description: The security severity of the alert.
          enum:
            - low
            - medium
            - high
            - critical
        description:
          type: string
          description: short description of the rule used to detect the alert.
    code-scanning-analysis-tool-version:
      type: string
      description: The version of the tool used to generate the code scanning analysis.
    code-scanning-analysis-tool:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/code-scanning-analysis-tool-name'
        version:
          $ref: '#/components/schemas/code-scanning-analysis-tool-version'
        guid:
          $ref: '#/components/schemas/code-scanning-analysis-tool-guid'
    code-scanning-ref:
      type: string
      description: |-
        The Git reference, formatted as `refs/pull/<number>/merge`, `refs/pull/<number>/head`,
        `refs/heads/<branch name>` or simply `<branch name>`.
    code-scanning-analysis-analysis-key:
      type: string
      description: |-
        Identifies the configuration under which the analysis was executed. For example, in GitHub Actions this includes the workflow filename and job name.
    code-scanning-alert-environment:
      type: string
      description: |-
        Identifies the variable values associated with the environment in which the analysis that generated this alert instance was performed, such as the language that was analyzed.
    code-scanning-analysis-category:
      type: string
      description: |-
        Identifies the configuration under which the analysis was executed. Used to distinguish between multiple analyses for the same tool and commit, but performed on different languages or different parts of the code.
