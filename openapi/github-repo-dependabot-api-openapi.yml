          example: hBT5WZEj8ZoOv6TYJsfWq7MxTEQopZO5/IT3ZCVQPzs=
      required:
        - key_id
        - key
    dependabot-alert:
      type: object
      description: Dependabot alert.
      properties:
        number:
          $ref: '#/components/schemas/alert-number'
        state:
          type: string
          description: The state of the Dependabot alert.
          readOnly: true
          enum:
            - auto_dismissed
            - dismissed
            - fixed
            - open
        dependency:
          type: object
          description: Details for the vulnerable dependency.
          readOnly: true
          properties:
            package:
              $ref: '#/components/schemas/dependabot-alert-package'
            manifest_path:
              type: string
              description: |-
                The full path to the dependency manifest file, relative to the root of the repository.
              readOnly: true
            scope:
              type: string
              description: The execution scope of the vulnerable dependency.
              readOnly: true
              enum:
                - development
                - runtime
        security_advisory:
          $ref: '#/components/schemas/dependabot-alert-security-advisory'
        security_vulnerability:
          $ref: '#/components/schemas/dependabot-alert-security-vulnerability'
        url:
