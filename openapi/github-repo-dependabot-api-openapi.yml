      name: after
      description: |-
        cursor, as given in the [Link header](https://docs.github.com/enterprise-server@3.9/rest/guides/using-pagination-in-the-rest-api#using-link-headers). If specified, the query only searches for results after this cursor. For more information, see "[Using pagination in the REST API](https://docs.github.com/enterprise-server@3.9/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      required: false
      schema:
        type: string
    dependabot-alert-comma-separated-states:
      name: state
      in: query
      description: |-
        comma-separated list of states. If specified, only alerts with these states will be returned.

        Can be: `auto_dismissed`, `dismissed`, `fixed`, `open`
      schema:
        type: string
    dependabot-alert-comma-separated-severities:
      name: severity
      in: query
      description: |-
        comma-separated list of severities. If specified, only alerts with these severities will be returned.

        Can be: `low`, `medium`, `high`, `critical`
      schema:
        type: string
    dependabot-alert-comma-separated-ecosystems:
      name: ecosystem
      in: query
      description: |-
        comma-separated list of ecosystems. If specified, only alerts for these ecosystems will be returned.

        Can be: `composer`, `go`, `maven`, `npm`, `nuget`, `pip`, `pub`, `rubygems`, `rust`
      schema:
        type: string
    dependabot-alert-comma-separated-packages:
      name: package
      in: query
      description: |-
        comma-separated list of package names. If specified, only alerts for these packages will be returned.
      schema:
        type: string
    dependabot-alert-scope:
      name: scope
      in: query
      description: |-
        The scope of the vulnerable dependency. If specified, only alerts with this scope will be returned.
      schema:
        type: string
        enum:
          - development
          - runtime
    dependabot-alert-sort:
      name: sort
      in: query
      description: |-
        The property by which to sort the results.
        `created` means when the alert was created.
        `updated` means when the alert's state last changed.
      schema:
        type: string
        enum:
          - created
          - updated
        default: created
    pagination-first:
      name: first
      description: |-
        **Deprecated**. The number of results per page (max 100), starting from the first matching result.
        This parameter must not be used in combination with `last`.
        Instead, use `per_page` in combination with `after` to fetch the first page of results.
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    pagination-last:
      name: last
      description: |-
        **Deprecated**. The number of results per page (max 100), starting from the last matching result.
        This parameter must not be used in combination with `first`.
        Instead, use `per_page` in combination with `before` to fetch the last page of results.
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    owner:
      name: owner
      description: The account owner of the repository. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    repo:
      name: repo
      description: |-
        The name of the repository without the `.git` extension. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    secret-name:
      name: secret_name
      description: The name of the secret.
      in: path
      required: true
      schema:
        type: string
    dependabot-alert-comma-separated-manifests:
      name: manifest
      in: query
      description: |-
        comma-separated list of full manifest paths. If specified, only alerts for these manifests will be returned.
      schema:
        type: string
    dependabot-alert-number:
      name: alert_number
      in: path
      description: |-
        The number that identifies a Dependabot alert in its repository.
        You can find this at the end of the URL for a Dependabot alert within GitHub,
        or in `number` fields in the response from the
        `GET /repos/{owner}/{repo}/dependabot/alerts` operation.
      required: true
      schema:
        $ref: '#/components/schemas/alert-number'
  headers:
    link:
      example: |-
        <https://api.github.com/resource?page=2>; rel="next", <https://api.github.com/resource?page=5>; rel="last"
      schema:
        type: string
  responses:
    not_found:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    validation_failed_simple:
      description: Validation failed, or the endpoint has been spammed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/validation-error-simple'
    bad_request:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
        application/scim+json:
          schema:
            $ref: '#/components/schemas/scim-error'
    not_modified:
      description: Not modified
    forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
  securitySchemes:
    bearerHttpAuthentication:
      description: Bearer Token
      type: http
      scheme: Bearer
