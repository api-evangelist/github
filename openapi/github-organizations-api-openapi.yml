                  items:
                    type: string
              required:
              - visibility
            examples:
              default:
                value:
                  encrypted_value: c2VjcmV0
                  key_id: 012345678912345678
                  visibility: selected
                  selected_repository_ids:
                  - '1296269'
                  - '1296280'
