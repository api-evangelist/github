        updated_at:
          $ref: '#/components/schemas/alert-updated-at'
        dismissed_at:
          $ref: '#/components/schemas/alert-dismissed-at_3'
        dismissed_by:
          $ref: '#/components/schemas/nullable-simple-user_3'
        dismissed_reason:
          type: string
          description: The reason that the alert was dismissed.
          enum:
          - fix_started
          - inaccurate
          - no_bandwidth
          - not_used
          - tolerable_risk
          example: fix_started
        dismissed_comment:
          type: string
          description: An optional comment associated with the alert's dismissal.
          maxLength: 280
          example: example_value
        fixed_at:
          $ref: '#/components/schemas/alert-fixed-at_3'
        auto_dismissed_at:
          $ref: '#/components/schemas/alert-auto-dismissed-at_2'
