          type: string
          format: date-time
          example: '2018-05-04T01:14:52Z'
          
        completed_at:
          type: string
          format: date-time
          example: '2018-05-04T01:14:52Z'
          
        output:
          type: object
          properties:
            title:
              type: string
              
            summary:
              type: string
              
            text:
              type: string
              
