    release-notes-content:
      title: Generated Release Notes Content
      description: Generated name and body describing a release
      type: object
      properties:
        name:
          description: The generated name of the release
          type: string
          example: Release v1.0.0 is now available!
        body:
          description: |-
            The generated body describing the contents of the release supporting markdown formatting
          type: string
      required:
        - name
        - body
    secret-scanning-alert:
      type: object
      properties:
        number:
          $ref: '#/components/schemas/alert-number'
        created_at:
          $ref: '#/components/schemas/alert-created-at'
        updated_at:
          $ref: '#/components/schemas/nullable-alert-updated-at'
        url:
          $ref: '#/components/schemas/alert-url'
        html_url:
          $ref: '#/components/schemas/alert-html-url'
        locations_url:
          type: string
          format: uri
          description: The REST API URL of the code locations for this alert.
        state:
          $ref: '#/components/schemas/secret-scanning-alert-state'
        resolution:
          $ref: '#/components/schemas/secret-scanning-alert-resolution'
        resolved_at:
          type: string
          format: date-time
          description: |-
            The time that the alert was resolved in ISO 8601 format: `YYYY-MM-DDTHH:MM:SSZ`.
          
        resolved_by:
          $ref: '#/components/schemas/nullable-simple-user'
        resolution_comment:
          type: string
          description: An optional comment to resolve an alert.
          
        secret_type:
          type: string
          description: The type of secret that secret scanning detected.
        secret_type_display_name:
          type: string
          description: |-
            User-friendly name for the detected secret, matching the `secret_type`.
            For a list of built-in patterns, see "[Secret scanning patterns](https://docs.github.com/enterprise-server@3.9/code-security/secret-scanning/secret-scanning-patterns#supported-secrets-for-advanced-security)."
        secret:
          type: string
          description: The secret that was detected.
        push_protection_bypassed:
          type: boolean
          description: Whether push protection was bypassed for the detected secret.
          
        push_protection_bypassed_by:
          $ref: '#/components/schemas/nullable-simple-user'
        push_protection_bypassed_at:
          type: string
          format: date-time
          description: |-
            The time that push protection was bypassed in ISO 8601 format: `YYYY-MM-DDTHH:MM:SSZ`.
          
    secret-scanning-alert-resolution-comment:
      description: |-
        An optional comment when closing an alert. Cannot be updated or deleted. Must be `null` when changing `state` to `open`.
      type: string
      
    secret-scanning-location-commit:
      description: |-
        Represents a 'commit' secret scanning location type. This location type shows that a secret was detected inside a commit to a repository.
      type: object
      properties:
        path:
          type: string
          description: The file path in the repository
          example: /example/secrets.txt
        start_line:
          type: number
          description: Line number at which the secret starts in the file
        end_line:
          type: number
          description: Line number at which the secret ends in the file
        start_column:
          type: number
          description: |-
            The column at which the secret starts within the start line when the file is interpreted as 8BIT ASCII
        end_column:
          type: number
          description: |-
            The column at which the secret ends within the end line when the file is interpreted as 8BIT ASCII
        blob_sha:
          type: string
          description: SHA-1 hash ID of the associated blob
          example: af5626b4a114abcb82d63db7c8082c3c4756e51b
        blob_url:
          type: string
          description: The API URL to get the associated blob resource
        commit_sha:
          type: string
          description: SHA-1 hash ID of the associated commit
          example: af5626b4a114abcb82d63db7c8082c3c4756e51b
        commit_url:
          type: string
          description: The API URL to get the associated commit resource
      required:
        - path
        - start_line
        - end_line
        - start_column
        - end_column
        - blob_sha
        - blob_url
        - commit_sha
        - commit_url
    secret-scanning-location-issue-title:
      description: |-
        Represents an 'issue_title' secret scanning location type. This location type shows that a secret was detected in the title of an issue.
      type: object
      properties:
        issue_title_url:
          type: string
          format: uri
          description: The API URL to get the issue where the secret was detected.
          example: https://api.github.com/repos/octocat/Hello-World/issues/1347
