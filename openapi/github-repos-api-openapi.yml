        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/branch-protection'
              examples:
                default:
                  $ref: '#/components/examples/branch-protection'
        '404':
          $ref: '#/components/responses/not_found'
