  /repos/{owner}/{repo}/merges:
    post:
      summary: Merge Branch
      description: |-
        The GitHub Repos API merge branch endpoint allows you to perform a repository merge by making a POST request to /repos/{owner}/{repo}/merges. This operation merges a specified branch (the head) into another branch (the base) within the same repository. You must provide the base branch name, head branch name or SHA, and optionally a commit message in the request body. The merge will be performed automatically if there are no conflicts, and the API returns the resulting commit object upon success. If the merge cannot be completed due to conflicts or if the branches are already merged, the API will return an appropriate error response. This endpoint requires push access to the repository and is useful for programmatically managing branch merges without requiring a pull request workflow.
      tags:
        - Merge
        - Branches
      operationId: mergeBranch
      externalDocs:
        description: API method documentation
        url: |-
          https://docs.github.com/enterprise-server@3.9/rest/branches/branches#merge-a-branch
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - in: header
