      x-api-naftiko-published: '2025-07-25'
      security:
        - bearerHttpAuthentication: []
    put:
      summary: Replace All Repository Topics
      description: |-
        The Replace All Repository Topics operation is a PUT request to the GitHub Repos API endpoint /repos/{owner}/{repo}/topics that allows you to completely replace the existing list of topics associated with a specific repository. Unlike adding or removing individual topics, this operation overwrites all current topics with the new set provided in the request body. You must provide the repository owner's username and the repository name in the URL path, along with authentication credentials that have the necessary permissions to modify repository settings. The request body should contain a JSON object with a "names" array listing all the topics you want to assign to the repository, where topics are short descriptive keywords that help categorize and improve discoverability of the repository on GitHub.
      tags:
        - Replace
        - All
        - Repositories
        - Topics
      operationId: replaceAllRepositoryTopics
      externalDocs:
        description: API method documentation
        url: |-
          https://docs.github.com/enterprise-server@3.9/rest/repos/repos#replace-all-repository-topics
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - in: header
          name: Authorization
          schema:
            type: string
        - in: header
          name: X-GitHub-Api-Version
          schema:
            type: string
            default: '2022-11-28'
        - in: header
          name: Accept
          schema:
            type: string
            default: application/vnd.github+json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                names:
                  type: array
                  description: |-
                    An array of topics to add to the repository. Pass one or more topics to _replace_ the set of existing topics. Send an empty array (`[]`) to clear all topics from the repository. **Note:** Topic `names` cannot contain uppercase letters.
