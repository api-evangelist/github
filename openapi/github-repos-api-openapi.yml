  /repos/{owner}/{repo}/git/blobs:
    post:
      summary: Create Blob
      description: |-
        The Create Blob operation in the GitHub Repos API allows you to create a new blob object in a repository's Git database by sending a POST request to /repos/{owner}/{repo}/git/blobs. A blob (binary large object) represents the content of a file in Git's object database without any metadata like filename or directory structure. You must provide the file content and encoding type (typically "utf-8" or "base64") in the request body, and upon successful creation, the API returns the SHA-1 hash of the newly created blob which can then be referenced when creating trees and commits. This is a low-level Git operation typically used when programmatically building commits or when you need fine-grained control over Git objects in a repository.
      tags:
        - Create
        - Blobs
      operationId: createBlob
      externalDocs:
        description: API method documentation
        url: |-
          https://docs.github.com/enterprise-server@3.9/rest/git/blobs#create-a-blob
