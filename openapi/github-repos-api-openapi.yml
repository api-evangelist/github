      responses:
        '202':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  url:
                    type: string
              examples:
                default:
                  value:
                    message: |-
                      Unread notifications couldn't be marked in a single request. Notifications are being marked as read in the background.
        '205':
          description: Reset Content
