    code-scanning-default-setup:
      description: Configuration for code scanning default setup.
      type: object
      properties:
        state:
          description: Code scanning default setup has been configured or not.
          type: string
          enum:
            - configured
            - not-configured
        languages:
          description: Languages to be analyzed.
          type: array
          items:
            type: string
            enum:
              - c-cpp
              - csharp
              - go
              - java-kotlin
              - javascript-typescript
              - javascript
              - python
              - ruby
              - typescript
              - swift
        query_suite:
          description: CodeQL query suite to be used.
          type: string
          enum:
            - default
            - extended
        updated_at:
          description: Timestamp of latest configuration update.
          
          type: string
          format: date-time
          example: '2023-12-06T14:20:20.000Z'
    code-scanning-default-setup-update:
      description: Configuration for code scanning default setup.
      type: object
      properties:
        state:
          description: The desired state of code scanning default setup.
          type: string
          enum:
            - configured
            - not-configured
        query_suite:
          description: CodeQL query suite to be used.
          type: string
          enum:
            - default
            - extended
      additionalProperties: true
      required:
        - state
    code-scanning-default-setup-update-response:
      description: |-
        You can use `run_url` to track the status of the run. This includes a property status and conclusion.
        You should not rely on this always being an actions workflow run object.
      type: object
      properties:
        run_id:
          description: ID of the corresponding run.
          type: integer
        run_url:
          description: URL of the corresponding run.
          type: string
    code-scanning-ref-full:
      type: string
      description: |-
        The full Git reference, formatted as `refs/heads/<branch name>`,
        `refs/tags/<tag>`, `refs/pull/<number>/merge`, or `refs/pull/<number>/head`.
      pattern: ^refs/(heads|tags|pull)/.*$
      example: refs/heads/main
    code-scanning-analysis-sarif-file:
      description: |-
        Base64 string representing the SARIF file to upload. You must first compress your SARIF file using [`gzip`](http://www.gnu.org/software/gzip/manual/gzip.html) and then translate the contents of the file into a Base64 encoding string. For more information, see "[SARIF support for code scanning](https://docs.github.com/enterprise-server@3.9/code-security/secure-coding/sarif-support-for-code-scanning)."
      type: string
    code-scanning-sarifs-receipt:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/code-scanning-analysis-sarif-id'
        url:
          type: string
          description: The REST API URL for checking the status of the upload.
          format: uri
          readOnly: true
    code-scanning-sarifs-status:
      type: object
      properties:
        processing_status:
          type: string
          enum:
            - pending
            - complete
            - failed
          description: |-
            `pending` files have not yet been processed, while `complete` means results from the SARIF have been stored. `failed` files have either not been processed at all, or could only be partially processed.
        analyses_url:
          type: string
          description: |-
            The REST API URL for getting the analyses associated with the upload.
          format: uri
          readOnly: true
          
        errors:
          type: array
          items:
            type: string
          description: Any errors that ocurred during processing of the delivery.
          readOnly: true
          
    codeowners-errors:
      title: CODEOWNERS errors
      description: list of errors found in a repo's CODEOWNERS file
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              line:
                description: The line number where this errors occurs.
                type: integer
                example: 7
              column:
                description: The column number where this errors occurs.
                type: integer
                example: 3
              source:
                description: The contents of the line where the error occurs.
                type: string
                example: '* user'
              kind:
                description: The type of error.
                type: string
                example: Invalid owner
              suggestion:
                description: |-
                  Suggested action to fix the error. This will usually be `null`, but is provided for some common errors.
                type: string
                
                example: |-
                  The pattern `/` will never match anything, did you mean `*` instead?
              message:
                description: |-
                  human-readable description of the error, combining information from multiple fields, laid out for display in a monospaced typeface (for example, a command-line setting).
                type: string
                example: |-
                  Invalid owner on line 7:

                    * user
                      ^
              path:
                description: The path of the file where the error occured.
                type: string
                example: .github/CODEOWNERS
            required:
              - line
              - column
              - kind
              - message
              - path
      required:
        - errors
