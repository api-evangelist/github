        Returns workflow run triggered by the event you specify. For example, `push`, `pull_request` or `issue`. For more information, see "[Events that trigger workflows](https://docs.github.com/enterprise-server@3.9/actions/automating-your-workflow-with-github-actions/events-that-trigger-workflows)."
      in: query
      required: false
      schema:
        type: string
    workflow-run-status:
      name: status
      description: |-
        Returns workflow runs with the check run `status` or `conclusion` that you specify. For example, a conclusion can be `success` or a status can be `in_progress`. Only GitHub Actions can set a status of `waiting`, `pending`, or `requested`.
      in: query
      required: false
      schema:
        type: string
        enum:
          - completed
          - action_required
          - cancelled
          - failure
          - neutral
          - skipped
          - stale
          - success
          - timed_out
          - in_progress
          - queued
          - requested
          - waiting
          - pending
    created:
      name: created
      description: |-
        Returns workflow runs created within the given date-time range. For more information on the syntax, see "[Understanding the search syntax](https://docs.github.com/enterprise-server@3.9/search-github/getting-started-with-searching-on-github/understanding-the-search-syntax#query-for-dates)."
      in: query
      required: false
      schema:
        type: string
        format: date-time
    exclude-pull-requests:
      name: exclude_pull_requests
      description: If `true` pull requests are omitted from the response (empty array).
      in: query
      required: false
      schema:
        type: boolean
        default: false
    workflow-run-check-suite-id:
      name: check_suite_id
      description: Returns workflow runs with the `check_suite_id` that you specify.
      in: query
      schema:
        type: integer
    workflow-run-head-sha:
      name: head_sha
      description: |-
        Only returns workflow runs that are associated with the specified `head_sha`.
      in: query
      required: false
      schema:
        type: string
    run-id:
      name: run_id
      description: The unique identifier of the workflow run.
      in: path
      required: true
      schema:
        type: integer
    attempt-number:
      name: attempt_number
      description: The attempt number of the workflow run.
      in: path
      required: true
      schema:
        type: integer
    workflow-id:
      name: workflow_id
      in: path
      description: |-
        The ID of the workflow. You can also pass the workflow file name as a string.
      required: true
      schema:
        oneOf:
          - type: integer
          - type: string
    autolink-id:
      name: autolink_id
      description: The unique identifier of the autolink.
      in: path
      required: true
      schema:
        type: integer
    branch:
      name: branch
      description: |-
        The name of the branch. Cannot contain wildcard characters. To use wildcard characters in branch names, use [the GraphQL API](https://docs.github.com/enterprise-server@3.9/graphql).
      in: path
      required: true
      schema:
        type: string
      x-multi-segment: true
    check-run-id:
      name: check_run_id
      description: The unique identifier of the check run.
      in: path
      required: true
      schema:
        type: integer
    check-suite-id:
      name: check_suite_id
      description: The unique identifier of the check suite.
      in: path
      required: true
      schema:
        type: integer
    check-name:
      name: check_name
      description: Returns check runs with the specified `name`.
      in: query
      required: false
      schema:
        type: string
    status:
      name: status
      description: Returns check runs with the specified `status`.
      in: query
      required: false
      schema:
        type: string
        enum:
          - queued
          - in_progress
          - completed
    git-ref:
      name: ref
      description: |-
        The Git reference for the results you want to list. The `ref` for a branch can be formatted either as `refs/heads/<branch name>` or simply `<branch name>`. To reference a pull request use `refs/pull/<number>/merge`.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/code-scanning-ref'
    alert-number:
      name: alert_number
      in: path
      description: |-
        The number that identifies an alert. You can find this at the end of the URL for a code scanning alert within GitHub, and in the `number` field in the response from the `GET /repos/{owner}/{repo}/code-scanning/alerts` operation.
      required: true
      schema:
        $ref: '#/components/schemas/alert-number'
    commit-sha:
      name: commit_sha
      description: The SHA of the commit.
      in: path
      required: true
      schema:
        type: string
      x-multi-segment: true
    commit-ref:
      name: ref
      description: |-
        The commit reference. Can be a commit SHA, branch name (`heads/BRANCH_NAME`), or tag name (`tags/TAG_NAME`). For more information, see "[Git References](https://git-scm.com/book/en/v2/Git-Internals-Git-References)" in the Git documentation.
      in: path
      required: true
      schema:
        type: string
      x-multi-segment: true
    dependabot-alert-comma-separated-manifests:
      name: manifest
      in: query
      description: |-
        comma-separated list of full manifest paths. If specified, only alerts for these manifests will be returned.
      schema:
        type: string
    dependabot-alert-number:
      name: alert_number
      in: path
      description: |-
        The number that identifies a Dependabot alert in its repository.
        You can find this at the end of the URL for a Dependabot alert within GitHub,
        or in `number` fields in the response from the
        `GET /repos/{owner}/{repo}/dependabot/alerts` operation.
      required: true
      schema:
        $ref: '#/components/schemas/alert-number'
    manifest-path:
      name: name
      description: |-
        The full path, relative to the repository root, of the dependency manifest file.
      in: query
      required: false
      schema:
        type: string
    deployment-id:
      name: deployment_id
      description: deployment_id parameter
      in: path
      required: true
      schema:
        type: integer
    environment-name:
      name: environment_name
      in: path
      required: true
      description: |-
        The name of the environment. The name must be URL encoded. For example, any slashes in the name must be replaced with `%2F`.
      schema:
        type: string
    branch-policy-id:
      name: branch_policy_id
      in: path
      required: true
      description: The unique identifier of the branch policy.
      schema:
        type: integer
    git-ref-only:
      name: ref
      description: |-
        The Git reference. For more information, see "[Git References](https://git-scm.com/book/en/v2/Git-Internals-Git-References)" in the Git documentation.
      in: path
      required: true
      example: heads/feature-a
      schema:
        type: string
      x-multi-segment: true
    invitation-id:
      name: invitation_id
      description: The unique identifier of the invitation.
      in: path
      required: true
      schema:
        type: integer
    sort:
      name: sort
      description: The property to sort the results by.
      in: query
      required: false
      schema:
        type: string
        enum:
          - created
          - updated
        default: created
    issue-number:
      name: issue_number
      description: The number that identifies the issue.
      in: path
      required: true
      schema:
        type: integer
    key-id:
      name: key_id
      description: The unique identifier of the key.
      in: path
      required: true
      schema:
        type: integer
    milestone-number:
      name: milestone_number
      description: The number that identifies the milestone.
      in: path
      required: true
      schema:
        type: integer
    pull-number:
      name: pull_number
      description: The number that identifies the pull request.
      in: path
      required: true
      schema:
        type: integer
    review-id:
      name: review_id
      description: The unique identifier of the review.
      in: path
      required: true
      schema:
        type: integer
    asset-id:
      name: asset_id
      description: The unique identifier of the asset.
      in: path
      required: true
      schema:
        type: integer
    release-id:
      name: release_id
      description: The unique identifier of the release.
      in: path
      required: true
      schema:
        type: integer
    tag-protection-id:
      name: tag_protection_id
      description: The unique identifier of the tag protection.
      in: path
      required: true
      schema:
        type: integer
    since-repo:
      name: since
      description: repository ID. Only return repositories with an ID greater than this ID.
      in: query
      required: false
      schema:
        type: integer
    order:
      name: order
      description: |-
        Determines whether the first search result returned is the highest number of matches (`desc`) or lowest number of matches (`asc`). This parameter is ignored unless you provide `sort`.
      in: query
      required: false
      schema:
        type: string
        enum:
          - desc
          - asc
        default: desc
