            Attempt number of the run, 1 for first attempt and higher if the workflow was re-run.
          example: 1
        referenced_workflows:
          type: array
          
          items:
            $ref: '#/components/schemas/referenced-workflow'
        event:
          type: string
          example: push
        status:
          type: string
          
          example: completed
        conclusion:
          type: string
          
          example: neutral
        workflow_id:
          type: integer
          description: The ID of the parent workflow.
          example: 5
        url:
          type: string
          description: The URL to the workflow run.
          example: https://api.github.com/repos/github/hello-world/actions/runs/5
        html_url:
          type: string
          example: https://github.com/github/hello-world/suites/4
        pull_requests:
          description: |-
            Pull requests that are open with a `head_sha` or `head_branch` that matches the workflow run. The returned pull requests do not necessarily indicate pull requests that triggered the run.
          type: array
          
          items:
            $ref: '#/components/schemas/pull-request-minimal'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        actor:
          $ref: '#/components/schemas/simple-user'
        triggering_actor:
          $ref: '#/components/schemas/simple-user'
        run_started_at:
          type: string
          format: date-time
          description: The start time of the latest run. Resets on re-run.
        jobs_url:
          description: The URL to the jobs for the workflow run.
          type: string
          example: https://api.github.com/repos/github/hello-world/actions/runs/5/jobs
        logs_url:
          description: The URL to download the logs for the workflow run.
          type: string
          example: https://api.github.com/repos/github/hello-world/actions/runs/5/logs
        check_suite_url:
          description: The URL to the associated check suite.
          type: string
          example: https://api.github.com/repos/github/hello-world/check-suites/12
        artifacts_url:
          description: The URL to the artifacts for the workflow run.
          type: string
          example: |-
            https://api.github.com/repos/github/hello-world/actions/runs/5/rerun/artifacts
        cancel_url:
          description: The URL to cancel the workflow run.
          type: string
          example: |-
            https://api.github.com/repos/github/hello-world/actions/runs/5/cancel
        rerun_url:
          description: The URL to rerun the workflow run.
          type: string
          example: https://api.github.com/repos/github/hello-world/actions/runs/5/rerun
        previous_attempt_url:
          
          description: |-
            The URL to the previous attempted run of this workflow, if one exists.
          type: string
          example: |-
            https://api.github.com/repos/github/hello-world/actions/runs/5/attempts/3
        workflow_url:
          description: The URL to the workflow.
          type: string
          example: |-
            https://api.github.com/repos/github/hello-world/actions/workflows/main.yaml
        head_commit:
          $ref: '#/components/schemas/nullable-simple-commit'
        repository:
          $ref: '#/components/schemas/minimal-repository'
        head_repository:
          $ref: '#/components/schemas/minimal-repository'
        head_repository_id:
          type: integer
          example: 5
        display_title:
          type: string
          example: Simple Workflow
          description: |-
            The event-specific title associated with the run or the run-name if set, or the value of `run-name` if it is set in the workflow.
      required:
        - id
        - node_id
        - head_branch
        - run_number
        - display_title
        - event
        - status
        - conclusion
        - head_sha
        - path
        - workflow_id
        - url
        - html_url
        - created_at
        - updated_at
        - head_commit
        - head_repository
        - repository
        - jobs_url
        - logs_url
        - check_suite_url
        - cancel_url
        - rerun_url
        - artifacts_url
        - workflow_url
        - pull_requests
    environment-approvals:
      title: Environment Approval
      description: An entry in the reviews log for environment deployments
      type: object
      properties:
        environments:
          description: The list of environments that were approved or rejected
          type: array
          items:
            type: object
            properties:
              id:
                description: The id of the environment.
                example: 56780428
                type: integer
              node_id:
                type: string
                example: MDExOkVudmlyb25tZW50NTY3ODA0Mjg=
              name:
                description: The name of the environment.
                example: staging
                type: string
              url:
                type: string
                example: |-
                  https://api.github.com/repos/github/hello-world/environments/staging
              html_url:
                type: string
                example: |-
                  https://github.com/github/hello-world/deployments/activity_log?environments_filter=staging
              created_at:
                description: The time that the environment was created, in ISO 8601 format.
                example: '2020-11-23T22:00:40Z'
                format: date-time
                type: string
              updated_at:
                description: |-
                  The time that the environment was last updated, in ISO 8601 format.
                example: '2020-11-23T22:00:40Z'
                format: date-time
                type: string
        state:
          description: |-
            Whether deployment to the environment(s) was approved or rejected or pending (with comments)
          enum:
            - approved
            - rejected
            - pending
          example: approved
          type: string
        user:
          $ref: '#/components/schemas/simple-user'
        comment:
          type: string
          description: The comment submitted with the deployment review
          example: Ship it!
      required:
        - environments
        - state
        - user
        - comment
    deployment-reviewer-type:
      type: string
      description: The type of reviewer.
      enum:
        - User
        - Team
      example: User
    pending-deployment:
      title: Pending Deployment
      description: Details of a deployment that is waiting for protection rules to pass
      type: object
      properties:
        environment:
          type: object
          properties:
            id:
              description: The id of the environment.
              type: integer
              format: int64
              example: 56780428
            node_id:
              type: string
              example: MDExOkVudmlyb25tZW50NTY3ODA0Mjg=
            name:
              description: The name of the environment.
              example: staging
              type: string
            url:
              type: string
              example: |-
                https://api.github.com/repos/github/hello-world/environments/staging
            html_url:
              type: string
              example: |-
                https://github.com/github/hello-world/deployments/activity_log?environments_filter=staging
        wait_timer:
          type: integer
          description: The set duration of the wait timer
          example: 30
        wait_timer_started_at:
          description: The time that the wait timer began.
          example: '2020-11-23T22:00:40Z'
          format: date-time
          type: string
          
        current_user_can_approve:
          description: Whether the currently authenticated user can approve the deployment
          type: boolean
          example: true
        reviewers:
          type: array
          description: |-
            The people or teams that may approve jobs that reference the environment. You can list up to six users or teams as reviewers. The reviewers must have at least read access to the repository. Only one of the required reviewers needs to approve the job for it to proceed.
          items:
            type: object
            properties:
              type:
                $ref: '#/components/schemas/deployment-reviewer-type'
              reviewer:
                anyOf:
                  - $ref: '#/components/schemas/simple-user'
                  - $ref: '#/components/schemas/team'
      required:
        - environment
        - wait_timer
        - wait_timer_started_at
        - current_user_can_approve
        - reviewers
    deployment:
      title: Deployment
      description: request for a specific ref(branch,sha,tag) to be deployed
      type: object
      properties:
        url:
          type: string
          format: uri
          example: https://api.github.com/repos/octocat/example/deployments/1
        id:
          description: Unique identifier of the deployment
          type: integer
          format: int64
          example: 42
        node_id:
          type: string
          example: MDEwOkRlcGxveW1lbnQx
        sha:
          type: string
          example: a84d88e7554fc1fa21bcbc4efae3c782a70d2b9d
        ref:
          description: The ref to deploy. This can be a branch, tag, or sha.
          example: topic-branch
          type: string
        task:
          description: Parameter to specify a task to execute
          example: deploy
          type: string
        payload:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        original_environment:
          type: string
          example: staging
        environment:
          description: Name for the target deployment environment.
          example: production
          type: string
        description:
          type: string
          example: Deploy request from hubot
          
        creator:
          $ref: '#/components/schemas/nullable-simple-user'
        created_at:
          type: string
          format: date-time
          example: '2012-07-20T01:19:13Z'
        updated_at:
          type: string
          format: date-time
          example: '2012-07-20T01:19:13Z'
        statuses_url:
          type: string
          format: uri
          example: https://api.github.com/repos/octocat/example/deployments/1/statuses
        repository_url:
          type: string
          format: uri
          example: https://api.github.com/repos/octocat/example
        transient_environment:
          description: |-
            Specifies if the given environment is will no longer exist at some point in the future. Default: false.
          example: true
          type: boolean
        production_environment:
          description: |-
            Specifies if the given environment is one that end-users directly interact with. Default: false.
          example: true
          type: boolean
        performed_via_github_app:
          $ref: '#/components/schemas/nullable-integration'
      required:
        - id
        - node_id
        - sha
        - ref
        - task
        - environment
        - creator
        - payload
        - description
        - statuses_url
        - repository_url
        - url
        - created_at
        - updated_at
