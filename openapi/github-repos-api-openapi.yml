    pull-request-review-request:
      title: Pull Request Review Request
      description: Pull Request Review Request
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/simple-user'
        teams:
          type: array
          items:
            $ref: '#/components/schemas/team'
      required:
        - users
        - teams
    pull-request-review:
      title: Pull Request Review
      description: Pull Request Reviews are reviews on pull requests.
      type: object
      properties:
        id:
          description: Unique identifier of the review
          example: 42
          type: integer
        node_id:
          type: string
          example: MDE3OlB1bGxSZXF1ZXN0UmV2aWV3ODA=
        user:
          $ref: '#/components/schemas/nullable-simple-user'
        body:
          description: The text of the review.
          example: This looks great.
          type: string
        state:
          type: string
          example: CHANGES_REQUESTED
        html_url:
          type: string
          format: uri
          example: https://github.com/octocat/Hello-World/pull/12#pullrequestreview-80
        pull_request_url:
          type: string
          format: uri
          example: https://api.github.com/repos/octocat/Hello-World/pulls/12
        _links:
          type: object
          properties:
            html:
              type: object
              properties:
                href:
                  type: string
              required:
                - href
            pull_request:
              type: object
              properties:
                href:
                  type: string
              required:
                - href
          required:
            - html
            - pull_request
        submitted_at:
          type: string
          format: date-time
        commit_id:
          description: |-
            commit SHA for the review. If the commit object was garbage collected or forcibly deleted, then it no longer exists in Git and this value will be `null`.
          example: 54bb654c9e6025347f57900a4a5c2313a96b8035
          type: string
          
        body_html:
          type: string
        body_text:
          type: string
        author_association:
          $ref: '#/components/schemas/author-association'
      required:
        - id
        - node_id
        - user
        - body
        - state
        - commit_id
        - html_url
        - pull_request_url
        - _links
        - author_association
    review-comment:
      title: Legacy Review Comment
      description: Legacy Review Comment
      type: object
      properties:
        url:
          type: string
          format: uri
          example: https://api.github.com/repos/octocat/Hello-World/pulls/comments/1
        pull_request_review_id:
          type: integer
          format: int64
          example: 42
          
        id:
          type: integer
          format: int64
          example: 10
        node_id:
          type: string
          example: MDI0OlB1bGxSZXF1ZXN0UmV2aWV3Q29tbWVudDEw
        diff_hunk:
          type: string
          example: '@@ -16,33 +16,40 @@ public class Connection : IConnection...'
        path:
          type: string
          example: file1.txt
        position:
          type: integer
          example: 1
          
        original_position:
          type: integer
          example: 4
        commit_id:
          type: string
          example: 6dcb09b5b57875f334f61aebed695e2e4193db5e
        original_commit_id:
          type: string
          example: 9c48853fa3dc5c1c3d6f1f1cd1f2743e72652840
        in_reply_to_id:
          type: integer
          example: 8
        user:
          $ref: '#/components/schemas/nullable-simple-user'
        body:
          type: string
          example: Great stuff
        created_at:
          type: string
          format: date-time
          example: '2011-04-14T16:00:49Z'
        updated_at:
          type: string
          format: date-time
          example: '2011-04-14T16:00:49Z'
        html_url:
          type: string
          format: uri
          example: https://github.com/octocat/Hello-World/pull/1#discussion-diff-1
        pull_request_url:
          type: string
          format: uri
          example: https://api.github.com/repos/octocat/Hello-World/pulls/1
        author_association:
          $ref: '#/components/schemas/author-association'
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            html:
              $ref: '#/components/schemas/link'
            pull_request:
              $ref: '#/components/schemas/link'
          required:
            - self
            - html
            - pull_request
        body_text:
          type: string
        body_html:
          type: string
        reactions:
          $ref: '#/components/schemas/reaction-rollup'
        side:
          description: The side of the first line of the range for a multi-line comment.
          enum:
            - LEFT
            - RIGHT
          default: RIGHT
          type: string
        start_side:
          type: string
          description: The side of the first line of the range for a multi-line comment.
          enum:
            - LEFT
            - RIGHT
          default: RIGHT
          
        line:
          description: |-
            The line of the blob to which the comment applies. The last line of the range for a multi-line comment
          example: 2
          type: integer
        original_line:
          description: |-
            The original line of the blob to which the comment applies. The last line of the range for a multi-line comment
          example: 2
          type: integer
        start_line:
          description: The first line of the range for a multi-line comment.
          example: 2
          type: integer
          
        original_start_line:
          description: The original first line of the range for a multi-line comment.
          example: 2
          type: integer
          
      required:
        - id
        - node_id
        - url
        - body
        - diff_hunk
        - path
        - position
        - original_position
        - commit_id
        - original_commit_id
        - user
        - pull_request_review_id
        - html_url
        - pull_request_url
        - _links
        - author_association
        - created_at
        - updated_at
